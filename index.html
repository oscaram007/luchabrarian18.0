  const cardW  = Math.min(240, W * 0.22);
  const cardH  = Math.min(420, H * 0.62);
  const cardGap = Math.min(38, W * 0.04);
  const totalW  = cardW * 3 + cardGap * 2;
  const cardX0  = W/2 - totalW/2;
  const cardY   = bannerH + Math.min(18, H * 0.025);

  for (let i = 0; i < 3; i++) {
    const f   = fighters[i];
    const sel = difficultySelection === f.diff;
    const cx  = cardX0 + i * (cardW + cardGap);
    const pulse = sel ? Math.sin(t * 3) * 0.06 + 0.94 : 1;

    ctx.save();
    if (sel) {
      ctx.translate(cx + cardW/2, cardY + cardH/2);
      ctx.scale(1.04, 1.04);
      ctx.translate(-(cx + cardW/2), -(cardY + cardH/2));
      ctx.shadowColor = f.glowC;
      ctx.shadowBlur  = 30;
    }

    // Card body
    const cardBg = ctx.createLinearGradient(cx, cardY, cx, cardY + cardH);
    cardBg.addColorStop(0,   sel ? '#2a1800' : '#0e0e18');
    cardBg.addColorStop(0.4, sel ? '#1e1000' : '#0a0a14');
    cardBg.addColorStop(1,   '#050508');
    ctx.fillStyle = cardBg;
    ctx.fillRect(cx, cardY, cardW, cardH);
    ctx.shadowBlur = 0;

    // Card border — triple line for selected
    if (sel) {
      ctx.strokeStyle = f.glowC;  ctx.lineWidth = 5;
      ctx.strokeRect(cx-2, cardY-2, cardW+4, cardH+4);
      ctx.strokeStyle = '#f0e840'; ctx.lineWidth = 2;
      ctx.strokeRect(cx+2, cardY+2, cardW-4, cardH-4);
    } else {
      ctx.strokeStyle = '#3a3a5a'; ctx.lineWidth = 2;
      ctx.strokeRect(cx, cardY, cardW, cardH);
    }

    // Color-bar header
    const hdrH = cardH * 0.12;
    const hdrGrad = ctx.createLinearGradient(cx, cardY, cx, cardY + hdrH);
    hdrGrad.addColorStop(0, f.color + 'cc');
    hdrGrad.addColorStop(1, f.color + '44');
    ctx.fillStyle = hdrGrad;
    ctx.fillRect(cx, cardY, cardW, hdrH);

    // Badge text in header
    const badgeSize = Math.min(8, cardW * 0.034);
    ctx.font = `bold ${badgeSize}px "Press Start 2P"`;
    ctx.textAlign = 'center';
    strokeText2(f.badge, cx + cardW/2, cardY + hdrH * 0.68, '#1a1a0a', f.color, 4);

    // Fighter mask (large, centred in upper portion)
    const maskSz = Math.min(75, cardH * 0.22);
    const maskY2 = cardY + hdrH + maskSz + 10;
    drawDetailedMask(cx + cardW/2, maskY2, maskSz, f.maskOpts);

    // Fighter name
    const nameSize = Math.min(9, cardW * 0.038);
    ctx.font = `bold ${nameSize}px "Press Start 2P"`;
    ctx.textAlign = 'center';
    const nameY = maskY2 + maskSz + nameSize * 1.4;
    strokeText2(f.name, cx + cardW/2, nameY, f.color, '#0a0a0a', 5);

    // Tagline
    ctx.font = `${Math.max(6, nameSize - 2)}px "Press Start 2P"`;
    ctx.fillStyle = sel ? '#d4c8a8' : '#4a4a6a';
    ctx.fillText(f.tagline, cx + cardW/2, nameY + nameSize * 1.5);

    // Divider
    ctx.strokeStyle = sel ? f.color : '#3a3a5a';
    ctx.lineWidth = 1;
    const divY = nameY + nameSize * 2.4;
    ctx.beginPath();
    ctx.moveTo(cx + 16, divY); ctx.lineTo(cx + cardW - 16, divY);
    ctx.stroke();

    // Stat rows
    const statSize = Math.max(6, Math.min(7, cardW * 0.028));
    ctx.font = `${statSize}px "Press Start 2P"`;
    for (let j = 0; j < f.stats.length; j++) {
      const sy = divY + 14 + j * (statSize * 1.8);
      ctx.fillStyle = sel ? '#d4c8a8' : '#4a4a6a';
      ctx.textAlign = 'left';
      ctx.fillText('›', cx + 12, sy);
      ctx.textAlign = 'center';
      ctx.fillText(f.stats[j], cx + cardW/2 + 4, sy);
    }

    // Bottom SELECTED / PRESS ENTER indicator
    const selBarY = cardY + cardH - Math.min(36, cardH * 0.09);
    if (sel) {
      ctx.fillStyle = f.color;
      ctx.fillRect(cx + 6, selBarY, cardW - 12, 28);
      const selBlink = Math.sin(t * 5) > 0;
      const selSize = Math.min(8, cardW * 0.033);
      ctx.font = `bold ${selSize}px "Press Start 2P"`;
      ctx.textAlign = 'center';
      ctx.fillStyle = selBlink ? '#ffffff' : '#1a0800';
      ctx.fillText('◀ SELECTED ▶', cx + cardW/2, selBarY + 18);
    } else {
      ctx.strokeStyle = '#3a3a5a';
      ctx.lineWidth = 1;
      ctx.strokeRect(cx + 6, selBarY, cardW - 12, 28);
      ctx.font = `${Math.min(7, cardW * 0.028)}px "Press Start 2P"`;
      ctx.fillStyle = '#3a3a5a';
      ctx.textAlign = 'center';
      ctx.fillText('← / →  SELECT', cx + cardW/2, selBarY + 17);
    }

    ctx.restore();
  }

  // ── Bottom instructions ────────────────────────────────────────────────
  const instrY = H - Math.min(30, H * 0.04);
  ctx.font = `${Math.min(10, W * 0.013)}px "Press Start 2P"`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#6a6a8a';
  ctx.fillText('← / → CHOOSE   |   ENTER START   |   ESC BACK', W/2, instrY);

  // Corner masks
  ctx.globalAlpha = 0.28;
  drawDetailedMask(45, H - 45, 32, { main:'#d62a2a', stripe:'#f0e840', dark:'#8a0a0a',
    eyeGlow:'#ff4a2a', accent:'#2a8c2a', trim:'#ffffff' });
  drawDetailedMask(W - 45, H - 45, 32, { main:'#2e5cc0', stripe:'#f0e840', dark:'#1a3a80',
    eyeGlow:'#4a8cff', accent:'#ffffff', trim:'#c8d8ff' });
  ctx.globalAlpha = 1;
}

function renderGame() {
  // Render environment (floor, windows, ambient lighting)
  renderEnvironment();
  
  // Ambient dust particles (in background)
  renderAmbientParticles();
  
  // Elegant accent wall behind windows
  renderAccentWall();
  
  // Windows showing outside (on top of accent wall)
  renderWindows();
  
  // Decorative lamps
  renderLamps();
  
  // Potted plants
  renderPlants();
  
  // Shelves
  for (const shelf of shelves) {
    if (shelf) renderShelf(shelf);
  }
  
  // Trash can
  renderTrashCan(trashCan);
  
  // Books on floor
  for (const book of books) {
    if (book && (book.state === 'floor' || book.state === 'dropping' || book.state === 'picking_up')) {
      renderBook(book);
    }
  }
  
  // Powerups
  for (const p of powerups) {
    if (p) renderPowerup(p);
  }
  
  // Particles
  for (const p of particles) {
    if (p) renderParticle(p);
  }
  
  // Ghosts
  for (const g of ghosts) renderGhost(g);
  
  // Thrown books
  for (const book of thrownBooks) {
    // Trail
    for (const t of book.trail) {
      if (t.alpha > 0) {
        ctx.globalAlpha = t.alpha * 0.3;
        ctx.fillStyle = book.color;
        ctx.fillRect(t.x - 3, t.y - 3, 6, 6);
      }
    }
    ctx.globalAlpha = 1;
    
    // Book
    ctx.save();
    ctx.translate(book.x, book.y);
    ctx.rotate(book.rot);
    ctx.fillStyle = book.color;
    ctx.fillRect(-book.size/2, -book.size/2, book.size, book.size);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-book.size/2, -book.size/2, 1, book.size);
    ctx.restore();
  }
  
  // Ghost projectiles
  for (const proj of ghostProjectiles) {
    // Trail
    for (const t of proj.trail) {
      if (t.alpha > 0) {
        ctx.globalAlpha = t.alpha * 0.4;
        ctx.fillStyle = proj.color;
        ctx.beginPath();
        ctx.arc(t.x, t.y, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    
    // Projectile orb
    ctx.fillStyle = proj.color;
    ctx.beginPath();
    ctx.arc(proj.x, proj.y, proj.size, 0, Math.PI * 2);
    ctx.fill();
    
    // Inner glow
    const gradient = ctx.createRadialGradient(
      proj.x - 2, proj.y - 2, 0,
      proj.x, proj.y, proj.size
    );
    gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
    gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(proj.x, proj.y, proj.size, 0, Math.PI * 2);
    ctx.fill();
    
    // Outer glow if reflected
    if (proj.reflected) {
      ctx.globalAlpha = 0.5;
      ctx.strokeStyle = '#f0e840';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(proj.x, proj.y, proj.size + 3, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }
  
  // Charge attack
  if (chargeAttack) {
    // Expanding ring
    ctx.globalAlpha = 0.6;
    ctx.strokeStyle = '#f0e840';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(chargeAttack.x, chargeAttack.y, chargeAttack.radius, 0, Math.PI * 2);
    ctx.stroke();
    
    // Inner glow
    const gradient = ctx.createRadialGradient(
      chargeAttack.x, chargeAttack.y, 0,
      chargeAttack.x, chargeAttack.y, chargeAttack.radius
    );
    gradient.addColorStop(0, 'rgba(240, 232, 64, 0.3)');
    gradient.addColorStop(1, 'rgba(240, 232, 64, 0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(
      chargeAttack.x - chargeAttack.radius,
      chargeAttack.y - chargeAttack.radius,
      chargeAttack.radius * 2,
      chargeAttack.radius * 2
    );
    ctx.globalAlpha = 1;
  }
  
  // Player
  renderPlayer();
  
  // Feedbacks
  for (const f of feedbacks) {
    const alpha = f.life / f.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = f.color;
    ctx.font = `${f.size}px "Press Start 2P"`;
    ctx.textAlign = 'center';
    ctx.fillText(f.txt, f.x, f.y);
    ctx.globalAlpha = 1;
  }
  
  // HUD
  renderHUD();
  
  // Flash
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255, 60, 60, ${flashAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }
  
  // ═══════════════════════════════════════════════════════════════════════
  // NINTENDO MAGIC: COMBO SCREEN EFFECTS
  // ═══════════════════════════════════════════════════════════════════════
  
  // 15x COMBO - Golden Screen
  if (window.goldenScreen > 0) {
    const goldenIntensity = window.goldenScreen / 2000;
    ctx.fillStyle = `rgba(240, 232, 64, ${goldenIntensity * 0.3})`;
    ctx.fillRect(0, 0, W, H);
    
    // Golden particles across screen
    const goldenPhase = (2000 - window.goldenScreen) * 0.01;
    for (let i = 0; i < 20; i++) {
      const px = (W / 20) * i + Math.sin(goldenPhase + i) * 30;
      const py = Math.sin(goldenPhase * 2 + i * 0.5) * H * 0.5 + H * 0.5;
      ctx.fillStyle = '#f0e840';
      ctx.globalAlpha = goldenIntensity * 0.6;
      ctx.beginPath();
      ctx.arc(px, py, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  
  // 10x COMBO - Book Sparkle
  if (window.bookSparkle > 0) {
    // Sparkle particles on all shelves
    if (Math.random() < 0.3) {
      for (const shelf of shelves) {
        if (Math.random() < 0.5) {
          PARTICLE_TYPES.SPARKLE(
            shelf.x + rnd(-30, 30),
            shelf.y + rnd(-30, 30),
            '#f0e840',
            500
          );
        }
      }
    }
  }
  
  // 20x+ FRENZY MODE - Rainbow Screen Pulse
  if (window.libraryFrenzy) {
    const frenzyPulse = Math.sin(Date.now() * 0.025) * 0.5 + 0.5;
    const rainbowHue = (Date.now() * 0.1) % 360;
    ctx.fillStyle = `hsla(${rainbowHue}, 100%, 60%, ${frenzyPulse * 0.15})`;
    ctx.fillRect(0, 0, W, H);
    
    // Rainbow border (thicker in frenzy)
    ctx.strokeStyle = `hsl(${rainbowHue}, 100%, 60%)`;
    ctx.globalAlpha = frenzyPulse;
    ctx.lineWidth = 12;
    ctx.strokeRect(6, 6, W - 12, H - 12);
    ctx.globalAlpha = 1;
  }
  
  // Combo milestone screen border flash (standard combos)
  if (combo >= 10 && combo < 20) {
    const borderPulse = Math.sin(Date.now() * 0.01) * 0.3 + 0.3;
    const borderColor = combo >= 15 ? '#f0e840' : combo >= 10 ? '#ff6aaa' : '#4a8cff';
    ctx.strokeStyle = borderColor;
    ctx.globalAlpha = borderPulse;
    ctx.lineWidth = 8;
    ctx.strokeRect(4, 4, W - 8, H - 8);
    ctx.globalAlpha = 1;
  }
  
  // ─── Procedural Layout: shelf compass arrows during reveal window ─────────
  // For each shelf that isn't on-screen-obvious, draw a small coloured arrow
  // at the screen edge pointing toward it — helps players build the mental map.
  if (layoutRevealTimer > 0 && layoutRevealTimer < 3400) {
    const MAX_T = 3400, t = layoutRevealTimer / MAX_T;
    const arrowAlpha = t > 0.80 ? (1 - t) / 0.20 : Math.min(1, (1 - t / MAX_T * 0) * 0.85);
    const arrowR = 28, margin = 38;
    
    for (const shelf of shelves) {
      if (!shelf || shelf.spawnDelay > 0) continue;
      const col = SHELF_GLOW[shelf.type] || BOOK_COLORS[shelf.type] || '#ffffff';
      
      // Project shelf position to screen edge
      const dx = shelf.x - W/2, dy = shelf.y - H/2;
      const angle = Math.atan2(dy, dx);
      
      // Only draw arrow if shelf is far enough that it might be missed
      const distFromCenter = Math.sqrt(dx*dx + dy*dy);
      if (distFromCenter < Math.min(W, H) * 0.25) continue;
      
      // Clamp to screen edge
      const ax = W/2 + Math.cos(angle) * (W/2 - margin);
      const ay = H/2 + Math.sin(angle) * (H/2 - margin);
      
      ctx.save();
      ctx.translate(ax, ay);
      ctx.rotate(angle);
      ctx.globalAlpha = arrowAlpha * (0.6 + Math.sin(Date.now() * 0.005) * 0.3);
      
      // Arrow triangle
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.moveTo(arrowR, 0);
      ctx.lineTo(-arrowR * 0.5, -arrowR * 0.55);
      ctx.lineTo(-arrowR * 0.5,  arrowR * 0.55);
      ctx.closePath();
      ctx.fill();
      
      // Shelf colour dot at base of arrow
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.arc(-arrowR * 0.5, 0, 4, 0, Math.PI * 2);
      ctx.fill();
      
      // 3-char type label
      ctx.rotate(-angle);
      ctx.font = '6px "Press Start 2P"';
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.fillText(BOOK_LABELS[shelf.type].slice(0,3).toUpperCase(), 0, -arrowR - 4);
      
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }
  for (const stamp of filingStamps) {
    const t = stamp.life / stamp.maxLife;         // 1 → 0 as it expires
    const alpha = t < 0.3 ? t / 0.3 : 1;         // fade out last 30%
    const scl = t > 0.8 ? 1 + (1 - t) * 4 : 1;  // punch in (big → 1) in first 20%
    const riseY = (1 - t) * 34;                   // rises upward over lifetime
    
    ctx.save();
    ctx.translate(stamp.x, stamp.y - riseY);
    ctx.scale(scl, scl);
    ctx.globalAlpha = alpha;
    
    // Pill background
    const sw = 62, sh = 20;
    ctx.fillStyle = 'rgba(10,10,20,0.72)';
    ctx.beginPath();
    ctx.roundRect(-sw/2, -sh/2, sw, sh, sh/2);
    ctx.fill();
    
    // Colored left accent stripe
    ctx.fillStyle = stamp.color;
    ctx.beginPath();
    ctx.roundRect(-sw/2, -sh/2, 6, sh, [sh/2, 0, 0, sh/2]);
    ctx.fill();
    
    // Stamp text
    ctx.font = 'bold 9px "Press Start 2P"';
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(stamp.label, 3, 0);
    ctx.textBaseline = 'alphabetic';
    
    ctx.restore();
    ctx.globalAlpha = 1;
  }
  
  // ─── Phase 3: Combo Announcer ──────────────────────────────────────────
  if (comboAnnouncer) {
    const t = comboAnnouncer.life / comboAnnouncer.maxLife;  // 1→0
    // Entrance: scale-punch in first 15%; Exit: fade out last 25%
    const enterT = Math.min(1, (1 - t) / 0.15);
    const exitAlpha = t < 0.25 ? t / 0.25 : 1;
    const displayAlpha = Math.min(enterT, exitAlpha);
    const scl = comboAnnouncer.scale;
    
    const annY = H * 0.3;
    
    ctx.save();
    ctx.translate(W / 2, annY);
    ctx.scale(scl, scl);
    ctx.globalAlpha = displayAlpha;
    
    // Wide glow halo behind text
    const glowR = 220;
    const glowGrad = ctx.createRadialGradient(0, 0, 10, 0, 0, glowR);
    glowGrad.addColorStop(0,   comboAnnouncer.glow + 'cc');
    glowGrad.addColorStop(0.45, comboAnnouncer.glow + '44');
    glowGrad.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(-glowR, -glowR, glowR*2, glowR*2);
    
    // Drop-shadow for legibility
    ctx.shadowColor = comboAnnouncer.glow;
    ctx.shadowBlur = 28;
    
    // Tier label (large, centered)
    const tierFontSize = 26 + comboAnnouncer.tier * 2;
    ctx.font = `bold ${tierFontSize}px "Press Start 2P"`;
    ctx.fillStyle = comboAnnouncer.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(comboAnnouncer.label, 0, 0);
    
    // Combo count sub-line
    ctx.shadowBlur = 0;
    ctx.font = '11px "Press Start 2P"';
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.fillText(`${combo}x COMBO`, 0, tierFontSize * 0.75);
    
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
    ctx.globalAlpha = 1;
  }
}

function renderShelf(shelf) {
  if (!shelf || !shelf.type) return;
  
  // ─── Procedural layout: skip if still in pre-delay, apply pop-in scale ──
  if (!shelf.spawnDone) {
    if (shelf.spawnDelay > 0) return;   // not yet — invisible
    ctx.save();
    const sc = shelf.spawnScale;
    ctx.globalAlpha = shelf.spawnAlpha;
    ctx.translate(shelf.x, shelf.y);
    ctx.scale(sc, sc);
    ctx.translate(-shelf.x, -shelf.y);
    // Render with animation active (fall through to normal draw below)
    _renderShelfBody(shelf);
    ctx.restore();
    return;
  }

  // Normal full-alpha render (spawnDone === true)
  _renderShelfBody(shelf);
}

function _renderShelfBody(shelf) {
  if (!shelf || !shelf.type) return;
  
  // ═══════════════════════════════════════════════════════════════════════
  // NINTENDO MAGIC: BREATHING & PERSONALITY
  // ═══════════════════════════════════════════════════════════════════════
  
  const time = Date.now();
  const shelfID = shelves.indexOf(shelf);
  
  // Subtle floating/breathing motion (different phase per shelf)
  const breatheY = Math.sin(time * 0.002 + shelfID * 0.5) * 2;
  const breatheScale = 1 + Math.sin(time * 0.0015 + shelfID * 0.3) * 0.01; // Tiny scale pulse
  
  // Apply breathing to shelf position
  let x = shelf.x;
  let y = shelf.y + breatheY;
  const shelfW = 114;  // Increased from 76 (1.5x)
  const shelfH = 72;   // Increased from 48 (1.5x)
  const depth = 12;    // Increased from 8
  
  // ═══════════════════════════════════════════════════════════════════════
  // NINTENDO MAGIC: PROXIMITY REACTIONS
  // "Shelves notice you!"
  // ═══════════════════════════════════════════════════════════════════════
  
  // Calculate distance to player
  const dx = player.x - x;
  const dy = player.y - y;
  const distanceToPlayer = Math.sqrt(dx * dx + dy * dy);
  
  // Proximity thresholds
  const CLOSE_DISTANCE = 80;  // When shelf "notices" player
  const VERY_CLOSE = 50;      // When shelf gets excited
  
  // Proximity factor (0 = far, 1 = very close)
  const proximityFactor = Math.max(0, Math.min(1, (CLOSE_DISTANCE - distanceToPlayer) / CLOSE_DISTANCE));
  
  // Check if carrying matching book
  let shouldGlow = false;
  let carryingMatchingBook = false;
  for (const book of player.carrying) {
    if (book && book.type === shelf.type) {
      shouldGlow = true;
      carryingMatchingBook = true;
      break;
    }
  }
  
  // ═══ PROXIMITY EFFECTS ═══
  
  // 1. LEAN FORWARD when player approaches
  const leanAngle = proximityFactor * 0.08; // Up to ~4.5 degrees
  const leanDirection = dx / CLOSE_DISTANCE; // Lean toward player
  
  // 2. BRIGHTNESS increase for books
  const brightnessBoost = 1 + proximityFactor * 0.15; // Up to +15% brightness
  
  // 3. SCALE increase
  const proximityScale = 1 + proximityFactor * 0.05; // Up to +5% size
  
  // 4. PARTICLE INTENSITY increase
  const particleChanceMultiplier = 1 + proximityFactor * 2; // Up to 3x spawn rate
  
  // 5. EXCITED PULSE when carrying matching book
  let excitementScale = 1;
  let pullingMotion = 0;
  if (carryingMatchingBook) {
    const excitementPulse = Math.sin(time * 0.015) * 0.5 + 0.5;
    excitementScale = 1 + excitementPulse * 0.08; // Excited bouncing
    
    // Gentle pulling motion (shelf "reaches" toward player)
    pullingMotion = Math.sin(time * 0.01) * 3 * proximityFactor;
  }
  
  // ═══════════════════════════════════════════════════════════════════════
  // NINTENDO MAGIC: COMBO REACTION TRANSFORMATIONS
  // ═══════════════════════════════════════════════════════════════════════
  
  let comboScale = 1;
  let comboDanceOffset = 0;
  let comboPulseGlow = 0;
  
  // 3x COMBO - Pulse
  if (shelf.comboPulse > 0) {
    const pulseAmount = shelf.comboPulse * 0.15;
    comboScale += pulseAmount;
    comboPulseGlow = shelf.comboPulse * 0.3;
  }
  
  // 5x COMBO - Bounce
  if (shelf.comboBounce > 0) {
    const bounceY = Math.sin(shelf.comboBounce * Math.PI * 4) * 8;
    y += bounceY * shelf.comboBounce;
    comboScale += shelf.comboBounce * 0.1;
  }
  
  // 10x COMBO - Dance (sway left-right)
  if (shelf.comboDance > 0) {
    const dancePhase = (2000 - shelf.comboDance) * 0.008;
    comboDanceOffset = Math.sin(dancePhase) * 15;
  }
  
  // 15x COMBO - Celebration
  if (shelf.comboCelebration > 0) {
    const celebPhase = (3000 - shelf.comboCelebration) * 0.01;
    comboDanceOffset += Math.sin(celebPhase) * 20;
    comboScale += Math.sin(celebPhase * 2) * 0.2;
  }
  
  // 20x+ COMBO - FRENZY MODE (rainbow glow)
  let rainbowGlow = null;
  if (window.libraryFrenzy) {
    const rainbowPhase = (window.comboState?.rainbowPhase || 0) + shelves.indexOf(shelf) * 0.5;
    const hue = (rainbowPhase * 60) % 360;
    rainbowGlow = `hsl(${hue}, 100%, 60%)`;
    
    // Frenzy pulse
    const frenzyPulse = Math.sin(time * 0.02) * 0.1 + 0.9;
    comboScale *= frenzyPulse;
  }
  
  // Apply transformations
  ctx.save();
  ctx.translate(x + pullingMotion * leanDirection + comboDanceOffset, y);
  ctx.rotate(leanAngle * leanDirection);
  ctx.scale(proximityScale * excitementScale * comboScale, proximityScale * excitementScale * comboScale);
  ctx.translate(-x, -y);
  
  // ═══ COMBO PULSE GLOW ═══
  if (comboPulseGlow > 0) {
    ctx.globalAlpha = comboPulseGlow;
    ctx.fillStyle = SHELF_GLOW[shelf.type];
    ctx.beginPath();
    ctx.arc(x, y, 60, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  
  // ═══ FRENZY MODE RAINBOW GLOW ═══
  if (rainbowGlow) {
    const frenzyPulse = Math.sin(time * 0.015 + shelves.indexOf(shelf)) * 0.3 + 0.7;
    ctx.globalAlpha = frenzyPulse * 0.4;
    ctx.fillStyle = rainbowGlow;
    ctx.fillRect(x - 50, y - 40, 100, 80);
    
    // Rainbow ring
    ctx.strokeStyle = rainbowGlow;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(x, y, 55 + frenzyPulse * 5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  
  // ═══ PROXIMITY GLOW RING ═══
  if (proximityFactor > 0.3 && !carryingMatchingBook) {
    ctx.globalAlpha = proximityFactor * 0.2;
    ctx.strokeStyle = SHELF_GLOW[shelf.type] || '#ffffff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, 60, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  
  // ═══════════════════════════════════════════════════════════════════════
  // NINTENDO MAGIC: PROMINENT MATCHING BOOK GLOW
  // "Where does this book go? THE SHELF SHOWS YOU!"
  // ═══════════════════════════════════════════════════════════════════════
  if (shouldGlow) {
    const pulse = Math.sin(shelf.glowPulse) * 0.3 + 0.7;
    const strongPulse = Math.sin(shelf.glowPulse * 2) * 0.5 + 0.5;
    const glowColor = SHELF_GLOW[shelf.type];
    
    // LARGE OUTER GLOW (very visible from distance)
    ctx.globalAlpha = 0.4 * pulse;
    ctx.fillStyle = glowColor;
    ctx.fillRect(x - 70, y - 60, 140, 120);
    
    // MEDIUM GLOW LAYER (builds intensity)
    ctx.globalAlpha = 0.6 * pulse;
    ctx.fillStyle = glowColor;
    ctx.fillRect(x - 55, y - 45, 110, 90);
    
    // BRIGHT CORE GLOW (high intensity center)
    const glowIntensity = 0.7 + proximityFactor * 0.3;
    ctx.globalAlpha = glowIntensity * pulse;
    ctx.fillStyle = glowColor;
    ctx.fillRect(x - 45, y - 35, 90, 70);
    
    // PULSING RING 1 (outer)
    ctx.strokeStyle = glowColor;
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.7 * strongPulse;
    ctx.beginPath();
    ctx.arc(x, y, 65 + strongPulse * 10, 0, Math.PI * 2);
    ctx.stroke();
    
    // PULSING RING 2 (middle)
    ctx.lineWidth = 5;
    ctx.globalAlpha = 0.8 * pulse;
    ctx.beginPath();
    ctx.arc(x, y, 50 + pulse * 8, 0, Math.PI * 2);
    ctx.stroke();
    
    // PULSING RING 3 (inner - strongest)
    ctx.lineWidth = 6;
    ctx.globalAlpha = 0.9 * strongPulse;
    ctx.beginPath();
    ctx.arc(x, y, 35 + strongPulse * 5, 0, Math.PI * 2);
    ctx.stroke();
    
    // RADIAL GLOW RAYS (dramatic effect)
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2 + shelf.glowPulse * 0.5;
      const rayLength = 20 + strongPulse * 10;
      
      ctx.strokeStyle = glowColor;
      ctx.lineWidth = 3;
      ctx.globalAlpha = 0.4 * pulse;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(angle) * 40, y + Math.sin(angle) * 40);
      ctx.lineTo(x + Math.cos(angle) * (40 + rayLength), y + Math.sin(angle) * (40 + rayLength));
      ctx.stroke();
    }
    
    // SPARKLE PARTICLES (constantly spawning when carrying book)
    if (Math.random() < 0.15) { // 15% chance per frame
      const sparkleAngle = Math.random() * Math.PI * 2;
      const sparkleDistance = 40 + Math.random() * 20;
      PARTICLE_TYPES.SPARKLE(
        x + Math.cos(sparkleAngle) * sparkleDistance,
        y + Math.sin(sparkleAngle) * sparkleDistance,
        glowColor,
        800
      );
    }
    
    // Extra excited glow when close
    if (proximityFactor > 0.5) {
      // MASSIVE PROXIMITY RING
      ctx.globalAlpha = proximityFactor * 0.5 * pulse;
      ctx.strokeStyle = glowColor;
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.arc(x, y, 70 + pulse * 10, 0, Math.PI * 2);
      ctx.stroke();
      
      // BRIGHT FLASH when very close
      ctx.globalAlpha = (proximityFactor - 0.5) * 2 * strongPulse * 0.3;
      ctx.fillStyle = glowColor;
      ctx.fillRect(x - 60, y - 50, 120, 100);
    }
    
    ctx.globalAlpha = 1;
  }
  
  // ═══ BEAM OF LIGHT when carrying matching book and close ═══
  if (carryingMatchingBook && proximityFactor > 0.3) {
    const beamAlpha = proximityFactor * 0.5; // Increased from 0.4
    const gradient = ctx.createLinearGradient(x, y, player.x, player.y);
    gradient.addColorStop(0, SHELF_GLOW[shelf.type] + 'AA'); // Brighter start
    gradient.addColorStop(0.5, SHELF_GLOW[shelf.type] + '60'); // Brighter middle
    gradient.addColorStop(1, SHELF_GLOW[shelf.type] + '00');
    
    ctx.globalAlpha = beamAlpha * Math.sin(time * 0.01) * 0.5 + 0.5;
    ctx.strokeStyle = gradient;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(player.x, player.y);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  
  // Possessed shelf - purple pulsing danger indicator
  if (shelf.possessed) {
    const pulse = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
    ctx.globalAlpha = pulse * 0.6;
    ctx.fillStyle = '#aa44aa';
    ctx.fillRect(x - 50, y - 40, 100, 80);
    
    // Warning ring
    ctx.strokeStyle = '#ff44aa';
    ctx.lineWidth = 3;
    ctx.globalAlpha = pulse * 0.8;
    ctx.beginPath();
    ctx.arc(x, y, 45, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  
  // Acceptance pulse
  if (shelf.acceptPulse > 0) {
    ctx.globalAlpha = shelf.acceptPulse * 0.6;
    ctx.fillStyle = SHELF_GLOW[shelf.type];
    const r = 40 + (1 - shelf.acceptPulse) * 40;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.globalAlpha = shelf.acceptPulse * 0.3;
    ctx.beginPath();
    ctx.arc(x, y, r + 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  
  // Shadow (all shelves)
  ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
  ctx.fillRect(x - shelfW/2 + 2, y - shelfH/2 + 50, shelfW, 6);
  
  // ═══════════════════════════════════════════════════════════════════════
  // RENDER UNIQUE SHELF BASED ON TYPE
  // ═══════════════════════════════════════════════════════════════════════
  
  switch(shelf.type) {
    
    // ─── FICTION: Elegant Library Shelf ─────────────────────────────────
    case 'FICTION':
      // Polished oak wood
      ctx.fillStyle = '#c8945a';
      ctx.fillRect(x - shelfW/2, y - shelfH/2, shelfW, shelfH);
      
      // Gold trim border
      ctx.strokeStyle = '#d4af37';
      ctx.lineWidth = 2;
      ctx.strokeRect(x - shelfW/2, y - shelfH/2, shelfW, shelfH);
      
      // Elegant shelves
      ctx.fillStyle = '#a8743a';
      ctx.fillRect(x - shelfW/2 + 2, y - shelfH/2 + 14, shelfW - 4, 2);
      ctx.fillRect(x - shelfW/2 + 2, y, shelfW - 4, 2);
      ctx.fillRect(x - shelfW/2 + 2, y + shelfH/2 - 16, shelfW - 4, 2);
      
      // Decorative carved pattern
      ctx.strokeStyle = '#d4af37';
      ctx.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        const py = y - shelfH/2 + 7 + i * 14;
        ctx.beginPath();
        ctx.moveTo(x - 10, py);
        ctx.quadraticCurveTo(x, py - 3, x + 10, py);
        ctx.stroke();
      }
      
      // Varied fiction books
      const fictionBooks = [
        {x: -30, w: 5, h: 10, color: '#c24a4a'},
        {x: -20, w: 4, h: 12, color: '#4a8ac2'},
        {x: -14, w: 6, h: 9, color: '#6ac24a'},
        {x: -5, w: 5, h: 11, color: '#c2a44a'},
        {x: 5, w: 4, h: 8, color: '#9a4ac2'},
        {x: 12, w: 7, h: 10, color: '#c24a8a'},
        {x: 22, w: 5, h: 13, color: '#4ac2a4'}
      ];
      
      for (const book of fictionBooks) {
        ctx.fillStyle = book.color;
        ctx.globalAlpha = 0.5;
        ctx.fillRect(x + book.x, y + shelfH/2 - 16 - book.h, book.w, book.h);
        // Book spine
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(x + book.x, y + shelfH/2 - 16 - book.h, 1, book.h);
      }
      ctx.globalAlpha = 1;
      
      // Small decorative quill
      ctx.strokeStyle = '#8a6a3a';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + 30, y - 20);
      ctx.lineTo(x + 32, y - 10);
      ctx.stroke();
      break;
      
    // ═══════════════════════════════════════════════════════════════════════
    // ROMANCE SHELF - ULTIMATE ROMANTIC ENHANCEMENT V2
    // Every detail screams LOVE - Nintendo AAA+ Quality POLISHED
    // ═══════════════════════════════════════════════════════════════════════
    case 'ROMANCE':
      // BACKGROUND: Soft rose gradient (subtle depth)
      const romanceGrad = ctx.createLinearGradient(x, y - shelfH/2, x, y + shelfH/2);
      romanceGrad.addColorStop(0, '#ffe8f0');
      romanceGrad.addColorStop(0.5, '#ffd8e8');
      romanceGrad.addColorStop(1, '#ffc8e0');
      ctx.fillStyle = romanceGrad;
      ctx.fillRect(x - shelfW/2, y - shelfH/2, shelfW, shelfH);
      
      // Subtle bokeh light spots (romantic atmosphere)
      ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
      const bokehSpots = [
        {x: -35, y: -20, size: 12},
        {x: 25, y: -25, size: 15},
        {x: -15, y: 15, size: 10},
        {x: 30, y: 20, size: 13}
      ];
      for (const spot of bokehSpots) {
        ctx.beginPath();
        ctx.arc(x + spot.x, y + spot.y, spot.size, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // BORDER: Rose gold ornate frame (triple layer with proper hierarchy)
      ctx.strokeStyle = '#d8a8b8';
      ctx.lineWidth = 4;
      ctx.globalAlpha = 0.9;
      ctx.strokeRect(x - shelfW/2, y - shelfH/2, shelfW, shelfH);
      
      ctx.strokeStyle = '#ff8aaa';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.5;
      ctx.strokeRect(x - shelfW/2 + 2, y - shelfH/2 + 2, shelfW - 4, shelfH - 4);
      ctx.globalAlpha = 1;
      
      // Corner heart flourishes (elegant, not overwhelming)
      const romanceCorners = [
        {x: x - shelfW/2 + 8, y: y - shelfH/2 + 8},
        {x: x + shelfW/2 - 8, y: y - shelfH/2 + 8},
        {x: x - shelfW/2 + 8, y: y + shelfH/2 - 8},
        {x: x + shelfW/2 - 8, y: y + shelfH/2 - 8}
      ];
      
      for (const corner of romanceCorners) {
        ctx.fillStyle = '#ff6b9d';
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.moveTo(corner.x, corner.y + 2);
        ctx.arc(corner.x - 1.5, corner.y, 1.5, 0, Math.PI, true);
        ctx.arc(corner.x + 1.5, corner.y, 1.5, 0, Math.PI, true);
        ctx.closePath();
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      
      // ═══ PRIMARY FOCAL POINT: Large Ornate Heart (center, animated) ═══
      const heartCenterX = x;
      const heartCenterY = y - 5;
      const heartPulse = 1 + Math.sin(time * 0.004) * 0.08; // Slow, gentle pulse
      
      ctx.save();
      ctx.translate(heartCenterX, heartCenterY);
      ctx.scale(heartPulse, heartPulse);
      
      // Heart glow (soft aura)
      ctx.fillStyle = '#ff8aaa';
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.moveTo(0, 10);
      ctx.arc(-7, 0, 7, 0, Math.PI, true);
      ctx.arc(7, 0, 7, 0, Math.PI, true);
      ctx.closePath();
      ctx.fill();
      
      // Main heart body
      ctx.fillStyle = '#ff6b9d';
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      ctx.moveTo(0, 8);
      ctx.arc(-5.5, 0, 5.5, 0, Math.PI, true);
      ctx.arc(5.5, 0, 5.5, 0, Math.PI, true);
      ctx.closePath();
      ctx.fill();
      
      // Heart highlight (3D effect)
      ctx.fillStyle = '#ff9aaa';
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.moveTo(0, 5);
      ctx.arc(-3.5, 1, 3.5, 0, Math.PI, true);
      ctx.arc(3.5, 1, 3.5, 0, Math.PI, true);
      ctx.closePath();
      ctx.fill();
      
      // Cupid's arrow (golden, elegant)
      ctx.strokeStyle = '#d4af37';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.moveTo(-10, -6);
      ctx.lineTo(8, 4);
      ctx.stroke();
      
      // Arrow tip
      ctx.fillStyle = '#d4af37';
      ctx.beginPath();
      ctx.moveTo(8, 4);
      ctx.lineTo(5, 3);
      ctx.lineTo(6.5, 6);
      ctx.closePath();
      ctx.fill();
      
      // Arrow feathers
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1.2;
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.moveTo(-10, -6);
      ctx.lineTo(-11, -8);
      ctx.moveTo(-10, -6);
      ctx.lineTo(-11, -4);
      ctx.stroke();
      
      ctx.restore();
      ctx.globalAlpha = 1;
      
      // ═══ SECONDARY: Hearts Garland (top, staggered animation) ═══
      const garlandHearts = [
        {x: -42, phase: 0},
        {x: -28, phase: Math.PI/4},
        {x: -14, phase: Math.PI/2},
        {x: 0, phase: Math.PI*3/4},
        {x: 14, phase: Math.PI},
        {x: 28, phase: Math.PI*5/4},
        {x: 42, phase: Math.PI*3/2}
      ];
      
      for (const gh of garlandHearts) {
        const hx = x + gh.x;
        const hy = y - shelfH/2 + 10;
        const hPulse = 0.85 + Math.sin(time * 0.005 + gh.phase) * 0.15;
        
        ctx.save();
        ctx.translate(hx, hy);
        ctx.scale(hPulse, hPulse);
        
        ctx.fillStyle = '#ff8aaa';
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.moveTo(0, 2.5);
        ctx.arc(-2, 0, 2, 0, Math.PI, true);
        ctx.arc(2, 0, 2, 0, Math.PI, true);
        ctx.closePath();
        ctx.fill();
        
        ctx.restore();
      }
      ctx.globalAlpha = 1;
      
      // Garland string (connecting hearts)
      ctx.strokeStyle = '#ff9aaa';
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.moveTo(x - 45, y - shelfH/2 + 10);
      for (let i = 0; i < 7; i++) {
        const hx = x - 42 + i * 14;
        const curve = Math.sin((i / 6) * Math.PI) * 3;
        ctx.quadraticCurveTo(hx + 7, y - shelfH/2 + 12 + curve, hx + 14, y - shelfH/2 + 10);
      }
      ctx.stroke();
      ctx.globalAlpha = 1;
      
      // ═══ TERTIARY LEFT: Rose Garden (refined, fewer roses) ═══
      // Main vine (elegant curve)
      ctx.strokeStyle = '#c88aaa';
      ctx.lineWidth = 2.5;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.moveTo(x - shelfW/2 + 8, y - shelfH/2 + 18);
      ctx.bezierCurveTo(x - shelfW/2 + 22, y - 10, x - shelfW/2 + 15, y + 5, x - shelfW/2 + 18, y + 20);
      ctx.stroke();
      ctx.globalAlpha = 1;
      
      // Leaves (fewer, strategic placement)
      ctx.fillStyle = '#8ac88a';
      ctx.globalAlpha = 0.5;
      const romanceLeaves = [
        {x: x - shelfW/2 + 14, y: y - 8, angle: -0.4},
        {x: x - shelfW/2 + 16, y: y + 4, angle: 0.3},
        {x: x - shelfW/2 + 15, y: y + 14, angle: -0.2}
      ];
      
      for (const leaf of romanceLeaves) {
        ctx.save();
        ctx.translate(leaf.x, leaf.y);
        ctx.rotate(leaf.angle);
        ctx.beginPath();
        ctx.ellipse(0, 0, 2, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      ctx.globalAlpha = 1;
      
      // Rose blooms (3 detailed roses - fewer but prettier)
      const romanceRoses = [
        {x: x - shelfW/2 + 15, y: y - 10, size: 5},
        {x: x - shelfW/2 + 17, y: y + 3, size: 6}, // Largest
        {x: x - shelfW/2 + 15, y: y + 15, size: 4.5}
      ];
      
      for (const rose of romanceRoses) {
        // Outer petals (3 layers for depth)
        const petalLayers = [
          {color: '#ff9aaa', radius: rose.size, alpha: 0.7},
          {color: '#ff8aaa', radius: rose.size * 0.7, alpha: 0.8},
          {color: '#ff6b9d', radius: rose.size * 0.4, alpha: 0.9}
        ];
        
        for (const layer of petalLayers) {
          ctx.fillStyle = layer.color;
          ctx.globalAlpha = layer.alpha;
          ctx.beginPath();
          ctx.arc(rose.x, rose.y, layer.radius, 0, Math.PI * 2);
          ctx.fill();
        }
        
        // Rose highlight
        ctx.fillStyle = '#ffffff';
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.arc(rose.x - 1, rose.y - 1, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      
      // ═══ TERTIARY RIGHT: Pearl Necklace (shiny, elegant) ═══
      const pearlStart = {x: x + shelfW/2 - 32, y: y - shelfH/2 + 14};
      const pearlCount = 8;
      
      // Golden chain (delicate)
      ctx.strokeStyle = '#d4af37';
      ctx.lineWidth = 0.6;
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.moveTo(pearlStart.x, pearlStart.y);
      for (let i = 0; i <= pearlCount; i++) {
        const px = pearlStart.x + i * 4;
        const py = pearlStart.y + Math.sin(i * 0.7) * 5;
        ctx.lineTo(px, py);
      }
      ctx.stroke();
      ctx.globalAlpha = 1;
      
      // Lustrous pearls
      for (let i = 0; i <= pearlCount; i++) {
        const px = pearlStart.x + i * 4;
        const py = pearlStart.y + Math.sin(i * 0.7) * 5;
        const pearlShine = 0.8 + Math.sin(time * 0.003 + i * 0.5) * 0.2;
        
        // Pearl body
        ctx.fillStyle = '#f8f8ff';
        ctx.globalAlpha = 0.95;
        ctx.beginPath();
        ctx.arc(px, py, 2, 0, Math.PI * 2);
        ctx.fill();
        
        // Pearl highlight (lustrous shine)
        ctx.fillStyle = '#ffffff';
        ctx.globalAlpha = pearlShine * 0.8;
        ctx.beginPath();
        ctx.arc(px - 0.6, py - 0.6, 0.8, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      
      // ═══ BOTTOM ACCENTS: Champagne & Ring (refined) ═══
      // Champagne glass (left)
      const glass1X = x - 28;
      const glassY = y + shelfH/2 - 18;
      
      ctx.strokeStyle = '#d8e8f8';
      ctx.lineWidth = 1.2;
      ctx.globalAlpha = 0.7;
      
      // Single elegant glass
      ctx.beginPath();
      ctx.moveTo(glass1X, glassY + 8);
      ctx.lineTo(glass1X, glassY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(glass1X - 3, glassY);
      ctx.lineTo(glass1X - 3.5, glassY - 5);
      ctx.lineTo(glass1X + 3.5, glassY - 5);
      ctx.lineTo(glass1X + 3, glassY);
      ctx.stroke();
      
      // Champagne (golden)
      ctx.fillStyle = '#f0d860';
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.moveTo(glass1X - 3, glassY - 2);
      ctx.lineTo(glass1X - 3.3, glassY - 5);
      ctx.lineTo(glass1X + 3.3, glassY - 5);
      ctx.lineTo(glass1X + 3, glassY - 2);
      ctx.closePath();
      ctx.fill();
      
      // Rising bubbles (animated)
      for (let i = 0; i < 3; i++) {
        const bubbleY = glassY - 3 + i * 1.5 - ((time * 0.03 + i * 2) % 6);
        if (bubbleY < glassY - 5 || bubbleY > glassY - 2) continue;
        ctx.fillStyle = '#ffffff';
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.arc(glass1X + (i % 2 === 0 ? -1 : 1), bubbleY, 0.6, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      
      // Ring box (right)
      const ringX = x + 28;
      const ringY = y + shelfH/2 - 18;
      
      // Velvet box
      ctx.fillStyle = '#c84a6a';
      ctx.globalAlpha = 0.8;
      ctx.fillRect(ringX - 4, ringY, 8, 6);
      
      // Open lid
      ctx.fillRect(ringX - 4, ringY - 4, 8, 1.5);
      ctx.beginPath();
      ctx.moveTo(ringX - 4, ringY - 4);
      ctx.lineTo(ringX - 3, ringY - 7);
      ctx.lineTo(ringX + 3, ringY - 7);
      ctx.lineTo(ringX + 4, ringY - 4);
      ctx.closePath();
      ctx.fill();
      
      // Diamond ring
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = 0.95;
      ctx.beginPath();
      ctx.moveTo(ringX, ringY);
      ctx.lineTo(ringX - 1.5, ringY + 2);
      ctx.lineTo(ringX + 1.5, ringY + 2);
      ctx.closePath();
      ctx.fill();
      
      // Diamond sparkle

      ctx.globalAlpha = 0.8;
      ctx.strokeRect(x - shelfW/2, y - shelfH/2, shelfW, shelfH);
      
      // Inner rainbow border
      ctx.strokeStyle = `hsl(${hue2}, 100%, 60%)`;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.6;
      ctx.strokeRect(x - shelfW/2 + 3, y - shelfH/2 + 3, shelfW - 6, shelfH - 6);
      ctx.globalAlpha = 1;
      
      // ═══ CENTER: LARGE MORPHING GEOMETRIC SHAPES ═══
      const morphX = x;
      const morphY = y;
      const morphProgress = (time * 0.002) % 1;
      const sides = 3 + Math.floor(morphProgress * 5); // 3 to 7 sides
      
      ctx.save();
      ctx.translate(morphX, morphY);
      ctx.rotate(time * 0.001);
      
      // Outer shape (LARGE - 30px radius)
      ctx.strokeStyle = `hsl(${hue2}, 100%, 60%)`;
      ctx.lineWidth = 3;
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      for (let i = 0; i <= sides; i++) {
        const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
        const px = Math.cos(angle) * 30;
        const py = Math.sin(angle) * 30;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
      
      // Middle shape
      ctx.strokeStyle = `hsl(${hue3}, 100%, 60%)`;
      ctx.lineWidth = 2.5;
      ctx.rotate(Math.PI / sides);
      ctx.beginPath();
      for (let i = 0; i <= sides; i++) {
        const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
        const px = Math.cos(angle) * 20;
        const py = Math.sin(angle) * 20;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
      
      // Inner shape (inverted rotation)
      ctx.strokeStyle = `hsl(${hue1}, 100%, 70%)`;
      ctx.lineWidth = 2;
      ctx.rotate(Math.PI / sides);
      ctx.beginPath();
      for (let i = 0; i <= sides; i++) {
        const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
        const px = Math.cos(angle) * 12;
        const py = Math.sin(angle) * 12;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
      
      // Central pulsing core
      const corePulse = Math.sin(time * 0.008) * 0.4 + 0.6;
      const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 8 * corePulse);
      coreGrad.addColorStop(0, `hsl(${hue1}, 100%, 80%)`);
      coreGrad.addColorStop(0.5, `hsl(${hue2}, 100%, 60%)`);
      coreGrad.addColorStop(1, `hsl(${hue3}, 100%, 40%)`);
      ctx.fillStyle = coreGrad;
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.arc(0, 0, 8 * corePulse, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.restore();
      ctx.globalAlpha = 1;
      
      // ═══ CORNER VORTEXES (swirling patterns) ═══
      const vortexes = [
        {x: x - shelfW/2 + 10, y: y - shelfH/2 + 10},
        {x: x + shelfW/2 - 10, y: y - shelfH/2 + 10},
        {x: x - shelfW/2 + 10, y: y + shelfH/2 - 10},
        {x: x + shelfW/2 - 10, y: y + shelfH/2 - 10}
      ];
      
      for (let v = 0; v < vortexes.length; v++) {
        const vortex = vortexes[v];
        ctx.save();
        ctx.translate(vortex.x, vortex.y);
        ctx.rotate(time * 0.004 * (v % 2 === 0 ? 1 : -1));
        
        for (let i = 0; i < 4; i++) {
          const vortexRadius = 3 + i * 2;
          const vortexHue = (hue1 + v * 90 + i * 30) % 360;
          
          ctx.strokeStyle = `hsl(${vortexHue}, 100%, 60%)`;
          ctx.lineWidth = 1.5;
          ctx.globalAlpha = 0.6;
          ctx.beginPath();
          ctx.arc(0, 0, vortexRadius, i * Math.PI / 4, i * Math.PI / 4 + Math.PI);
          ctx.stroke();
        }
        
        ctx.restore();
        ctx.globalAlpha = 1;
      }
      
      // ═══ PARTICLES: RAINBOW SPARKLES & FLOATING GLYPHS ═══
      if (Math.random() < 0.08 * particleChanceMultiplier) {
        emitParticle({
          x: x + rnd(-shelfW/2, shelfW/2),
          y: y + shelfH/2,
          vx: rnd(-12, 12),
          vy: rnd(-35, -20),
          life: 2500,
          maxLife: 2500,
          color: `hsl(${Math.random() * 360}, 100%, 70%)`,
          size: rnd(2, 5),
          type: 'sparkle',
          alpha: 0.9,
          rotation: Math.random() * Math.PI * 2,
          rotationSpeed: rnd(-0.05, 0.05)
        });
      }
      
      // Floating symbols
      if (Math.random() < 0.04 * particleChanceMultiplier) {
        const glyphSymbols = ['◈', '◉', '◊', '⬡', '⬢', '◯', '⭘', '⊙'];
        emitParticle({
          x: x + rnd(-shelfW/2 + 10, shelfW/2 - 10),
          y: y + shelfH/2,
          vx: rnd(-8, 8),
          vy: -25,
          life: 3000,
          maxLife: 3000,
          color: `hsl(${Math.random() * 360}, 100%, 70%)`,
          size: 10,
          type: 'code',
          alpha: 0.8,
          char: glyphSymbols[rint(0, glyphSymbols.length - 1)]
        });
      }
      break;

      
      // ═══ TOP CENTER: HYPNOTIC SPIRAL (rotating, mesmerizing) ═══
      const spiralX = x;
      const spiralY = y - shelfH/2 + 20;
      const spiralRotate = time * 0.003;
      
      ctx.save();
      ctx.translate(spiralX, spiralY);
      ctx.rotate(spiralRotate);
      
      // Multi-layered spiral (8 arms)
      for (let arm = 0; arm < 8; arm++) {
        const armAngle = (arm / 8) * Math.PI * 2;
        ctx.strokeStyle = `hsl(${(hue1 + arm * 45) % 360}, 100%, 60%)`;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.8;
        
        ctx.beginPath();
        for (let i = 0; i < 30; i++) {
          const t = i / 30;
          const r = t * 15;
          const angle = armAngle + t * Math.PI * 4;
          const px = Math.cos(angle) * r;
          const py = Math.sin(angle) * r;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.stroke();
      }
      
      // Central pulsing eye
      const eyePulse = Math.sin(time * 0.008) * 0.4 + 0.6;
      const centerGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 5 * eyePulse);
      centerGrad.addColorStop(0, `hsl(${hue1}, 100%, 80%)`);
      centerGrad.addColorStop(0.5, `hsl(${hue2}, 100%, 60%)`);
      centerGrad.addColorStop(1, `hsl(${hue3}, 100%, 40%)`);
      ctx.fillStyle = centerGrad;
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      ctx.arc(0, 0, 5 * eyePulse, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.restore();
      ctx.globalAlpha = 1;
      
      // ═══ TOP LEFT: KALEIDOSCOPE MANDALA ═══
      const mandalaX = x - shelfW/2 + 20;
      const mandalaY = y - shelfH/2 + 20;
      const mandalaRotate = time * 0.002;
      
      ctx.save();
      ctx.translate(mandalaX, mandalaY);
      ctx.rotate(mandalaRotate);
      
      // 6-fold symmetry pattern
      for (let i = 0; i < 6; i++) {
        ctx.save();
        ctx.rotate((i / 6) * Math.PI * 2);
        
        // Petal shape
        ctx.fillStyle = `hsl(${(hue1 + i * 60) % 360}, 90%, 55%)`;
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.ellipse(0, -8, 4, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Inner detail
        ctx.fillStyle = `hsl(${(hue1 + i * 60 + 30) % 360}, 90%, 70%)`;
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.ellipse(0, -8, 2, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
      }
      
      // Center ring
      ctx.strokeStyle = `hsl(${hue1}, 100%, 70%)`;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.arc(0, 0, 4, 0, Math.PI * 2);
      ctx.stroke();
      
      ctx.restore();
      ctx.globalAlpha = 1;
      
      // ═══ TOP RIGHT: FRACTAL TREE (branching pattern) ═══
      const fractalX = x + shelfW/2 - 20;
      const fractalY = y - shelfH/2 + 30;
      const fractalWave = Math.sin(time * 0.003);
      
      function drawFractalBranch(x, y, length, angle, depth, baseHue) {
        if (depth === 0 || length < 1) return;
        
        const endX = x + Math.cos(angle) * length;
        const endY = y + Math.sin(angle) * length;
        
        ctx.strokeStyle = `hsl(${(baseHue + depth * 40) % 360}, 90%, ${70 - depth * 10}%)`;
        ctx.lineWidth = depth * 0.8;
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        
        // Branch recursively
        const angleOffset = 0.5 + fractalWave * 0.2;
        drawFractalBranch(endX, endY, length * 0.67, angle - angleOffset, depth - 1, baseHue);
        drawFractalBranch(endX, endY, length * 0.67, angle + angleOffset, depth - 1, baseHue);
      }
      
      ctx.save();
      drawFractalBranch(fractalX, fractalY, 10, -Math.PI/2, 4, hue1);
      ctx.restore();
      ctx.globalAlpha = 1;
      
      // ═══ LEFT SIDE: WAVE INTERFERENCE PATTERN ═══
      const waveX = x - shelfW/2 + 15;
      const waveY = y;
      
      for (let i = 0; i < 5; i++) {
        const waveOffset = time * 0.002 + i * 0.5;
        const waveRadius = 4 + Math.sin(waveOffset) * 2;
        
        ctx.strokeStyle = `hsl(${(hue1 + i * 72) % 360}, 100%, 60%)`;
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.arc(waveX, waveY, waveRadius + i * 3, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      
      // ═══ RIGHT SIDE: PLASMA BALL EFFECT ═══
      const plasmaX = x + shelfW/2 - 15;
      const plasmaY = y;
      
      // Outer glow
      const plasmaGrad = ctx.createRadialGradient(plasmaX, plasmaY, 0, plasmaX, plasmaY, 12);
      plasmaGrad.addColorStop(0, `hsl(${hue1}, 100%, 70%)`);
      plasmaGrad.addColorStop(0.5, `hsl(${hue2}, 100%, 50%)`);
      plasmaGrad.addColorStop(1, `hsla(${hue3}, 100%, 30%, 0)`);
      ctx.fillStyle = plasmaGrad;
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.arc(plasmaX, plasmaY, 12, 0, Math.PI * 2);
      ctx.fill();
      
      // Lightning bolts
      for (let i = 0; i < 6; i++) {
        const boltAngle = (i / 6) * Math.PI * 2 + time * 0.005;
        const boltLength = 8 + Math.sin(time * 0.01 + i) * 3;
        
        ctx.strokeStyle = `hsl(${(hue1 + i * 60) % 360}, 100%, 80%)`;
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.moveTo(plasmaX, plasmaY);
        
        // Jagged lightning path
        for (let j = 0; j < 3; j++) {
          const t = (j + 1) / 3;
          const jag = (Math.sin(time * 0.02 + i + j) * 2);
          const px = plasmaX + Math.cos(boltAngle) * boltLength * t + jag;
          const py = plasmaY + Math.sin(boltAngle) * boltLength * t + jag;
          ctx.lineTo(px, py);
        }
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      
      // ═══ BOTTOM: TRIPPY BOOKS (shifting colors, wavy) ═══
      const trippyBooks = [
        {x: -48, w: 9, h: 16},
        {x: -36, w: 8, h: 18},
        {x: -25, w: 9, h: 15},
        {x: -13, w: 8, h: 17},
        {x: -2, w: 9, h: 16},
        {x: 10, w: 8, h: 19},
        {x: 21, w: 9, h: 14},
        {x: 33, w: 8, h: 17}
      ];
      
      for (let i = 0; i < trippyBooks.length; i++) {
        const book = trippyBooks[i];
        const bookHue = (hue1 + i * 45 + time * 10) % 360;
        const bookWave = Math.sin(time * 0.005 + i) * 2;
        
        ctx.save();
        ctx.translate(x + book.x, y + shelfH/2 - 26 - book.h/2 + bookWave);
        ctx.rotate(Math.sin(time * 0.003 + i) * 0.1);
        
        // Book gradient (shifting)
        const bookGrad = ctx.createLinearGradient(-book.w/2, -book.h/2, book.w/2, book.h/2);
        bookGrad.addColorStop(0, `hsl(${bookHue}, 90%, 50%)`);
        bookGrad.addColorStop(0.5, `hsl(${(bookHue + 60) % 360}, 90%, 60%)`);
        bookGrad.addColorStop(1, `hsl(${bookHue}, 90%, 50%)`);
        ctx.fillStyle = bookGrad;
        ctx.globalAlpha = 0.9;
        ctx.fillRect(-book.w/2, -book.h/2, book.w, book.h);
        
        // Glowing edge
        ctx.strokeStyle = `hsl(${(bookHue + 180) % 360}, 100%, 70%)`;
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = 0.8;
        ctx.strokeRect(-book.w/2, -book.h/2, book.w, book.h);
        
        // Pulsing symbol
        const symbolPulse = Math.sin(time * 0.006 + i) * 0.3 + 0.7;
        ctx.fillStyle = `hsl(${(bookHue + 120) % 360}, 100%, 90%)`;
        ctx.globalAlpha = symbolPulse;
        ctx.font = 'bold 8px Arial';
        ctx.textAlign = 'center';
        const symbols = ['◈', '◉', '◊', '⬡', '⬢', '◯', '⭘', '⊙'];
        ctx.fillText(symbols[i], 0, 3);
        
        ctx.restore();
        ctx.globalAlpha = 1;
      }
      break;

    // ═══════════════════════════════════════════════════════════════════════
    // FANTASY SHELF - NINTENDO AAA+ POLISHED VERSION (~42 REFINED ELEMENTS)
    // Magical realm with dragons, castles, mystical runes, and enchantment
    // RED PALETTE - Fire, passion, magic, adventure
    // ═══════════════════════════════════════════════════════════════════════
    case 'FANTASY':
      // BACKGROUND: Deep mystical red with magical gradient
      const fantasyGrad = ctx.createLinearGradient(x, y - shelfH/2, x, y + shelfH/2);
      fantasyGrad.addColorStop(0, '#5a2a2a');
      fantasyGrad.addColorStop(0.5, '#6a3a3a');
      fantasyGrad.addColorStop(1, '#4a1a1a');
      ctx.fillStyle = fantasyGrad;
      ctx.fillRect(x - shelfW/2, y - shelfH/2, shelfW, shelfH);
      
      // Mystical stars background (scattered constellation)
      ctx.fillStyle = 'rgba(255, 200, 200, 0.3)';
      const fantasyStars = [
        {x: -45, y: -28, size: 1.5}, {x: -30, y: -20, size: 1},
        {x: -15, y: -32, size: 2}, {x: 5, y: -25, size: 1},
        {x: 20, y: -30, size: 1.5}, {x: 35, y: -22, size: 1},
        {x: 48, y: -29, size: 2}, {x: -40, y: 18, size: 1},
        {x: -20, y: 25, size: 1.5}, {x: 10, y: 20, size: 1},
        {x: 30, y: 28, size: 2}, {x: 45, y: 22, size: 1}
      ];
      for (const star of fantasyStars) {
        ctx.beginPath();
        ctx.arc(x + star.x, y + star.y, star.size, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // BORDER: Ornate golden magical frame
      ctx.strokeStyle = '#c8a84a';
      ctx.lineWidth = 3;
      ctx.strokeRect(x - shelfW/2, y - shelfH/2, shelfW, shelfH);
      
      // Inner magical glow border (red-orange)
      ctx.strokeStyle = '#ff6a4a';
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.6;
      ctx.strokeRect(x - shelfW/2 + 2, y - shelfH/2 + 2, shelfW - 4, shelfH - 4);
      ctx.globalAlpha = 1;
      
      // Corner runes (mystical symbols)
      const runeCorners = [
        {x: x - shelfW/2 + 8, y: y - shelfH/2 + 8, rune: '◈'},
        {x: x + shelfW/2 - 8, y: y - shelfH/2 + 8, rune: '◊'},
        {x: x - shelfW/2 + 8, y: y + shelfH/2 - 8, rune: '⬡'},
        {x: x + shelfW/2 - 8, y: y + shelfH/2 - 8, rune: '◉'}
      ];
      for (const corner of runeCorners) {
        ctx.fillStyle = '#ff8a6a';
        ctx.globalAlpha = 0.8 + Math.sin(time * 0.003) * 0.2;
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(corner.rune, corner.x, corner.y + 3);
      }
      ctx.globalAlpha = 1;
      
      // PRIMARY: Dragon silhouette (left side, breathing fire)
      const dragonX = x - 32;
      const dragonY = y - 8;
      
      // Dragon body
      ctx.fillStyle = '#1a0a0a';
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.ellipse(dragonX, dragonY, 12, 8, -0.3, 0, Math.PI * 2);
      ctx.fill();
      
      // Dragon head
      ctx.beginPath();
      ctx.ellipse(dragonX + 10, dragonY - 5, 6, 5, -0.5, 0, Math.PI * 2);
      ctx.fill();
      
      // Dragon wing
      ctx.beginPath();
      ctx.moveTo(dragonX - 5, dragonY);
      ctx.quadraticCurveTo(dragonX - 15, dragonY - 12, dragonX - 8, dragonY - 8);
      ctx.fill();
      
      // Dragon eye (glowing red)
      ctx.fillStyle = '#ff4a4a';
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      ctx.arc(dragonX + 12, dragonY - 6, 1.5, 0, Math.PI * 2);
      ctx.fill();
      
      // Fire breath (animated - bright red/orange/yellow)
      const fireFlicker = Math.sin(time * 0.008) * 0.3 + 0.7;
      const fireGrad = ctx.createLinearGradient(dragonX + 15, dragonY - 3, dragonX + 25, dragonY - 3);
      fireGrad.addColorStop(0, `rgba(255, 80, 40, ${fireFlicker * 0.9})`);
      fireGrad.addColorStop(0.5, `rgba(255, 150, 60, ${fireFlicker * 0.7})`);
      fireGrad.addColorStop(1, `rgba(255, 220, 100, 0)`);
      ctx.fillStyle = fireGrad;
      ctx.globalAlpha = fireFlicker;
      ctx.beginPath();
      ctx.moveTo(dragonX + 15, dragonY - 3);
      ctx.lineTo(dragonX + 25, dragonY - 6);
      ctx.lineTo(dragonX + 25, dragonY);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
      
      // SECONDARY: Castle tower (right side)
      const castleX = x + 28;
      const castleY = y + 8;
      
      // Tower body
      ctx.fillStyle = '#5a5a7a';
      ctx.fillRect(castleX - 8, castleY - 22, 16, 22);
      
      // Tower top (crenellations)
      ctx.fillRect(castleX - 10, castleY - 24, 4, 4);
      ctx.fillRect(castleX - 2, castleY - 24, 4, 4);
      ctx.fillRect(castleX + 6, castleY - 24, 4, 4);
      
      // Tower roof
      ctx.fillStyle = '#4a4a6a';
      ctx.beginPath();
      ctx.moveTo(castleX - 10, castleY - 20);
      ctx.lineTo(castleX, castleY - 28);
      ctx.lineTo(castleX + 10, castleY - 20);
      ctx.closePath();
      ctx.fill();
      
      // Tower window (glowing warm red/orange)
      ctx.fillStyle = '#ff8a4a';
      ctx.globalAlpha = 0.8 + Math.sin(time * 0.005) * 0.2;
      ctx.fillRect(castleX - 3, castleY - 15, 6, 8);
      ctx.strokeStyle = '#8a7a5a';
      ctx.lineWidth = 1;
      ctx.strokeRect(castleX - 3, castleY - 15, 6, 8);
      ctx.globalAlpha = 1;
      
      // CENTER: Magical crystal (glowing red, rotating)
      const crystalX = x;
      const crystalY = y - 20;
      const crystalPulse = Math.sin(time * 0.004) * 0.3 + 0.7;
      
      ctx.save();
      ctx.translate(crystalX, crystalY);
      ctx.rotate(time * 0.002);
      
      // Crystal glow (red)
      const crystalGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, 12);
      crystalGlow.addColorStop(0, `rgba(255, 80, 80, ${crystalPulse * 0.6})`);
      crystalGlow.addColorStop(0.5, `rgba(255, 80, 80, ${crystalPulse * 0.3})`);
      crystalGlow.addColorStop(1, 'rgba(255, 80, 80, 0)');
      ctx.fillStyle = crystalGlow;
      ctx.beginPath();
      ctx.arc(0, 0, 12, 0, Math.PI * 2);
      ctx.fill();
      
      // Crystal facets (red/orange)
      ctx.strokeStyle = '#ff6a4a';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      ctx.moveTo(0, -8);
      ctx.lineTo(-6, -2);
      ctx.lineTo(-6, 4);
      ctx.lineTo(0, 8);
      ctx.lineTo(6, 4);
      ctx.lineTo(6, -2);
      ctx.closePath();
      ctx.stroke();
      
      // Crystal highlight
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = crystalPulse * 0.8;
      ctx.beginPath();
      ctx.moveTo(0, -6);
      ctx.lineTo(-3, -1);
      ctx.lineTo(0, 2);
      ctx.closePath();
      ctx.fill();
      
      ctx.restore();
      ctx.globalAlpha = 1;
      
      // Magical sparkles (red/orange particles)
      if (Math.random() < 0.06 * particleChanceMultiplier) {
        emitParticle({
          x: x + rnd(-shelfW/2 + 10, shelfW/2 - 10),
          y: y + shelfH/2,
          vx: rnd(-8, 8),
          vy: rnd(-30, -20),
          life: 2000,
          maxLife: 2000,
          color: Math.random() > 0.5 ? '#ff6a4a' : '#ffa84a',
          size: rnd(2, 4),
          type: 'sparkle',
          alpha: 0.9
        });
      }
      
      // Fantasy books (leather-bound, mystical - red/burgundy tones)
      const fantasyBooks = [
        {x: -48, w: 7, h: 14, color: '#8a3a3a'},
        {x: -38, w: 6, h: 16, color: '#6a2a2a'},
        {x: -29, w: 8, h: 13, color: '#9a4a4a'},
        {x: -18, w: 7, h: 15, color: '#7a3a3a'},
        {x: -8, w: 6, h: 14, color: '#8a4a4a'},
        {x: 2, w: 7, h: 16, color: '#6a3a3a'},
        {x: 12, w: 8, h: 13, color: '#9a3a3a'},
        {x: 23, w: 6, h: 15, color: '#7a2a2a'}
      ];
      
      for (const book of fantasyBooks) {
        // Book
        ctx.fillStyle = book.color;
        ctx.fillRect(x + book.x, y + shelfH/2 - 18 - book.h, book.w, book.h);
        
        // Gold spine
