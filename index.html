// Polyfill ctx.roundRect for older engines (filing stamps need it)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    const rv = Array.isArray(r) ? r : [r, r, r, r];
    const [tl, tr, br, bl] = [rv[0]||0, rv[1]||0, rv[2]||0, rv[3]||0];
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + tr);
    this.lineTo(x + w, y + h - br);
    this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    this.lineTo(x + bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl);
    this.quadraticCurveTo(x, y, x + tl, y);
    this.closePath();
    return this;
  };
}

// ─────────────────────────────────────────────────────────────────────────────
// TECHNICAL IMPROVEMENT 1 — OBJECT POOL
// Pre-allocates particle objects and recycles them instead of GC-thrashing the
// heap with thousands of short-lived allocations per second.
// ─────────────────────────────────────────────────────────────────────────────
class ObjectPool {
  constructor(factory, reset, initialSize = 256) {
    this._factory = factory;
    this._reset   = reset;
    this._free    = [];
    // Pre-warm
    for (let i = 0; i < initialSize; i++) this._free.push(factory());
  }
  /** Borrow an object from the pool, expanding if empty. */
  get() {
    return this._free.length ? this._free.pop() : this._factory();
  }
  /** Return an object to the pool; resets it first. */
  release(obj) {
    this._reset(obj);
    this._free.push(obj);
  }
  get freeCount() { return this._free.length; }
}

// Shared particle pool (max ~1 200 live particles before old ones cap out)
const MAX_PARTICLES = 1200;
const particlePool = new ObjectPool(
  () => ({
    x:0, y:0, vx:0, vy:0, life:0, maxLife:0, color:'#fff',
    size:2, type:'circle', rotation:0, rotationSpeed:0,
    gravity:0, friction:0, expandRate:0, flutter:undefined,
    trail:false, fadeIn:false, alpha:1, char:undefined

  p => {

    p.flutter=undefined; p.trail=false; p.fadeIn=false;

  },
  512
);

// Helper: acquire a particle from the pool and push it into the live array
function emitParticle(props) {
  if (typeof particles === 'undefined') return; // guard during init
  if (particles.length >= MAX_PARTICLES) return; // hard cap
  const p = particlePool.get();
  Object.assign(p, props);
  particles.push(p);
}

// ─────────────────────────────────────────────────────────────────────────────
// TECHNICAL IMPROVEMENT 2 — SPATIAL HASH GRID
// Divides the playfield into fixed cells; entities register once per frame and
// collision queries only check the 9 neighbouring cells → effectively O(1).
// ─────────────────────────────────────────────────────────────────────────────
class SpatialHash {
  constructor(cellSize = 96) {
    this.cellSize = cellSize;
    this._cells   = new Map();
  }
  _key(cx, cy) { return (cx & 0xFFFF) | ((cy & 0xFFFF) << 16); }
  _cell(x, y)  { return this._key(Math.floor(x / this.cellSize), Math.floor(y / this.cellSize)); }

  clear()  { this._cells.clear(); }

  insert(obj, x, y) {
    const k = this._cell(x, y);
    let bucket = this._cells.get(k);
    if (!bucket) { bucket = []; this._cells.set(k, bucket); }
    bucket.push(obj);
  }

  /** Returns all objects within radius r of (x,y). */
  query(x, y, r) {
    const results = [];
    const cx0 = Math.floor((x - r) / this.cellSize);
    const cy0 = Math.floor((y - r) / this.cellSize);
    const cx1 = Math.floor((x + r) / this.cellSize);
    const cy1 = Math.floor((y + r) / this.cellSize);
    for (let cx = cx0; cx <= cx1; cx++) {
      for (let cy = cy0; cy <= cy1; cy++) {
        const bucket = this._cells.get(this._key(cx, cy));
        if (bucket) for (const o of bucket) results.push(o);
      }
    }
    return results;
  }
}

// Layout constants (computed once; updated on resize)
const TC = {          // Touch Controls layout cache
  joystickX: 0, joystickY: 0, joystickR: 0,   // base center + outer radius
  dashX:  0, dashY:  0, btnR: 0,
  throwX: 0, throwY: 0,
  chargeX:0, chargeY:0,
};

function updateTouchLayout() {
  const R = Math.min(W, H) * 0.12;  // joystick outer radius
  const btnR = Math.min(W, H) * 0.072;
  TC.joystickX = W * 0.18;
  TC.joystickY = H - R - 28;
  TC.joystickR = R;
  TC.btnR = btnR;
  // Three action buttons on the right, arranged in a triangle
  TC.dashX  = W - btnR * 1.1;
  TC.dashY  = H - btnR * 1.1 - 28;
  TC.throwX = W - btnR * 3.2;
  TC.throwY = H - btnR * 1.1 - 28;
  TC.chargeX= W - btnR * 2.15;
  TC.chargeY= H - btnR * 2.7 - 28;
}
updateTouchLayout();
window.addEventListener('resize', updateTouchLayout);

function isMobile() {
  return ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
}

function hitBtn(tx, ty, bx, by, r) {
  const dx = tx - bx, dy = ty - by;
  return dx*dx + dy*dy <= r*r;
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const tx = t.clientX, ty = t.clientY;
    // Joystick
    if (hitBtn(tx, ty, TC.joystickX, TC.joystickY, TC.joystickR * 1.4)) {
      touch.joystickActive = true;
      touch.joystickId = t.identifier;
      touch.joystickOriginX = tx;
      touch.joystickOriginY = ty;
      touch.joystickX = 0;
      touch.joystickY = 0;
    }
    // Dash
    else if (hitBtn(tx, ty, TC.dashX, TC.dashY, TC.btnR)) {
      touch.dashId = t.identifier;
      touch.dash = true;
      keyDown[' '] = true;
    }
    // Throw
    else if (hitBtn(tx, ty, TC.throwX, TC.throwY, TC.btnR)) {
      touch.throwId = t.identifier;
      touch.throw_ = true;
      keys['q'] = true;
    }
    // Charge
    else if (hitBtn(tx, ty, TC.chargeX, TC.chargeY, TC.btnR)) {
      touch.chargeId = t.identifier;
      touch.charge = true;
      keys['e'] = true;
    }
    // Tap on game world = tap-to-dash
    else if (state === 'menu' || state === 'difficulty' || state === 'gameover') {
      keyDown['enter'] = true;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touch.joystickId) {
      const dx = t.clientX - touch.joystickOriginX;
      const dy = t.clientY - touch.joystickOriginY;
      const len = Math.sqrt(dx*dx + dy*dy);
      const maxR = TC.joystickR;
      if (len > 0) {
        touch.joystickX = Math.max(-1, Math.min(1, dx / maxR));
        touch.joystickY = Math.max(-1, Math.min(1, dy / maxR));
      } else {
        touch.joystickX = 0;
        touch.joystickY = 0;
      }
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const id = t.identifier;
    if (id === touch.joystickId) {
      touch.joystickActive = false;
      touch.joystickId = -1;
      touch.joystickX = 0;
      touch.joystickY = 0;
    }
    if (id === touch.dashId)   { touch.dashId  = -1; touch.dash   = false; }
    if (id === touch.throwId)  { touch.throwId = -1; touch.throw_ = false; keys['q'] = false; }
    if (id === touch.chargeId) { touch.chargeId= -1; touch.charge = false; keys['e'] = false; }
  }
}, { passive: false });

canvas.addEventListener('touchcancel', e => {
  touch.joystickActive = false; touch.joystickId = -1;
  touch.joystickX = 0; touch.joystickY = 0;
  touch.dashId = -1; touch.dash = false;
  touch.throwId = -1; touch.throw_ = false; keys['q'] = false;
  touch.chargeId = -1; touch.charge = false; keys['e'] = false;
}, { passive: false });

// ── Math helpers ──────────────────────────────────────────────────────────
function dist(ax,ay,bx,by){ const dx=ax-bx, dy=ay-by; return Math.sqrt(dx*dx+dy*dy); }
function norm(x,y){ const l=Math.sqrt(x*x+y*y); return l?[x/l,y/l]:[0,0]; }
function lerp(a,b,t){ return a+(b-a)*t; }
function rnd(min,max){ return min+Math.random()*(max-min); }
function rint(min,max){ return Math.floor(rnd(min,max+1)); }
function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }

// ── Initialize Menu ────────────────────────────────────────────────────────
function initMenu() {
  menuTransitionAlpha = 0;
  menuItemAnimations = [
    { y: -80, alpha: 0, scale: 1.4 }, // Title
    { y: -40, alpha: 0 },             // Start Game
    { y: -40, alpha: 0 }              // Endless Mode
  ];

  // Confetti streamers — coloured falling strips (replaces bland starfield)
  menuStars = [];
  const confettiColors = ['#d62a2a','#f0e840','#2a8c2a','#ffffff','#2e5cc0','#ff6aaa','#c8a84a'];
  for (let i = 0; i < 90; i++) {
    menuStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vy: 35 + Math.random() * 60,
      vx: (Math.random() - 0.5) * 22,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.08,
      w: 4 + Math.random() * 6,
      h: 9 + Math.random() * 12,
      color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
      phase: Math.random() * Math.PI * 2,   // horizontal wobble
      twinkle: 0                             // reuse field for wobble phase
    });
  }

  // Crowd silhouettes — arms-up people at the bottom
  if (!window.menuCrowd) {
    window.menuCrowd = [];
    for (let i = 0; i < 38; i++) {
      window.menuCrowd.push({
        x: (i / 38) * W + (Math.random() - 0.5) * (W / 38),
        armPhase: Math.random() * Math.PI * 2,
        armSpeed: 0.9 + Math.random() * 1.4,
        h: 34 + Math.random() * 18,
        color: `hsl(${Math.floor(Math.random() * 360)},${35+Math.floor(Math.random()*30)}%,${22+Math.floor(Math.random()*18)}%)`
      });
    }
  }

  menuInitialized = true;
}

// ── Update Menu Animations ─────────────────────────────────────────────────
function updateMenuAnimations(dt) {
  if (!menuInitialized) initMenu();

  // Fade in
  if (menuTransitionAlpha < 1) {
    menuTransitionAlpha = Math.min(1, menuTransitionAlpha + dt * 0.0018);
  }

  // Slide + scale entrance per item (staggered)
  for (let i = 0; i < menuItemAnimations.length; i++) {
    const anim = menuItemAnimations[i];
    const delay = i * 120; // ms stagger
    if (menuTransitionAlpha > delay / 2000) {
      if (anim.y < 0)     anim.y     = Math.min(0, anim.y + dt * 0.18);
      if (anim.alpha < 1) anim.alpha = Math.min(1, anim.alpha + dt * 0.004);
      if (anim.scale !== undefined && anim.scale > 1)
        anim.scale = Math.max(1, anim.scale - dt * 0.003);
    }
  }

  // Confetti physics
  for (const s of menuStars) {
    s.phase += dt * 0.003;
    s.x  += (s.vx + Math.sin(s.phase) * 8) * dt / 1000;
    s.y  += s.vy * dt / 1000;
    s.rot += s.rotSpeed * dt * 0.06;
    if (s.y > H + 20) {
      s.y = -20;
      s.x = Math.random() * W;
    }
    if (s.x < -20) s.x = W + 20;
    if (s.x > W + 20) s.x = -20;
  }
}

function initGame(difficulty = 'MEDIUM') {
  state = 'play';
  currentDifficulty = DIFFICULTIES[difficulty];
  difficultySelection = difficulty;
  
  score = 0;
  timeLeft = currentDifficulty.gameTime;
  combo = 0;
  comboTimer = 0;
  escalationTimer = ESCALATION_MS;
  ghostTimer = currentDifficulty.ghostFirst;
  escalLevel = 0;
  wave = 1;
  flashAlpha = 0;
  screenShake = 0;
  timeFrozen = false;
  scoreMultiplier = 1;
  activePowerup = null;
  booksFiledThisGame = 0;
  
  feedbacks = [];
  particles = [];
  powerups = [];

  // Player starts in center
  player = {
    x: W/2, y: H/2,
    dir: 0,
    carrying: [],
    dashing: false,
    dashCd: 0,
    bobPhase: 0,
    vx: 0,
    vy: 0,
    health: 100,
    maxHealth: 100,
    speedMultiplier: 1,
    carryBonus: 0,
    invincible: false,
    repel: false,
    autoSort: false,
    // Animation state
    walkFrame: 0,
    walkTimer: 0,
    idleTimer: 0,
    dashTrail: [] // For dash motion blur
  };

  // ─────────────────────────────────────────────────────────────────────────
  // PROCEDURAL SHELF LAYOUT
  // Each run: shuffle shelf types across cells, jitter positions within cells,
  // then run a repulsion pass so no two shelves overlap.
  // ─────────────────────────────────────────────────────────────────────────
  const hudHeight2 = 28;
  const controlsHeight2 = 25;
  const playAreaTop    = hudHeight2 + 65;
  const playAreaBottom = H - controlsHeight2 - 65;
  const playAreaLeft   = 110;
  const playAreaRight  = W - 110;
  const playAreaWidth  = playAreaRight  - playAreaLeft;
  const playAreaHeight = playAreaBottom - playAreaTop;

  const SHELF_MIN_DIST   = 145;   // px — minimum centre-to-centre separation
  const PLAYER_SAFE_DIST = 130;   // px — no shelf spawns within this radius of start
  const JITTER_X = 0.22;          // ±fraction of cell width
  const JITTER_Y = 0.22;          // ±fraction of cell height
  const COLS = 4, ROWS = 3;
  const cellW = playAreaWidth  / COLS;
  const cellH = playAreaHeight / ROWS;

  // 1. Shuffle shelf type assignments
  const shuffledTypes = [...SHELF_TYPES];
  for (let i = shuffledTypes.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffledTypes[i], shuffledTypes[j]] = [shuffledTypes[j], shuffledTypes[i]];
  }

  // 2. Build candidate positions — one per grid cell, jittered
  const candidates = [];
  let typeIdx = 0;
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      if (typeIdx >= shuffledTypes.length) break;
      const cx = playAreaLeft + cellW * col + cellW / 2;
      const cy = playAreaTop  + cellH * row + cellH / 2;
      const jx = (Math.random() * 2 - 1) * JITTER_X * cellW;
      const jy = (Math.random() * 2 - 1) * JITTER_Y * cellH;
      const x  = Math.max(playAreaLeft  + 60, Math.min(playAreaRight  - 60, cx + jx));
      const y  = Math.max(playAreaTop   + 55, Math.min(playAreaBottom - 55, cy + jy));
      candidates.push({ x, y, type: shuffledTypes[typeIdx] });
      typeIdx++;
    }
  }

  // 3. Repulsion pass — push overlapping shelves apart (5 iterations)
  for (let iter = 0; iter < 5; iter++) {
    for (let a = 0; a < candidates.length; a++) {
      for (let b = a + 1; b < candidates.length; b++) {
        const ca = candidates[a], cb = candidates[b];
        const dx = ca.x - cb.x, dy = ca.y - cb.y;
        const d  = Math.sqrt(dx * dx + dy * dy);
        if (d < SHELF_MIN_DIST && d > 0) {
          const push = (SHELF_MIN_DIST - d) / 2;
          const nx = dx / d, ny = dy / d;
          ca.x = Math.max(playAreaLeft  + 60, Math.min(playAreaRight  - 60, ca.x + nx * push));
          ca.y = Math.max(playAreaTop   + 55, Math.min(playAreaBottom - 55, ca.y + ny * push));
          cb.x = Math.max(playAreaLeft  + 60, Math.min(playAreaRight  - 60, cb.x - nx * push));
          cb.y = Math.max(playAreaTop   + 55, Math.min(playAreaBottom - 55, cb.y - ny * push));
        }
      }
    }
  }

  // 4. Player-safe zone — push any shelf too close to starting position outward
  const playerStartX = W / 2, playerStartY = H / 2;
  for (const c of candidates) {
    const dx = c.x - playerStartX, dy = c.y - playerStartY;
    const d  = Math.sqrt(dx * dx + dy * dy);
    if (d < PLAYER_SAFE_DIST && d > 0) {
      const scale = PLAYER_SAFE_DIST / d;
      c.x = Math.max(playAreaLeft + 60, Math.min(playAreaRight  - 60, playerStartX + dx * scale));
      c.y = Math.max(playAreaTop  + 55, Math.min(playAreaBottom - 55, playerStartY + dy * scale));
    }
  }

  // 5. Build shelf objects with staggered spawn animation
  shelves = candidates.map((c, i) => ({
    x: c.x,
    y: c.y,
    type: c.type,
    glowPulse: 0,
    acceptPulse: 0,
    filingAnimation: null,
    storedBooks: [],
    capacity: 20,
    filedCount: 0,
    completionState: 0,
    isComplete: false,
    completionCelebration: 0,
    lastFiledTime: 0,

    // ─── Procedural layout: staggered pop-in ───────────────────────────
    spawnDelay:  i * 55,          // ms before this shelf appears
    spawnAlpha:  0,               // 0→1 fade-in controlled in updatePlaying
    spawnScale:  0.3,             // 0.3→1 scale punch-in
    spawnDone:   false,           // once true, skip animation overhead

    // ─── Shelf-specific bonus systems ──────────────────────────────────
    bonusState: {
      pageCount: 0, pageTurnerReady: false,
      lastRomanceTime: 0, romanceChain: 0,
      nextJumpScare: null,
      lastScienceColor: null, scienceChain: 0,
      scifiSpeed: 0, scifiSpeedTimer: 0,
      cluesFound: 0, mysteryMultiplier: 1,
      wisdomCount: 0,
      mangaExtension: 0
    }
  }));

  // Trash can in center of play area
  trashCan = {
    x: W/2,
    y: playAreaTop + playAreaHeight/2,
    glowPulse: 0,
    acceptPulse: 0
  };

  // Books scattered throughout play area
  books = [];
  for (let i = 0; i < 8; i++) spawnBook();

  ghosts = [];
  
  // ═══ INITIALIZE CONTINUOUS SPAWN TIMERS ═══
  bookSpawnTimer = 0;
  powerupSpawnTimer = 0;
  // Set first spawn times to random intervals
  nextBookSpawnTime = rnd(BOOK_SPAWN_MIN, BOOK_SPAWN_MAX);
  nextPowerupSpawnTime = rnd(POWERUP_SPAWN_MIN, POWERUP_SPAWN_MAX);
  
  // Initialize combat system
  thrownBooks = [];
  chargeAttack = null;
  dashKills = 0;
  parryWindow = 0;
  
  // Initialize new ghost systems
  ghostProjectiles = [];
  miniGhosts = [];
  possessedShelves.clear();
  
  // Initialize phase 2 enemy state
  playerSilenced = false;
  lastPickedBookType = null;
  corruptedShelves = new Map();
  bossWaveTimer = 60000;
  bossWaveAnnounce = 0;
  
  // Initialize phase 3 polish state
  comboAnnouncer = null;
  hitStop = 0;
  hitVignette = 0;
  hitVignetteAngle = 0;
  filingStamps = [];
  scorePopTimer = 0;
  lastScoreDelta = 0;
  lastComboTier = -1;
  
  // Procedural layout intro banner
  layoutRevealTimer = 3800; // show for 3.8s
  
  // Initialize UI state
  scoreDisplay = 0;
  comboMeterFill = 0;
  achievementQueue = [];
  
  // Initialize camera
  cameraX = W / 2;
  cameraY = H / 2;
  cameraTargetX = W / 2;
  cameraTargetY = H / 2;
  zoomLevel = 1;
  targetZoom = 1;
  chromaticAberration = 0;
  vignetteIntensity = 0;
  
  // Initialize environmental decorations
  initEnvironment();
}

// ── Initialize Environment ────────────────────────────────────────────────
function initEnvironment() {
  const hudHeight = 28;
  const controlsHeight = 25;
  const playAreaTop = hudHeight + 60;
  const playAreaBottom = H - controlsHeight - 60;
  const playAreaLeft = 100;
  const playAreaRight = W - 100;
  
  // Reading lamps on walls
  lamps = [
    { x: 50, y: playAreaTop + 50, flickerPhase: Math.random() * Math.PI * 2 },
    { x: W - 50, y: playAreaTop + 50, flickerPhase: Math.random() * Math.PI * 2 },
    { x: 50, y: playAreaBottom - 50, flickerPhase: Math.random() * Math.PI * 2 },
    { x: W - 50, y: playAreaBottom - 50, flickerPhase: Math.random() * Math.PI * 2 }
  ];
  
  // Potted plants in corners
  plants = [
    { x: 60, y: playAreaTop + 30, sway: 0 },
    { x: W - 60, y: playAreaTop + 30, sway: Math.PI },
    { x: 60, y: playAreaBottom - 30, sway: Math.PI / 2 },
    { x: W - 60, y: playAreaBottom - 30, sway: Math.PI * 1.5 }
  ];
  
  // Windows showing outside
  windows = [
    { x: W / 4, y: playAreaTop - 20, width: 80, height: 40 },
    { x: W * 3 / 4, y: playAreaTop - 20, width: 80, height: 40 }
  ];
  
  // Ambient dust motes
  ambientParticles = [];
  for (let i = 0; i < 30; i++) {
    ambientParticles.push({
      x: rnd(playAreaLeft, playAreaRight),
      y: rnd(playAreaTop, playAreaBottom),
      vx: rnd(-5, 5),
      vy: rnd(-10, -5),
      size: rnd(1, 2),
      phase: Math.random() * Math.PI * 2,
      baseX: rnd(playAreaLeft, playAreaRight)
    });
  }
  
  timeOfDay = 0;
}

// ── Update UI Animations ──────────────────────────────────────────────────
function updateUI(dt) {
  // Smooth score counter (counts up to actual score)
  if (scoreDisplay < score) {
    const diff = score - scoreDisplay;
    scoreDisplay += Math.max(1, Math.ceil(diff * 0.1));
  }
  
  // Combo meter fill (0-1 based on combo)
  const targetFill = Math.min(1, combo / 15); // 15x combo = full meter
  comboMeterFill = lerp(comboMeterFill, targetFill, 0.1);
  
  // Update achievement notifications
  for (let i = achievementQueue.length - 1; i >= 0; i--) {
    achievementQueue[i].life -= dt;
    if (achievementQueue[i].life <= 0) {
      achievementQueue.splice(i, 1);
    }
  }
}

// ── Update Camera ──────────────────────────────────────────────────────────
function updateCamera(dt) {
  // Camera stays centered - no follow movement
  cameraX = W / 2;
  cameraY = H / 2;
  targetCameraX = W / 2;
  targetCameraY = H / 2;
  
  // Camera shake from screenShake variable
  if (screenShake > 0) {
    cameraShakeX = (Math.random() - 0.5) * screenShake * 12;
    cameraShakeY = (Math.random() - 0.5) * screenShake * 12;
  } else {
    cameraShakeX = 0;
    cameraShakeY = 0;
  }
  
  // Dynamic zoom effects
  if (combo >= 10) {
    targetZoom = 0.98; // Zoom out slightly at high combo
  } else {
    targetZoom = 1;
  }
  
  // Smooth zoom transition
  cameraZoom = lerp(cameraZoom, targetZoom, 0.12);
  
  // Chromatic aberration on heavy hits
  if (flashAlpha > 0.15) {
    chromaticAberration = Math.min(8, flashAlpha * 10);
  } else {
    chromaticAberration = Math.max(0, chromaticAberration - dt * 0.015);
  }
  
  // Vignette intensity based on health
  const healthPct = player.health / player.maxHealth;
  if (healthPct < 0.3) {
    vignetteIntensity = (0.3 - healthPct) * 2.5; // 0 to 0.75
  } else {
    vignetteIntensity = Math.max(0, vignetteIntensity - dt * 0.001);
  }
  
  // Motion blur disabled
  motionBlurAlpha = 0;
}


// ── Add Achievement Notification ───────────────────────────────────────────
function showAchievementNotification(title, description) {
  achievementQueue.push({
    title,
    description,
    life: 4000,
    maxLife: 4000
  });
}

// Update environmental elements
function updateEnvironment(dt) {
  // Update time of day (full cycle in 2 minutes)
  timeOfDay += dt / 120000;
  if (timeOfDay > 1) timeOfDay = 0;
  
  // Update lamp flicker
  for (const lamp of lamps) {
    lamp.flickerPhase += dt * 0.01;
  }
  
  // Update plant sway
  for (const plant of plants) {
    plant.sway += dt * 0.001;
  }
  
  // Update ambient particles (floating dust)
  for (const p of ambientParticles) {
    p.x += p.vx * dt / 1000;
    p.y += p.vy * dt / 1000;
    p.phase += dt * 0.002;
    
    // Drift side to side
    p.x = p.baseX + Math.sin(p.phase) * 20;
    
    // Wrap around
    const hudHeight = 28;
    const controlsHeight = 25;
    const playAreaTop = hudHeight + 60;
    const playAreaBottom = H - controlsHeight - 60;
    const playAreaLeft = 100;
    const playAreaRight = W - 100;
    
    if (p.y < playAreaTop) p.y = playAreaBottom;
    if (p.y > playAreaBottom) p.y = playAreaTop;
    if (p.x < playAreaLeft) p.x = playAreaRight;
    if (p.x > playAreaRight) p.x = playAreaLeft;
  }
}

// ── Handle Ghost Death ────────────────────────────────────────────────────
function handleGhostDeath(ghost, killedBy = 'normal') {
  const gx = ghost.x;
  const gy = ghost.y;
  const gType = ghost.type;
  const gColor = ghost.typeData.color;
  
  // Special death behaviors
  if (gType === 'SWARM') {
    // SWARM GHOST SPLIT MECHANIC
    const splitCount = ghost.typeData.splitCount;
    
    for (let k = 0; k < splitCount; k++) {
      const angle = (k / splitCount) * Math.PI * 2;
      const spawnDist = 30;
      const miniSpeed = currentDifficulty.ghostSpeed * ghost.typeData.miniGhostSpeed;
      
      ghosts.push({
        x: gx + Math.cos(angle) * spawnDist,
        y: gy + Math.sin(angle) * spawnDist,
        phase: Math.random() * Math.PI * 2,
        alive: true,
        speed: miniSpeed,
        type: 'NORMAL',
        typeData: GHOST_TYPES.NORMAL,
        health: ghost.typeData.miniGhostHealth,
        maxHealth: ghost.typeData.miniGhostHealth,
        attackCooldown: 0,
        attackTelegraph: 0,
        teleportCooldown: 0,
        spawnAnimation: 1,
        isMiniGhost: true, // Flag for smaller rendering
        miniGhostSize: 8   // Smaller than normal
      });
    }
    
    // Epic split explosion
    PARTICLE_TYPES.SHOCKWAVE(gx, gy, gColor, 70);
    for (let j = 0; j < 20; j++) {
      PARTICLE_TYPES.SPARKLE(gx, gy, gColor, 700);
    }
    addFeedback(gx, gy - 30, 'SPLIT!', gColor, 14);
    screenShake = 0.8;
    
    return; // Don't do normal death particles
  }
  
  // BOMBER GHOST EXPLOSION (will add in next phase)
  if (gType === 'BOMBER') {
    const explosionRadius = ghost.typeData.explosionRadius;
    const explosionDamage = ghost.typeData.explosionDamage;
    const ghostDamage = ghost.typeData.explosionDamageGhost;
    
    // Damage player if in range
    const distToPlayer = dist(gx, gy, player.x, player.y);
    if (distToPlayer < explosionRadius && !player.invincible) {
      player.health -= explosionDamage;
      screenShake = 1.5;
      flashAlpha = 0.3;
      addFeedback(player.x, player.y - 30, `-${explosionDamage}`, '#ff2222', 14);
      
      // Check death
      if (player.health <= 0) {
        endGame('health');
        return;
      }
    }
    
    // Damage nearby ghosts
    for (let j = ghosts.length - 1; j >= 0; j--) {
      const other = ghosts[j];
      if (!other || other === ghost) continue;
      
      const distToOther = dist(gx, gy, other.x, other.y);
      if (distToOther < explosionRadius) {
        other.health -= ghostDamage;
        addFeedback(other.x, other.y - 20, `-${ghostDamage}`, '#ffaa88', 10);
        
        if (other.health <= 0) {
          // Chain explosion! (but don't recurse infinitely)
          if (other.type !== 'BOMBER') {
            handleGhostDeath(other, killedBy);
            ghosts.splice(j, 1);
          }
        } else {
          other.damageFlash = 200;
        }
      }
    }
    
    // Massive explosion visuals
    PARTICLE_TYPES.FIREWORK(gx, gy, '#ffaa88', 1000);
    PARTICLE_TYPES.SHOCKWAVE(gx, gy, '#ff6666', explosionRadius);
    for (let j = 0; j < 25; j++) {
      PARTICLE_TYPES.SPARKLE(gx, gy, '#ffaa88', 800);
    }
    addFeedback(gx, gy - 30, 'BOOM!', '#ff6666', 16);
    screenShake = Math.max(screenShake, 1.2);
    
    return; // Don't do normal death particles
  }
  
  // Normal death particles
  const particleCount = gType === 'BOSS' ? 30 : 12;
  for (let j = 0; j < particleCount; j++) {
    PARTICLE_TYPES.SPARKLE(gx, gy, gColor, 600);
  }
  PARTICLE_TYPES.SHOCKWAVE(gx, gy, gColor, gType === 'BOSS' ? 60 : 30);
  
  // OVERDUE: restore corrupted shelf on death
  if (gType === 'OVERDUE' && ghost.attachedShelf) {
    const shelf = ghost.attachedShelf;
    if (shelf && shelf._originalType) {
      shelf.type = shelf._originalType;
      shelf.corrupted = false;
      shelf.corruptedBy = null;
      corruptedShelves.delete(shelf);
      addFeedback(shelf.x, shelf.y - 40, 'OVERDUE CLEARED!', '#2aaa5c', 12);
      PARTICLE_TYPES.SHOCKWAVE(shelf.x, shelf.y, '#2aaa5c', 60);
      for (let j = 0; j < 15; j++) PARTICLE_TYPES.SPARKLE(shelf.x, shelf.y, '#2aaa5c', 700);
    }
  }
  
  // Boss defeat message
  if (gType === 'BOSS') {
    addFeedback(gx, gy - 30, 'BOSS DEFEATED!', '#f0e840', 14);
    hitStop = 180;          // dramatic freeze on boss death
    screenShake = Math.max(screenShake, 3.0);
    flashAlpha = Math.max(flashAlpha, 0.35);
  }
  
  // Special kill type messages
  if (killedBy === 'dash') {
    addFeedback(gx, gy - 30, 'DASH KILL!', '#4a8cff', 12);
  } else if (killedBy === 'throw') {
    addFeedback(gx, gy - 30, 'BOOK KILL!', '#ff6aaa', 12);
  } else if (killedBy === 'charge') {
    addFeedback(gx, gy - 30, 'CHARGE KILL!', '#f0e840', 14);
  } else if (killedBy === 'parry') {
    addFeedback(gx, gy - 30, 'COUNTER KILL!', '#f0e840', 14);
  } else if (killedBy === 'reflect') {
    addFeedback(gx, gy - 30, 'REFLECTED KILL!', '#f0e840', 14);
  }
}

// ── Ghost Projectile System ──────────────────────────────────────────────

// Shoot a projectile from ghost toward target
function shootProjectile(ghost, targetX, targetY) {
  const angle = Math.atan2(targetY - ghost.y, targetX - ghost.x);
  const speed = ghost.typeData.projectileSpeed;
  
  ghostProjectiles.push({
    x: ghost.x,
    y: ghost.y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    damage: ghost.typeData.projectileDamage,
    size: 6,
    color: ghost.typeData.color,
    lifetime: 3000, // Auto-remove after 3 seconds
    fromGhost: ghost,
    trail: []
  });
  
  // Visual feedback
  for (let i = 0; i < 3; i++) {
    PARTICLE_TYPES.SPARKLE(ghost.x, ghost.y, ghost.typeData.color, 300);
  }
}

// Update all ghost projectiles
function updateGhostProjectiles(dt) {
  for (let i = ghostProjectiles.length - 1; i >= 0; i--) {
    const proj = ghostProjectiles[i];
    
    // Move projectile
    proj.x += proj.vx * dt / 1000;
    proj.y += proj.vy * dt / 1000;
    
    // Add trail
    proj.trail.push({ x: proj.x, y: proj.y, alpha: 1 });
    if (proj.trail.length > 6) proj.trail.shift();
    
    // Fade trail
    for (const t of proj.trail) {
      t.alpha -= dt * 0.004;
    }
    
    // Decrease lifetime
    proj.lifetime -= dt;
    if (proj.lifetime <= 0) {
      ghostProjectiles.splice(i, 1);
      continue;
    }
    
    // Check collision with player
    if (!player.invincible && dist(proj.x, proj.y, player.x, player.y) < 20) {
      // Hit player!
      player.health -= proj.damage;
      flashAlpha = 0.2;
      screenShake = 0.6;
      
      // Visual feedback
      addFeedback(player.x, player.y - 30, `-${proj.damage}`, '#ff2222', 12);
      PARTICLE_TYPES.SHOCKWAVE(proj.x, proj.y, proj.color, 30);
      for (let j = 0; j < 8; j++) {
        PARTICLE_TYPES.SPARKLE(proj.x, proj.y, proj.color, 400);
      }
      
      // Remove projectile
      ghostProjectiles.splice(i, 1);
      
      // Check death
      if (player.health <= 0) {
        endGame('health');
        return;
      }
      continue;
    }
    
    // Check if player can parry projectiles with dash
    if (parryWindow > 0 && dist(proj.x, proj.y, player.x, player.y) < 35) {
      // PARRIED! Reflect projectile back
      const reflectAngle = Math.atan2(proj.fromGhost.y - proj.y, proj.fromGhost.x - proj.x);
      proj.vx = Math.cos(reflectAngle) * proj.vx * 1.5; // Faster on return
      proj.vy = Math.sin(reflectAngle) * proj.vy * 1.5;
      proj.damage *= 2; // Double damage when reflected
      proj.reflected = true; // Flag to damage ghosts instead
      proj.color = '#f0e840'; // Golden when reflected
      
      addFeedback(player.x, player.y - 30, 'REFLECT!', '#f0e840', 14);
      PARTICLE_TYPES.SHOCKWAVE(proj.x, proj.y, '#f0e840', 40);
      parryWindow = 0; // Consume parry
      
      continue;
    }
    
    // If reflected, check collision with ghosts
    if (proj.reflected) {
      for (let j = ghosts.length - 1; j >= 0; j--) {
        const g = ghosts[j];
        if (!g) continue;
        
        if (dist(proj.x, proj.y, g.x, g.y) < (g.typeData.size + proj.size)) {
          // Hit ghost with reflected projectile!
          g.health -= proj.damage;
          
          addFeedback(g.x, g.y - 20, `-${proj.damage}`, '#f0e840', 12);
          screenShake = 0.4;
          
          for (let k = 0; k < 10; k++) {
            PARTICLE_TYPES.SPARKLE(g.x, g.y, '#f0e840', 500);
          }
          
          if (g.health <= 0) {
            // Handle special ghost death behaviors
            handleGhostDeath(g, 'reflect');
            
            // Remove ghost
            ghosts.splice(j, 1);
          } else {
            g.damageFlash = 200;
          }
          
          ghostProjectiles.splice(i, 1);
          break;
        }
      }
    }
    
    // Remove if off-screen
    if (proj.x < -50 || proj.x > W + 50 || proj.y < -50 || proj.y > H + 50) {
      ghostProjectiles.splice(i, 1);
    }
  }
}

// ── Combat System Functions ───────────────────────────────────────────────

// Throw a book at ghosts
function throwBook() {
  if (player.carrying.length === 0) return;
  
  const book = player.carrying.pop(); // Remove from carrying
  const throwPower = 200 + player.throwCharge * 300; // 200-500 speed based on charge
  
  // Calculate throw direction (toward mouse would be ideal, but we'll use player direction)
  let throwAngle = 0;
  switch(player.dir) {
    case 0: throwAngle = Math.PI / 2; break; // Down
    case 1: throwAngle = 0; break; // Right
    case 2: throwAngle = -Math.PI / 2; break; // Up
    case 3: throwAngle = Math.PI; break; // Left
  }
  
  thrownBooks.push({
    x: player.x,
    y: player.y,
    vx: Math.cos(throwAngle) * throwPower,
    vy: Math.sin(throwAngle) * throwPower,
    type: book.type,
    color: BOOK_COLORS[book.type],
    damage: 5 + Math.floor(player.throwCharge * 15), // 5-20 damage
    size: 8 + player.throwCharge * 4, // Bigger when charged
    rot: 0,
    rotSpeed: player.throwCharge > 0.5 ? 0.3 : 0.15,
    lifetime: 2000,
    trail: []
  });
  
  // Visual/audio feedback
  addFeedback(player.x, player.y - 20, player.throwCharge > 0.7 ? 'POWER THROW!' : 'Throw!', '#ff6aaa', 10);
  for (let i = 0; i < 5; i++) {
    PARTICLE_TYPES.SPARKLE(player.x, player.y, book.color, 300);
  }
}

// Update thrown books in flight
function updateThrownBooks(dt) {
  for (let i = thrownBooks.length - 1; i >= 0; i--) {
    const book = thrownBooks[i];
    
    // Move
    book.x += book.vx * dt / 1000;
    book.y += book.vy * dt / 1000;
    book.rot += book.rotSpeed;
    
    // Add trail
    book.trail.push({ x: book.x, y: book.y, alpha: 1 });
    if (book.trail.length > 8) book.trail.shift();
    
    // Fade trail
    for (const t of book.trail) {
      t.alpha -= dt * 0.003;
    }
    
    // Friction
    book.vx *= 0.98;
    book.vy *= 0.98;
    
    // Lifetime
    book.lifetime -= dt;
    if (book.lifetime <= 0) {
      thrownBooks.splice(i, 1);
      continue;
    }
    
    // Check collision with ghosts
    for (let j = ghosts.length - 1; j >= 0; j--) {
      const g = ghosts[j];
      if (!g) continue;
      
      if (dist(book.x, book.y, g.x, g.y) < (g.typeData.size + book.size)) {
        // Ghost weakness check — certain book types deal 2× to specific ghosts
        const WEAKNESSES = {
          HORROR:  ['SHUSHER','NORMAL'],
          ROMANCE: ['FAST','PLAGIARIST'],
          MYSTERY: ['MIMIC','OVERDUE'],
          FANTASY: ['BOSS','TANK'],
          SCIFI:   ['RANGED','TELEPORTER'],
          HISTORY: ['CHAIN','SWARM'],
          ART:     ['BOMBER','POSSESSOR'],
          MANGA:   ['SHIELD','FAST']
        };
        const weakTo = WEAKNESSES[book.type] || [];
        const weaknessBonus = weakTo.includes(g.type) ? 2 : 1;
        const finalDamage = book.damage * weaknessBonus;
        
        // Hit!
        g.health -= finalDamage;
        
        // Weakness splash feedback
        if (weaknessBonus > 1) {
          addFeedback(g.x, g.y - 35, 'WEAKNESS!', '#f0e840', 13);
          for (let k = 0; k < 6; k++) PARTICLE_TYPES.SPARKLE(g.x, g.y, '#f0e840', 500);
        }
        
        // Visual feedback
        addFeedback(g.x, g.y - 20, `-${finalDamage}`, '#ff6aaa', 10);
        screenShake = 0.3;
        
        for (let k = 0; k < 10; k++) {
          PARTICLE_TYPES.SPARKLE(g.x, g.y, book.color, 400);
        }
        PARTICLE_TYPES.PAGE(g.x, g.y);
        
        // Knockback
        const [kbx, kby] = norm(book.vx, book.vy);
        g.x += kbx * 50;
        g.y += kby * 50;
        
        if (g.health <= 0) {
          // Handle special ghost death behaviors
          handleGhostDeath(g, 'throw');
          
          // Remove ghost
          ghosts.splice(j, 1);
        } else {
          g.damageFlash = 200;
        }
        
        // Remove thrown book
        thrownBooks.splice(i, 1);
        break;
      }
    }
    
    // Check if off-screen
    if (book.x < -50 || book.x > W + 50 || book.y < -50 || book.y > H + 50) {
      thrownBooks.splice(i, 1);
    }
  }
}

// Activate charged radial attack
function activateChargeAttack() {
  if (player.carrying.length < 3) return;
  
  const power = player.chargeProgress;
  const radius = 80 + power * 70; // 80-150 radius
  const damage = Math.floor(10 + power * 25); // 10-35 damage
  
  // Remove 3 books from carrying
  for (let i = 0; i < 3; i++) {
    player.carrying.pop();
  }
  
  chargeAttack = {
    x: player.x,
    y: player.y,
    radius: 0,
    maxRadius: radius,
    damage: damage,
    lifetime: 500
  };
  
  // Massive visual feedback
  addFeedback(player.x, player.y - 40, 'BOOK SLAM!', '#f0e840', 16);
  screenShake = 1.2;
  flashAlpha = 0.15;
  
  // Initial burst
  for (let i = 0; i < 30; i++) {
    PARTICLE_TYPES.SPARKLE(player.x, player.y, '#f0e840', 800);
  }
  PARTICLE_TYPES.SHOCKWAVE(player.x, player.y, '#f0e840', radius);
}

// Update charge attack
function updateChargeAttack(dt) {
  if (!chargeAttack) return;
  
  chargeAttack.lifetime -= dt;
  chargeAttack.radius = Math.min(chargeAttack.maxRadius, chargeAttack.radius + dt * 0.5);
  
  // Continuous particles
  if (Math.random() < 0.5) {
    const angle = Math.random() * Math.PI * 2;
    PARTICLE_TYPES.SPARKLE(
      chargeAttack.x + Math.cos(angle) * chargeAttack.radius,
      chargeAttack.y + Math.sin(angle) * chargeAttack.radius,
      '#f0e840',
      400
    );
  }
  
  // Damage ghosts in radius — spatial hash cuts O(n) to O(k) where k = nearby
  const nearbyGhosts = spatialHash.query(chargeAttack.x, chargeAttack.y, chargeAttack.maxRadius);
  for (const g of nearbyGhosts) {
    
    const d = dist(chargeAttack.x, chargeAttack.y, g.x, g.y);
    if (d < chargeAttack.radius) {
      g.health -= chargeAttack.damage;
      g.hitByCharge = true; // Only hit once per charge attack
      
      // Knockback
      const [kbx, kby] = norm(g.x - chargeAttack.x, g.y - chargeAttack.y);
      g.x += kbx * 150;
      g.y += kby * 150;
      
      // Visual feedback
      addFeedback(g.x, g.y - 20, `-${chargeAttack.damage}`, '#f0e840', 12);
      for (let j = 0; j < 12; j++) {
        PARTICLE_TYPES.SPARKLE(g.x, g.y, '#f0e840', 500);
      }
      
      if (g.health <= 0) {
        // Handle special ghost death behaviors
        handleGhostDeath(g, 'charge');
        g.alive = false; // Mark for removal — cleaned up in ghosts.filter below
      } else {
        g.damageFlash = 300;
      }
    }
  }
  
  // Remove when done
  if (chargeAttack.lifetime <= 0) {
    // Flush dead ghosts (marked alive=false by charge attack above)
    for (let i = ghosts.length - 1; i >= 0; i--) {
      if (ghosts[i] && !ghosts[i].alive) ghosts.splice(i, 1);
    }
    // Clear hitByCharge flags
    for (const g of ghosts) {
      if (g) g.hitByCharge = false;
    }
    chargeAttack = null;
  }
}

// ── Spawn Book ────────────────────────────────────────────────────────────
function spawnBook() {
  const type = BOOK_TYPES[rint(0, BOOK_TYPES.length-1)];
  
  // Define safe spawn area (avoid HUD and controls)
  const hudHeight = 28;
  const controlsHeight = 25;
  const marginTop = hudHeight + 80;
  const marginBottom = controlsHeight + 80;
  const marginSide = 80;
  
  let bx, by;
  for (let t = 0; t < 60; t++) {
    bx = rnd(marginSide, W - marginSide);
    by = rnd(marginTop, H - marginBottom);
    let ok = true;
    
    // Check distance from shelves
    for (const s of shelves) {
      if (dist(bx, by, s.x, s.y) < 100) {
        ok = false;
        break;
      }
    }
    
    // Check distance from trash can
    if (ok && dist(bx, by, trashCan.x, trashCan.y) < 80) ok = false;
    
    // Check distance from player
    if (ok && dist(bx, by, player.x, player.y) > 80) break;
  }
  
  books.push({
    x: bx,
    y: by,
    type,
    state: 'floor',
    rot: rnd(-0.4, 0.4),
    bobPhase: Math.random() * Math.PI * 2,
    pickupCd: 0
  });
}

// ── Spawn Ghost ───────────────────────────────────────────────────────────
function spawnGhost() {
  const edge = rint(0, 3);
  const hudHeight = 28;
  const controlsHeight = 25;
  let gx, gy;
  
  if (edge === 0) { // Top
    gx = rnd(100, W - 100);
    gy = hudHeight + 40;
  } else if (edge === 1) { // Bottom
    gx = rnd(100, W - 100);
    gy = H - controlsHeight - 40;
  } else if (edge === 2) { // Left
    gx = 40;
    gy = rnd(hudHeight + 60, H - controlsHeight - 60);
  } else { // Right
    gx = W - 40;
    gy = rnd(hudHeight + 60, H - controlsHeight - 60);
  }
  
  // Determine ghost type based on wave
  let ghostType = 'NORMAL';
  
  // Boss every 5th wave
  if (wave % 5 === 0 && Math.random() < 0.3) {
    ghostType = 'BOSS';
  } else {
    // Random type selection weighted by wave escalation
    const rand = Math.random();
    
    // Wave 7+ (escalLevel 6+): All enemy types available
    if (escalLevel >= 6) {
      if (rand < 0.07) ghostType = 'MIMIC';
      else if (rand < 0.14) ghostType = 'POSSESSOR';
      else if (rand < 0.21) ghostType = 'SHIELD';
      else if (rand < 0.28) ghostType = 'CHAIN';
      else if (rand < 0.35) ghostType = 'SHUSHER';
      else if (rand < 0.42) ghostType = 'OVERDUE';
      else if (rand < 0.49) ghostType = 'PLAGIARIST';
      else if (rand < 0.57) ghostType = 'SWARM';
      else if (rand < 0.65) ghostType = 'RANGED';
      else if (rand < 0.73) ghostType = 'BOMBER';
      else if (rand < 0.81) ghostType = 'TELEPORTER';
      else if (rand < 0.89) ghostType = 'TANK';
      else ghostType = 'FAST';
    }
    // Wave 5+ (escalLevel 4+): Add Swarm, Ranged, Bomber + new trio
    else if (escalLevel >= 4) {
      if (rand < 0.10) ghostType = 'SWARM';
      else if (rand < 0.20) ghostType = 'RANGED';
      else if (rand < 0.28) ghostType = 'BOMBER';
      else if (rand < 0.36) ghostType = 'SHUSHER';
      else if (rand < 0.44) ghostType = 'OVERDUE';
      else if (rand < 0.52) ghostType = 'PLAGIARIST';
      else if (rand < 0.65) ghostType = 'TELEPORTER';
      else if (rand < 0.78) ghostType = 'TANK';
      else if (rand < 0.90) ghostType = 'FAST';
      else ghostType = 'NORMAL';
    }
    // Wave 3+ (escalLevel 2+): Original types + Shusher intro
    else if (escalLevel >= 2) {
      if (rand < 0.12) ghostType = 'TELEPORTER';
      else if (rand < 0.25) ghostType = 'SHUSHER';
      else if (rand < 0.40) ghostType = 'TANK';
      else if (rand < 0.65) ghostType = 'FAST';
      else ghostType = 'NORMAL';
    }
    // Early waves: Just Fast ghosts
    else if (escalLevel >= 1) {
      if (rand < 0.5) ghostType = 'FAST';
      else ghostType = 'NORMAL';
    }
  }
  
  const type = GHOST_TYPES[ghostType];
  const baseSpeed = currentDifficulty.ghostSpeed * (1 + escalLevel * 0.2);
  
  const newGhost = {
    x: gx,
    y: gy,
    phase: Math.random() * Math.PI * 2,
    alive: true,
    speed: baseSpeed * type.speed,
    type: ghostType,
    typeData: type,
    health: type.health,
    maxHealth: type.health,
    attackCooldown: 0,
    attackTelegraph: 0,
    teleportCooldown: 0,
    spawnAnimation: 1
  };
  
  // Special initialization for specific ghost types
  if (ghostType === 'MIMIC') {
    newGhost.disguised = true;
    newGhost.disguiseType = BOOK_TYPES[rint(0, BOOK_TYPES.length - 1)];
  } else if (ghostType === 'POSSESSOR') {
    newGhost.possessing = false;
    newGhost.possessedShelf = null;
    newGhost.possessionTimer = 0;
  } else if (ghostType === 'SHIELD') {
    newGhost.shieldRotation = Math.random() * Math.PI * 2;
    newGhost.shieldActive = true;
  } else if (ghostType === 'RANGED') {
    newGhost.shootCooldown = type.shootCooldown;
  } else if (ghostType === 'CHAIN') {
    // Chain ghosts spawn in pairs - spawn partner
    spawnChainPair(newGhost, gx, gy);
  } else if (ghostType === 'PLAGIARIST') {
    // Disguises as whatever book the player last picked up (or random if none)
    newGhost.disguised = true;
    newGhost.disguiseType = lastPickedBookType || BOOK_TYPES[rint(0, BOOK_TYPES.length - 1)];
  } else if (ghostType === 'OVERDUE') {
    newGhost.attachedShelf = null;
  }
  
  ghosts.push(newGhost);
}

// ── Spawn Chain Ghost Pair ────────────────────────────────────────────────
function spawnChainPair(ghost1, baseX, baseY) {
  const type = GHOST_TYPES.CHAIN;
  const baseSpeed = currentDifficulty.ghostSpeed * (1 + escalLevel * 0.2);
  
  // Spawn partner at offset position

  const ghost2 = {
    x: baseX + Math.cos(angle) * 100,
    y: baseY + Math.sin(angle) * 100,
    phase: Math.random() * Math.PI * 2,
    alive: true,
    speed: baseSpeed * type.speed,
    type: 'CHAIN',
    typeData: type,
    health: type.health,
    maxHealth: type.health,
    attackCooldown: 0,
    attackTelegraph: 0,
    teleportCooldown: 0,
    spawnAnimation: 1,
    chainPartner: ghost1
  };
  
  // Link them together
  ghost1.chainPartner = ghost2;
  
  ghosts.push(ghost2);
}
