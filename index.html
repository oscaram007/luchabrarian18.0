      ctx.fillStyle = '#6ac8ff';
      ctx.beginPath();
      ctx.arc(canvasX + 14, canvasY + 6, 4, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#ffff6a';
      ctx.beginPath();
      ctx.moveTo(canvasX + 5, canvasY + 10);
      ctx.lineTo(canvasX + 10, canvasY + 10);
      ctx.lineTo(canvasX + 7.5, canvasY + 14);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
      
      // Paint drip particles
      if (Math.random() < 0.06 * particleChanceMultiplier) {
        const randomColor = ['#ff6a6a', '#ffa86a', '#ffff6a', '#6aff6a', '#6ac8ff', '#d86aff'][Math.floor(Math.random() * 6)];
        emitParticle({
          x: x + rnd(-shelfW/2 + 10, shelfW/2 - 10),
          y: y - shelfH/2,
          vx: rnd(-5, 5),
          vy: rnd(5, 15), // Drips down
          life: 2000,
          maxLife: 2000,
          color: randomColor,
          size: rnd(2, 4),
          type: 'sparkle',
          alpha: 0.8
        });
      }
      
      // Art books (colorful spines)
      const artBooks = [
        {x: -48, w: 8, h: 15, color: '#ff6a6a'},
        {x: -37, w: 7, h: 17, color: '#ffa86a'},
        {x: -27, w: 9, h: 14, color: '#ffff6a'},
        {x: -15, w: 7, h: 16, color: '#6aff6a'},
        {x: -5, w: 8, h: 15, color: '#6ac8ff'},
        {x: 6, w: 7, h: 17, color: '#d86aff'},
        {x: 16, w: 9, h: 14, color: '#ff6ac8'},
        {x: 28, w: 7, h: 16, color: '#c8ff6a'}
      ];
      
      for (const book of artBooks) {
        // Colorful book
        ctx.fillStyle = book.color;
        ctx.globalAlpha = 0.9;
        ctx.fillRect(x + book.x, y + shelfH/2 - 18 - book.h, book.w, book.h);
        
        // White spine detail
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(x + book.x, y + shelfH/2 - 18 - book.h, 1, book.h);
        
        // Paint brush icon
        ctx.fillStyle = '#ffffff';
        ctx.globalAlpha = 0.7;
        ctx.font = '7px Arial';
        ctx.fillText('🖌', x + book.x + book.w/2 - 3, y + shelfH/2 - 18 - book.h/2 + 3);
        ctx.globalAlpha = 1;
      }
      break;

    case 'TRASH':
      // This case shouldn't be hit as trash uses renderTrashCan
      // But we'll add a fallback
      ctx.fillStyle = '#5a5a6a';
      ctx.fillRect(x - shelfW/2, y - shelfH/2, shelfW, shelfH);
      break;
  }
  
  // ═══════════════════════════════════════════════════════════════════════
  // LABEL SIGN (applies to all)
  // ═══════════════════════════════════════════════════════════════════════
  
  const labelY = y - shelfH/2 - 14;
  
  // Sign chain
  ctx.strokeStyle = '#8a8a9a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, y - shelfH/2);
  ctx.lineTo(x, labelY);
  ctx.stroke();
  
  // Sign background (themed by type)
  const signW = 60;
  const signH = 16;
  
  // Sign color based on shelf type
  let signBg = '#f0ebd6';
  let signBorder = '#c8a84a';
  
  if (shelf.type === 'FORBIDDEN') {
    signBg = '#2a1a2a';
    signBorder = '#aa44aa';
  } else if (shelf.type === 'SCIENCE') {
    signBg = '#d8e8f8';
    signBorder = '#7a8a9a';
  } else if (shelf.type === 'ART') {
    signBg = '#fff8e8';
    signBorder = '#ff8844';
  }
  
  ctx.fillStyle = signBg;
  ctx.fillRect(x - signW/2, labelY, signW, signH);
  
  // Sign border
  ctx.strokeStyle = signBorder;
  ctx.lineWidth = 2;
  ctx.strokeRect(x - signW/2, labelY, signW, signH);
  
  // Label text
  const textColor = shelf.type === 'FORBIDDEN' ? '#aa44aa' : BOOK_COLORS[shelf.type];
  ctx.fillStyle = textColor;
  ctx.font = 'bold 7px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText(BOOK_LABELS[shelf.type].toUpperCase(), x, labelY + 11);
  
  // ═══════════════════════════════════════════════════════════════════════
  // NINTENDO: BONUS READY INDICATORS
  // ═══════════════════════════════════════════════════════════════════════
  
  if (shelf.bonusState) {
    const bonus = shelf.bonusState;
    const indicatorY = y - shelfH/2 - 45;
    
    switch(shelf.type) {
      case 'FICTION':
        // Page Turner - Show progress (4/5 means next is bonus!)
        if (bonus.pageTurnerReady) {
          const flutter = Math.sin(time * 0.02) * 2;
          ctx.save();
          ctx.translate(x, indicatorY);
          ctx.rotate(flutter * 0.1);
          
          // Fluttering page
          ctx.fillStyle = '#f0ebd6';
          ctx.globalAlpha = 0.8;
          ctx.fillRect(-6, -8, 12, 16);
          
          // Page lines
          ctx.strokeStyle = '#1a1a1a';
          ctx.lineWidth = 0.5;
          for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.moveTo(-4, -4 + i * 4);
            ctx.lineTo(4, -4 + i * 4);
            ctx.stroke();
          }
          
          ctx.restore();
          ctx.globalAlpha = 1;
          
          // "READY!" text
          ctx.fillStyle = '#ff6aaa';
          ctx.font = 'bold 6px "Press Start 2P"';
          ctx.fillText('READY!', x, indicatorY + 18);
        }
        break;
        
      case 'HORROR':
        // Jump Scare - Show skull on next jump scare slot
        if (bonus.nextJumpScare !== null) {
          const targetSlot = bonus.nextJumpScare % shelf.capacity;
          if (targetSlot < shelf.filedCount + 3) { // Show when getting close
            const pulse = Math.sin(time * 0.01) * 0.3 + 0.7;
            ctx.globalAlpha = pulse * 0.6;
            ctx.fillStyle = '#ff4444';
            ctx.font = 'bold 10px sans-serif';
            ctx.fillText('💀', x, indicatorY);
            ctx.globalAlpha = 1;
          }
        }
        break;
        
      case 'SCIENCE':
        // Experiment - Show current chain
        if (bonus.scienceChain > 0) {
          const bubblePulse = Math.sin(time * 0.015) * 2;
          
          // Beaker with bubbles
          ctx.strokeStyle = '#4a8ac2';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x - 6, indicatorY + 8);
          ctx.lineTo(x - 6, indicatorY);
          ctx.lineTo(x + 6, indicatorY);
          ctx.lineTo(x + 6, indicatorY + 8);
          ctx.stroke();
          
          // Bubbles
          for (let i = 0; i < bonus.scienceChain; i++) {
            ctx.fillStyle = '#4ac8ff';
            ctx.globalAlpha = 0.7;
            ctx.beginPath();
            ctx.arc(x + rnd(-4, 4), indicatorY + 4 + bubblePulse - i * 3, 2, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
          
          // Chain count
          ctx.fillStyle = '#4ac28a';
          ctx.font = 'bold 6px "Press Start 2P"';
          ctx.fillText(`x${bonus.scienceChain}`, x, indicatorY + 18);
        }
        break;
        
      case 'MYSTERY':
        // Clue Collector - Show fingerprint and multiplier
        if (bonus.cluesFound > 0) {
          const glowPulse = Math.sin(time * 0.008) * 0.2 + 0.8;
          
          // Magnifying glass
          ctx.strokeStyle = '#c8a84a';
          ctx.lineWidth = 2;
          ctx.globalAlpha = glowPulse;
          ctx.beginPath();
          ctx.arc(x - 2, indicatorY, 5, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(x + 2, indicatorY + 3);
          ctx.lineTo(x + 6, indicatorY + 7);
          ctx.stroke();
          ctx.globalAlpha = 1;
          
          // Multiplier
          ctx.fillStyle = '#f0e840';
          ctx.font = 'bold 6px "Press Start 2P"';
          ctx.fillText(`x${bonus.mysteryMultiplier.toFixed(1)}`, x, indicatorY + 18);
        }
        break;
        
      case 'TABLETS':
        // Ancient Wisdom - Show accumulated knowledge
        if (bonus.wisdomCount > 0) {
          const wisdomGlow = Math.sin(time * 0.006) * 0.3 + 0.7;
          
          // Ancient scroll
          ctx.fillStyle = '#d4b896';
          ctx.globalAlpha = wisdomGlow * 0.8;
          ctx.fillRect(x - 6, indicatorY - 4, 12, 10);
          
          // Scroll details
          ctx.strokeStyle = '#8a7a5a';
          ctx.lineWidth = 1;
          ctx.strokeRect(x - 6, indicatorY - 4, 12, 10);
          
          // Hieroglyphs on scroll
          ctx.fillStyle = '#6a5a4a';
          for (let i = 0; i < 3; i++) {
            ctx.fillRect(x - 4, indicatorY - 2 + i * 3, 8, 1);
          }
          ctx.globalAlpha = 1;
          
          // Wisdom multiplier (golden)
          const wisdomMult = 1 + (bonus.wisdomCount * 0.01);
          ctx.fillStyle = '#c8a84a';
          ctx.font = 'bold 6px "Press Start 2P"';
          ctx.fillText(`x${wisdomMult.toFixed(2)}`, x, indicatorY + 18);
          
          // Enlightenment sparkle
          if (wisdomGlow > 0.9) {
            ctx.fillStyle = '#f0e840';
            ctx.globalAlpha = (wisdomGlow - 0.9) * 10;
            ctx.fillText('✦', x, indicatorY - 8);
            ctx.globalAlpha = 1;
          }
        }
        break;
        
      case 'MANGA':
        // Combo Attack - Show speed lines
        if (bonus.mangaExtension > 0) {
          const lineIntensity = Math.min(bonus.mangaExtension / 3000, 1);
          ctx.strokeStyle = '#4a4a4a';
          ctx.lineWidth = 1;
          ctx.globalAlpha = lineIntensity * 0.6;
          
          for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            ctx.beginPath();
            ctx.moveTo(x, indicatorY);
            ctx.lineTo(x + Math.cos(angle) * 12, indicatorY + Math.sin(angle) * 12);
            ctx.stroke();
          }
          ctx.globalAlpha = 1;
          
          // Extension amount
          ctx.fillStyle = '#ff6a8a';
          ctx.font = 'bold 6px "Press Start 2P"';
          ctx.fillText(`+${Math.floor(bonus.mangaExtension / 1000)}s`, x, indicatorY + 18);
        }
        break;
    }
  }
  
  // ═══════════════════════════════════════════════════════════════════════
  // DYNAMIC BOOK SLOTS (Nintendo Magic!)
  // ═══════════════════════════════════════════════════════════════════════
  
  const slotsPerRow = 5;
  const totalRows = 4;
  const slotWidth = 6;
  const slotHeight = 10;
  const slotSpacing = 2;
  const rowSpacing = 3;
  const slotsStartY = y - shelfH/2 + 8;
  const slotsStartX = x - (slotsPerRow * (slotWidth + slotSpacing)) / 2;
  
  // Render all 20 slots
  for (let row = 0; row < totalRows; row++) {
    for (let col = 0; col < slotsPerRow; col++) {
      const slotIndex = row * slotsPerRow + col;
      const slotX = slotsStartX + col * (slotWidth + slotSpacing);
      const slotY = slotsStartY + row * (slotHeight + rowSpacing);
      
      // Find book in this slot
      const book = shelf.storedBooks?.find(b => b.slotIndex === slotIndex);
      
      if (book) {
        // FILED BOOK - Render with Nintendo polish
        const age = Date.now() - book.spawnTime;
        const popProgress = Math.max(0, 1 - age / 200); // 200ms pop-in
        
        // Pop-in animation (scale from 0 to 1)
        const scale = 1 - popProgress * 0.5;
        const offsetY = popProgress * -5; // Bounce in from above
        
        ctx.save();
        ctx.translate(slotX + slotWidth/2, slotY + slotHeight/2 + offsetY);
        ctx.scale(scale, scale);
        
        // Book with slight 3D effect
        ctx.fillStyle = book.color;
        ctx.fillRect(-slotWidth/2, -slotHeight/2, slotWidth, slotHeight);
        
        // Spine (black line)
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(-slotWidth/2, -slotHeight/2, 1, slotHeight);
        
        // Page edge (white highlight)
        ctx.fillStyle = '#f0f0e8';
        ctx.globalAlpha = 0.6;
        ctx.fillRect(slotWidth/2 - 2, -slotHeight/2, 1, slotHeight);
        ctx.globalAlpha = 1;
        
        // Shine effect on newly filed books
        if (age < 500) {
          const shineAlpha = 1 - (age / 500);
          ctx.fillStyle = '#ffffff';
          ctx.globalAlpha = shineAlpha * 0.4;
          ctx.fillRect(-slotWidth/2, -slotHeight/2, slotWidth, slotHeight);
          ctx.globalAlpha = 1;
        }
        
        ctx.restore();
      } else {
        // EMPTY SLOT - Show subtle outline
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.lineWidth = 1;
        ctx.setLineDash([2, 2]);
        ctx.strokeRect(slotX, slotY, slotWidth, slotHeight);
        ctx.setLineDash([]);
      }
    }
  }
  
  // ═══════════════════════════════════════════════════════════════════════
  // CAPACITY COUNTER (Nintendo-style UI)
  // ═══════════════════════════════════════════════════════════════════════
  
  const counterY = y + shelfH/2 + 8;
  const fillPercentage = shelf.filedCount / shelf.capacity;
  
  // Progress bar background
  const barWidth = 60;
  const barHeight = 6;
  const barX = x - barWidth/2;
  
  ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
  ctx.fillRect(barX, counterY, barWidth, barHeight);
  
  // Progress bar fill (color-coded)
  let barColor = '#4a8cff'; // Blue
  if (fillPercentage >= 1.0) barColor = '#f0e840'; // Gold when complete
  else if (fillPercentage >= 0.75) barColor = '#2aaa5c'; // Green when close
  
  const fillWidth = barWidth * fillPercentage;
  
  // Animated fill with shimmer
  const shimmer = Math.sin(Date.now() * 0.01) * 0.1 + 0.9;
  ctx.fillStyle = barColor;
  ctx.globalAlpha = shimmer;
  ctx.fillRect(barX, counterY, fillWidth, barHeight);
  ctx.globalAlpha = 1;
  
  // Bar border
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, counterY, barWidth, barHeight);
  
  // Counter text
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 3;
  ctx.font = 'bold 7px "Press Start 2P"';
  ctx.textAlign = 'center';
  const counterText = `${shelf.filedCount}/${shelf.capacity}`;
  ctx.strokeText(counterText, x, counterY + 16);
  ctx.fillText(counterText, x, counterY + 16);
  
  // ═══════════════════════════════════════════════════════════════════════
  // COMPLETION EFFECTS (Nintendo celebration!)
  // ═══════════════════════════════════════════════════════════════════════
  
  if (shelf.isComplete) {
    // Golden aura pulse
    const auraPulse = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
    ctx.globalAlpha = auraPulse * 0.3;
    ctx.fillStyle = '#f0e840';
    ctx.beginPath();
    ctx.arc(x, y, 50 + auraPulse * 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    
    // Completion star
    const starSize = 10 + Math.sin(Date.now() * 0.008) * 2;
    ctx.fillStyle = '#f0e840';
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    
    // Draw star above shelf
    const starY = y - shelfH/2 - 28;
    ctx.save();
    ctx.translate(x, starY);
    ctx.rotate(Date.now() * 0.001); // Slow rotation
    
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
      const outerRadius = starSize;
      const innerRadius = starSize * 0.4;
      
      // Outer point
      ctx.lineTo(
        Math.cos(angle) * outerRadius,
        Math.sin(angle) * outerRadius
      );
      
      // Inner point
      const innerAngle = angle + Math.PI / 5;
      ctx.lineTo(
        Math.cos(innerAngle) * innerRadius,
        Math.sin(innerAngle) * innerRadius
      );
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
    
    // Sparkles around completed shelf
    if (Math.random() < 0.3) {
      const sparkleAngle = Math.random() * Math.PI * 2;
      const sparkleDist = 40 + Math.random() * 15;
      PARTICLE_TYPES.SPARKLE(
        x + Math.cos(sparkleAngle) * sparkleDist,
        y + Math.sin(sparkleAngle) * sparkleDist,
        '#f0e840',
        500
      );
    }
    
    // Celebration animation (first 2 seconds after completion)
    if (shelf.completionCelebration > 0) {
      const celebProgress = 1 - (shelf.completionCelebration / 2000);
      
      // Expanding golden ring
      ctx.strokeStyle = '#f0e840';
      ctx.lineWidth = 3;
      ctx.globalAlpha = 1 - celebProgress;
      ctx.beginPath();
      ctx.arc(x, y, 30 + celebProgress * 50, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      
      // "COMPLETE!" text that rises and fades
      if (shelf.completionCelebration > 1500) {
        const textAlpha = (shelf.completionCelebration - 1500) / 500;
        const textY = y - 60 - (1 - textAlpha) * 20;
        
        ctx.globalAlpha = textAlpha;
        ctx.fillStyle = '#f0e840';
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 3;
        ctx.font = 'bold 8px "Press Start 2P"';
        ctx.textAlign = 'center';
        ctx.strokeText('COMPLETE!', x, textY);
        ctx.fillText('COMPLETE!', x, textY);
        ctx.globalAlpha = 1;
      }
    }
  }
  
  // Restore transformations (lean, scale, etc.)
  ctx.restore();
}

function renderTrashCan(can) {
  const x = can.x, y = can.y;
  
  // Glow if carrying trash
  let shouldGlow = false;
  for (const book of player.carrying) {
    if (book && book.type === 'TRASH') {
      shouldGlow = true;
      break;
    }
  }
  
  if (shouldGlow) {
    const pulse = Math.sin(can.glowPulse) * 0.3 + 0.7;
    ctx.globalAlpha = 0.5 * pulse;
    ctx.fillStyle = SHELF_GLOW.TRASH;
    ctx.fillRect(x - 50, y - 50, 100, 100);
    ctx.globalAlpha = 1;
  }
  
  // Acceptance pulse
  if (can.acceptPulse > 0) {
    ctx.globalAlpha = can.acceptPulse * 0.6;
    ctx.fillStyle = SHELF_GLOW.TRASH;
    const r = 50 + (1 - can.acceptPulse) * 40;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    
    // Secondary ring
    ctx.globalAlpha = can.acceptPulse * 0.3;
    ctx.beginPath();
    ctx.arc(x, y, r + 15, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  
  // Shadow
  ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
  ctx.fillRect(x - 30, y + 38, 60, 8);
  
  // ═══════════════════════════════════════════════════════════════════════
  // TRASH CAN - SCALED TO SHELF HEIGHT (72px)
  // ═══════════════════════════════════════════════════════════════════════
  
  // Trash can body - 3D cylinder (scaled 2.25x to match shelf height)
  const canW = 63;  // Scaled from 28
  const canH = 72;  // Matches shelf height!
  const topW = 72;  // Scaled from 32
  
  // Front face
  ctx.fillStyle = '#5a5a6a';
  ctx.fillRect(x - canW/2, y - canH/2 + 9, canW, canH);
  
  // Side panels (3D effect - left)
  ctx.fillStyle = '#4a4a5a';
  ctx.beginPath();
  ctx.moveTo(x - canW/2, y - canH/2 + 9);
  ctx.lineTo(x - canW/2 - 9, y - canH/2);
  ctx.lineTo(x - canW/2 - 9, y + canH/2);
  ctx.lineTo(x - canW/2, y + canH/2 + 9);
  ctx.closePath();
  ctx.fill();
  
  // Side panel (right)
  ctx.fillStyle = '#6a6a7a';
  ctx.beginPath();
  ctx.moveTo(x + canW/2, y - canH/2 + 9);
  ctx.lineTo(x + canW/2 + 9, y - canH/2);
  ctx.lineTo(x + canW/2 + 9, y + canH/2);
  ctx.lineTo(x + canW/2, y + canH/2 + 9);
  ctx.closePath();
  ctx.fill();
  
  // Metal bands (scaled)
  ctx.fillStyle = '#7a7a8a';
  ctx.fillRect(x - topW/2, y - canH/2, topW, 9);
  ctx.fillRect(x - canW/2 - 4, y, canW + 8, 7);
  
  // Lid (slightly open animation)
  const lidOpen = shouldGlow ? Math.sin(Date.now() * 0.01) * 4 : 0;
  
  // Lid back (scaled)
  ctx.fillStyle = '#6a6a7a';
  ctx.fillRect(x - topW/2, y - canH/2 - 13 + lidOpen, topW, 13);
  
  // Lid top (scaled)
  ctx.fillStyle = '#7a7a8a';
  ctx.beginPath();
  ctx.moveTo(x - topW/2, y - canH/2 - 13 + lidOpen);
  ctx.lineTo(x - topW/2 - 7, y - canH/2 - 18 + lidOpen);
  ctx.lineTo(x + topW/2 - 7, y - canH/2 - 18 + lidOpen);
  ctx.lineTo(x + topW/2, y - canH/2 - 13 + lidOpen);
  ctx.closePath();
  ctx.fill();
  
  // Lid handle (scaled)
  ctx.strokeStyle = '#8a8a9a';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(x, y - canH/2 - 22 + lidOpen, 13, Math.PI, 0, false);
  ctx.stroke();
  
  // Trash icon on can (scaled)
  ctx.fillStyle = '#f0e840'; // Changed to yellow (banana theme)
  ctx.font = '24px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('🗑', x, y + 5);
  
  // Label
  ctx.fillStyle = '#e87a2e';
  ctx.font = 'bold 7px "Press Start 2P"';
  ctx.fillText('TRASH', x, y - canH/2 - 16);
}

// ═══════════════════════════════════════════════════════════════════════════
// PIXELATED BOOK COVER ART - Nintendo-style pixel art symbols
// Each book type has a unique hand-crafted pixel icon
// ═══════════════════════════════════════════════════════════════════════════
function drawBookCoverArt(type, centerX, centerY) {
  const pixel = 2; // Each pixel is 2x2
  
  // Helper to draw a pixel
  const p = (x, y, color) => {
    ctx.fillStyle = color;
    ctx.fillRect(centerX + x * pixel, centerY + y * pixel, pixel, pixel);
  };
  
  switch(type) {
    case 'ROMANCE': // Heart with arrow (8×8 grid)
      // Heart outline
      p(-3, -2, '#ff6a9a'); p(-2, -2, '#ff6a9a');
      p(-1, -2, '#ff4a7a'); p(0, -2, '#ff4a7a');
      p(1, -2, '#ff6a9a'); p(2, -2, '#ff6a9a');
      
      p(-4, -1, '#ff6a9a'); p(-3, -1, '#ff8aaa');
      p(-2, -1, '#ff8aaa'); p(-1, -1, '#ff8aaa');
      p(0, -1, '#ff8aaa'); p(1, -1, '#ff8aaa');
      p(2, -1, '#ff8aaa'); p(3, -1, '#ff6a9a');
      
      p(-4, 0, '#ff6a9a'); p(-3, 0, '#ff8aaa');
      p(-2, 0, '#ff8aaa'); p(-1, 0, '#ff8aaa');
      p(0, 0, '#ff8aaa'); p(1, 0, '#ff8aaa');
      p(2, 0, '#ff8aaa'); p(3, 0, '#ff6a9a');
      
      p(-3, 1, '#ff6a9a'); p(-2, 1, '#ff8aaa');
      p(-1, 1, '#ff8aaa'); p(0, 1, '#ff8aaa');
      p(1, 1, '#ff8aaa'); p(2, 1, '#ff6a9a');
      
      p(-2, 2, '#ff6a9a'); p(-1, 2, '#ff8aaa');
      p(0, 2, '#ff8aaa'); p(1, 2, '#ff6a9a');
      
      p(-1, 3, '#ff6a9a'); p(0, 3, '#ff6a9a');
      
      // Arrow through heart
      p(-4, -3, '#8a6a4a'); p(-3, -3, '#8a6a4a');
      p(-2, -2, '#8a6a4a');
      p(-1, -1, '#8a6a4a');
      p(0, 0, '#8a6a4a');
      p(1, 1, '#8a6a4a');
      p(2, 2, '#8a6a4a'); p(3, 2, '#8a6a4a');
      p(4, 2, '#8a6a4a');
      // Arrow tip
      p(3, 1, '#8a6a4a'); p(3, 3, '#8a6a4a');
      break;
      
    case 'SCIENCE': // Microscope (7×9 grid)
      // Eyepiece
      p(-1, -4, '#5a5a5a'); p(0, -4, '#5a5a5a'); p(1, -4, '#5a5a5a');
      p(-1, -3, '#7a7a7a'); p(0, -3, '#7a7a7a'); p(1, -3, '#7a7a7a');
      // Body tube
      p(0, -2, '#5a5a5a'); p(0, -1, '#5a5a5a'); p(0, 0, '#5a5a5a');
      // Arm
      p(-1, 0, '#5a5a5a'); p(1, 0, '#5a5a5a');
      p(-2, 1, '#5a5a5a'); p(2, 1, '#5a5a5a');
      // Stage
      p(-2, 2, '#7a7a7a'); p(-1, 2, '#7a7a7a');
      p(0, 2, '#7a7a7a'); p(1, 2, '#7a7a7a'); p(2, 2, '#7a7a7a');
      // Base
      p(-3, 3, '#5a5a5a'); p(-2, 3, '#5a5a5a');
      p(-1, 3, '#5a5a5a'); p(0, 3, '#5a5a5a');
      p(1, 3, '#5a5a5a'); p(2, 3, '#5a5a5a'); p(3, 3, '#5a5a5a');
      p(-2, 4, '#7a7a7a'); p(-1, 4, '#7a7a7a');
      p(0, 4, '#7a7a7a'); p(1, 4, '#7a7a7a'); p(2, 4, '#7a7a7a');
      break;
      
    case 'HORROR': // Skull and crossbones (9×9 grid)
      // Skull top
      p(-2, -3, '#f0f0f0'); p(-1, -3, '#f0f0f0');
      p(0, -3, '#f0f0f0'); p(1, -3, '#f0f0f0'); p(2, -3, '#f0f0f0');
      // Skull middle
      p(-2, -2, '#f0f0f0'); p(-1, -2, '#1a1a1a'); // Left eye
      p(0, -2, '#f0f0f0'); p(1, -2, '#1a1a1a'); // Right eye
      p(2, -2, '#f0f0f0');
      p(-2, -1, '#f0f0f0'); p(-1, -1, '#f0f0f0');
      p(0, -1, '#f0f0f0'); p(1, -1, '#f0f0f0'); p(2, -1, '#f0f0f0');
      // Nose
      p(0, 0, '#1a1a1a');
      // Jaw
      p(-2, 1, '#f0f0f0'); p(-1, 1, '#f0f0f0');
      p(0, 1, '#f0f0f0'); p(1, 1, '#f0f0f0'); p(2, 1, '#f0f0f0');
      // Crossbones (left bone)
      p(-4, 3, '#f0f0f0'); p(-3, 3, '#f0f0f0');
      p(-2, 2, '#f0f0f0'); p(-1, 2, '#f0f0f0');
      p(0, 3, '#f0f0f0'); // Center
      p(1, 2, '#f0f0f0'); p(2, 2, '#f0f0f0');
      p(3, 3, '#f0f0f0'); p(4, 3, '#f0f0f0');
      // Crossbones (right bone)
      p(-4, 4, '#f0f0f0'); p(-3, 4, '#f0f0f0');
      p(-2, 3, '#f0f0f0'); p(-1, 3, '#f0f0f0');
      p(0, 4, '#f0f0f0'); // Center
      p(1, 3, '#f0f0f0'); p(2, 3, '#f0f0f0');
      p(3, 4, '#f0f0f0'); p(4, 4, '#f0f0f0');
      break;
      
    case 'SCIFI': // UFO spaceship (9×7 grid)
      // Dome
      p(-1, -3, '#8ac8ff'); p(0, -3, '#8ac8ff'); p(1, -3, '#8ac8ff');
      p(-2, -2, '#8ac8ff'); p(-1, -2, '#6aa8ff');
      p(0, -2, '#6aa8ff'); p(1, -2, '#6aa8ff'); p(2, -2, '#8ac8ff');
      // Body
      p(-3, -1, '#7a7a8a'); p(-2, -1, '#9a9aaa');
      p(-1, -1, '#9a9aaa'); p(0, -1, '#9a9aaa');
      p(1, -1, '#9a9aaa'); p(2, -1, '#9a9aaa'); p(3, -1, '#7a7a8a');
      p(-4, 0, '#7a7a8a'); p(-3, 0, '#9a9aaa');
      p(-2, 0, '#9a9aaa'); p(-1, 0, '#9a9aaa');
      p(0, 0, '#9a9aaa'); p(1, 0, '#9a9aaa');
      p(2, 0, '#9a9aaa'); p(3, 0, '#9a9aaa'); p(4, 0, '#7a7a8a');
      // Lights
      p(-2, 0, '#ffff6a'); p(0, 0, '#ffff6a'); p(2, 0, '#ffff6a');
      // Beam
      p(-1, 1, '#8ac8ff'); p(0, 1, '#8ac8ff'); p(1, 1, '#8ac8ff');
      p(0, 2, '#6aa8ff');

    case 'TABLETS': // E-reader/tablet device (7×9 grid)
      // Device outline
      p(-3, -4, '#2a2a2a'); p(-2, -4, '#2a2a2a');
      p(-1, -4, '#2a2a2a'); p(0, -4, '#2a2a2a');
      p(1, -4, '#2a2a2a'); p(2, -4, '#2a2a2a'); p(3, -4, '#2a2a2a');

      p(-3, -2, '#2a2a2a'); p(3, -2, '#2a2a2a');
      p(-3, -1, '#2a2a2a'); p(3, -1, '#2a2a2a');
      p(-3, 0, '#2a2a2a'); p(3, 0, '#2a2a2a');
      p(-3, 1, '#2a2a2a'); p(3, 1, '#2a2a2a');
      p(-3, 2, '#2a2a2a'); p(3, 2, '#2a2a2a');
      p(-3, 3, '#2a2a2a'); p(3, 3, '#2a2a2a');
      p(-3, 4, '#2a2a2a'); p(-2, 4, '#2a2a2a');
      p(-1, 4, '#2a2a2a'); p(0, 4, '#2a2a2a');
      p(1, 4, '#2a2a2a'); p(2, 4, '#2a2a2a'); p(3, 4, '#2a2a2a');
      // Screen (blue glow)
      p(-2, -3, '#4ac8ff'); p(-1, -3, '#4ac8ff');
      p(0, -3, '#4ac8ff'); p(1, -3, '#4ac8ff'); p(2, -3, '#4ac8ff');
      p(-2, -2, '#4ac8ff'); p(-1, -2, '#6ad8ff');
      p(0, -2, '#6ad8ff'); p(1, -2, '#6ad8ff'); p(2, -2, '#4ac8ff');
      p(-2, -1, '#4ac8ff'); p(-1, -1, '#6ad8ff');
      p(0, -1, '#6ad8ff'); p(1, -1, '#6ad8ff'); p(2, -1, '#4ac8ff');
      p(-2, 0, '#4ac8ff'); p(-1, 0, '#4ac8ff');
      p(0, 0, '#4ac8ff'); p(1, 0, '#4ac8ff'); p(2, 0, '#4ac8ff');
      p(-2, 1, '#4ac8ff'); p(-1, 1, '#4ac8ff');
      p(0, 1, '#4ac8ff'); p(1, 1, '#4ac8ff'); p(2, 1, '#4ac8ff');
      p(-2, 2, '#4ac8ff'); p(-1, 2, '#4ac8ff');
      p(0, 2, '#4ac8ff'); p(1, 2, '#4ac8ff'); p(2, 2, '#4ac8ff');
      // Home button
      p(0, 3, '#5a5a6a');
      break;
      
    case 'FORBIDDEN': // All-seeing eye (9×7 grid)
      // Eye outline (almond shape)
      p(-3, 0, '#3a3a3a');
      p(-2, -1, '#3a3a3a'); p(-2, 1, '#3a3a3a');
      p(-1, -2, '#3a3a3a'); p(-1, 2, '#3a3a3a');
      p(0, -2, '#3a3a3a'); p(0, 2, '#3a3a3a');
      p(1, -2, '#3a3a3a'); p(1, 2, '#3a3a3a');
      p(2, -1, '#3a3a3a'); p(2, 1, '#3a3a3a');
      p(3, 0, '#3a3a3a');

      p(-2, 0, '#f0f0f0'); p(-1, -1, '#f0f0f0');

      p(0, -1, '#f0f0f0'); p(0, 0, '#f0f0f0'); p(0, 1, '#f0f0f0');
      p(1, -1, '#f0f0f0'); p(1, 0, '#f0f0f0'); p(1, 1, '#f0f0f0');
      p(2, 0, '#f0f0f0');
      // Iris (purple/blue)
      p(-1, 0, '#6a4aaa'); p(0, -1, '#6a4aaa');
      p(0, 0, '#6a4aaa'); p(0, 1, '#6a4aaa'); p(1, 0, '#6a4aaa');
      // Pupil
      p(0, 0, '#1a1a1a');
      // Light rays
      p(0, -3, '#c8a84a'); p(0, 3, '#c8a84a');
      p(-4, 0, '#c8a84a'); p(4, 0, '#c8a84a');
      break;
      
    case 'MANGA': // Smiling face emote (8×8 grid)
      // Face outline
      p(-3, -2, '#ffd870'); p(-2, -2, '#ffd870');
      p(-1, -2, '#ffd870'); p(0, -2, '#ffd870');
      p(1, -2, '#ffd870'); p(2, -2, '#ffd870'); p(3, -2, '#ffd870');
      p(-3, -1, '#ffd870'); p(3, -1, '#ffd870');
      p(-4, 0, '#ffd870'); p(4, 0, '#ffd870');
      p(-4, 1, '#ffd870'); p(4, 1, '#ffd870');
      p(-3, 2, '#ffd870'); p(3, 2, '#ffd870');
      p(-3, 3, '#ffd870'); p(-2, 3, '#ffd870');
      p(-1, 3, '#ffd870'); p(0, 3, '#ffd870');
      p(1, 3, '#ffd870'); p(2, 3, '#ffd870'); p(3, 3, '#ffd870');
      // Eyes
      p(-2, 0, '#1a1a1a'); p(2, 0, '#1a1a1a');
      // Smile
      p(-2, 1, '#1a1a1a'); p(-1, 2, '#1a1a1a');
      p(0, 2, '#1a1a1a'); p(1, 2, '#1a1a1a'); p(2, 1, '#1a1a1a');
      // Cheek blush
      p(-3, 1, '#ff8a8a'); p(3, 1, '#ff8a8a');
      break;
      
    case 'MYSTERY': // Magnifying glass (7×9 grid)
      // Lens
      p(-1, -3, '#5a5a6a'); p(0, -3, '#5a5a6a'); p(1, -3, '#5a5a6a');
      p(-2, -2, '#5a5a6a'); p(-1, -2, '#c8e8ff');
      p(0, -2, '#c8e8ff'); p(1, -2, '#c8e8ff'); p(2, -2, '#5a5a6a');
      p(-2, -1, '#5a5a6a'); p(-1, -1, '#c8e8ff');
      p(0, -1, '#c8e8ff'); p(1, -1, '#c8e8ff'); p(2, -1, '#5a5a6a');
      p(-2, 0, '#5a5a6a'); p(-1, 0, '#c8e8ff');
      p(0, 0, '#c8e8ff'); p(1, 0, '#c8e8ff'); p(2, 0, '#5a5a6a');
      p(-1, 1, '#5a5a6a'); p(0, 1, '#5a5a6a'); p(1, 1, '#5a5a6a');
      // Highlight on glass
      p(-1, -2, '#ffffff'); p(0, -2, '#ffffff');
      // Handle
      p(2, 1, '#6a4a2a'); p(3, 2, '#6a4a2a');
      p(3, 3, '#6a4a2a'); p(3, 4, '#6a4a2a');
      break;
      
    case 'FANTASY': // Sword (5×11 grid)
      // Blade
      p(0, -5, '#c8c8d8'); p(0, -4, '#c8c8d8');
      p(0, -3, '#c8c8d8'); p(0, -2, '#c8c8d8');
      p(0, -1, '#c8c8d8'); p(0, 0, '#c8c8d8');
      p(0, 1, '#c8c8d8');
      // Blade shine
      p(-1, -4, '#ffffff'); p(-1, -3, '#ffffff');
      p(-1, -2, '#ffffff'); p(-1, -1, '#ffffff');
      // Guard (crossguard)
      p(-2, 2, '#c8a84a'); p(-1, 2, '#c8a84a');
      p(0, 2, '#c8a84a'); p(1, 2, '#c8a84a'); p(2, 2, '#c8a84a');
      // Handle
      p(0, 3, '#6a4a2a'); p(0, 4, '#6a4a2a');
      // Pommel
      p(-1, 5, '#c8a84a'); p(0, 5, '#c8a84a'); p(1, 5, '#c8a84a');
      break;
      
    case 'HISTORY': // Hourglass (7×9 grid)
      // Top frame
      p(-2, -4, '#8a6a4a'); p(-1, -4, '#8a6a4a');
      p(0, -4, '#8a6a4a'); p(1, -4, '#8a6a4a'); p(2, -4, '#8a6a4a');
      // Top sand chamber
      p(-1, -3, '#5a4a3a'); p(0, -3, '#5a4a3a'); p(1, -3, '#5a4a3a');
      p(-1, -2, '#d8b878'); p(0, -2, '#d8b878'); p(1, -2, '#d8b878');
      p(0, -1, '#d8b878');
      // Neck (narrow)
      p(0, 0, '#5a4a3a');
      // Bottom sand chamber (filling)
      p(0, 1, '#d8b878');
      p(-1, 2, '#d8b878'); p(0, 2, '#d8b878'); p(1, 2, '#d8b878');
      p(-1, 3, '#d8b878'); p(0, 3, '#d8b878'); p(1, 3, '#d8b878');
      // Bottom frame
      p(-2, 4, '#8a6a4a'); p(-1, 4, '#8a6a4a');
      p(0, 4, '#8a6a4a'); p(1, 4, '#8a6a4a'); p(2, 4, '#8a6a4a');
      // Glass outline
      p(-2, -3, '#5a4a3a'); p(2, -3, '#5a4a3a');
      p(-2, -2, '#5a4a3a'); p(2, -2, '#5a4a3a');
      p(-1, -1, '#5a4a3a'); p(1, -1, '#5a4a3a');
      p(-1, 1, '#5a4a3a'); p(1, 1, '#5a4a3a');
      p(-2, 2, '#5a4a3a'); p(2, 2, '#5a4a3a');
      p(-2, 3, '#5a4a3a'); p(2, 3, '#5a4a3a');
      break;
      
    case 'MUSIC': // Music note (6×9 grid)
      // Note stem
      p(2, -4, '#2a2a2a'); p(2, -3, '#2a2a2a');
      p(2, -2, '#2a2a2a'); p(2, -1, '#2a2a2a');
      p(2, 0, '#2a2a2a'); p(2, 1, '#2a2a2a');
      // Note flag
      p(3, -4, '#2a2a2a'); p(4, -4, '#2a2a2a');
      p(3, -3, '#2a2a2a'); p(4, -3, '#2a2a2a');
      p(3, -2, '#2a2a2a');
      // Note head (filled circle)
      p(0, 2, '#2a2a2a'); p(1, 2, '#2a2a2a'); p(2, 2, '#2a2a2a');
      p(-1, 3, '#2a2a2a'); p(0, 3, '#2a2a2a');
      p(1, 3, '#2a2a2a'); p(2, 3, '#2a2a2a'); p(3, 3, '#2a2a2a');
      p(0, 4, '#2a2a2a'); p(1, 4, '#2a2a2a'); p(2, 4, '#2a2a2a');
      break;
      
    case 'ART': // Paint palette (9×8 grid)
      // Palette shape
      p(-3, -2, '#d8c8a8'); p(-2, -2, '#d8c8a8');
      p(-1, -2, '#d8c8a8'); p(0, -2, '#d8c8a8');
      p(1, -2, '#d8c8a8'); p(2, -2, '#d8c8a8'); p(3, -2, '#d8c8a8');
      p(-4, -1, '#d8c8a8'); p(-3, -1, '#d8c8a8');
      p(-2, -1, '#d8c8a8'); p(-1, -1, '#d8c8a8');
      p(0, -1, '#d8c8a8'); p(1, -1, '#d8c8a8');
      p(2, -1, '#d8c8a8'); p(3, -1, '#d8c8a8'); p(4, -1, '#d8c8a8');
      p(-4, 0, '#d8c8a8'); p(-3, 0, '#d8c8a8');
      p(-2, 0, '#d8c8a8'); p(-1, 0, '#d8c8a8');
      p(0, 0, '#d8c8a8'); p(1, 0, '#d8c8a8');
      p(2, 0, '#d8c8a8'); p(3, 0, '#d8c8a8'); p(4, 0, '#d8c8a8');
      p(-4, 1, '#d8c8a8'); p(-3, 1, '#d8c8a8');
      p(-2, 1, '#d8c8a8'); p(-1, 1, '#d8c8a8');
      p(0, 1, '#d8c8a8'); p(1, 1, '#d8c8a8');
      p(2, 1, '#d8c8a8'); p(3, 1, '#d8c8a8'); p(4, 1, '#d8c8a8');
      p(-3, 2, '#d8c8a8'); p(-2, 2, '#d8c8a8');
      p(-1, 2, '#d8c8a8'); p(0, 2, '#d8c8a8');
      p(1, 2, '#d8c8a8'); p(2, 2, '#d8c8a8');
      // Thumb hole
      p(3, 1, '#2a2a2a'); p(4, 1, '#2a2a2a');
      p(3, 2, '#2a2a2a'); p(4, 2, '#2a2a2a');
      // Paint dabs
      p(-3, -1, '#ff4a4a'); // Red
      p(-1, -1, '#ffd84a'); // Yellow
      p(1, -1, '#4a8aff'); // Blue
      p(-2, 0, '#ff8a4a'); // Orange
      p(0, 0, '#4aff4a'); // Green
      p(2, 0, '#d84aff'); // Purple
      break;
  }
}

function renderBook(book) {
  if (!book || !book.type) return; // Safety check
  
  ctx.save();
  ctx.translate(book.x, book.y + Math.sin(book.bobPhase) * 3);
  ctx.rotate(book.rot);
  
  // ═══════════════════════════════════════════════════════════════════════
  // TRASH = BANANA PEEL (not a book!)
  // ═══════════════════════════════════════════════════════════════════════
  if (book.type === 'TRASH') {
    // Scale banana peel to match book size (32×44 equivalent)
    const scale = 1.6; // Scale up to match bigger books
    
    ctx.save();
    ctx.scale(scale, scale);
    
    // ═══ POLISHED BANANA PEEL (Realistic Orientation) ═══
    // Stem at TOP, opened peel segments fanning OUT at BOTTOM
    
    // ═══ STEM (top - closed end) ═══
    ctx.fillStyle = '#8a6a2a'; // Brown stem
    ctx.fillRect(-1, -18, 2, 4);
    
    // Stem tip
    ctx.fillStyle = '#6a4a1a';
    ctx.beginPath();
    ctx.moveTo(-1, -18);
    ctx.lineTo(0, -20);
    ctx.lineTo(1, -18);
    ctx.fill();
    
    // ═══ MAIN BANANA BODY (center - vertical) ═══
    ctx.fillStyle = '#ffe135'; // Bright yellow
    ctx.beginPath();
    ctx.ellipse(0, -5, 5, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Body glow (soft edge)
    ctx.fillStyle = 'rgba(255, 225, 53, 0.4)';
    ctx.beginPath();
    ctx.ellipse(0, -5, 6, 13, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // ═══ FOUR PEEL SEGMENTS (Fanning OUT at bottom) ═══
    
    // LEFT PEEL (bottom left - fanning outward)
    ctx.fillStyle = '#f0d840';
    ctx.beginPath();
    ctx.moveTo(-3, 0); // Start at center bottom
    ctx.bezierCurveTo(-5, 2, -9, 5, -11, 8);      // Curve outward
    ctx.bezierCurveTo(-12, 10, -11, 12, -9, 13);   // Curl at tip
    ctx.bezierCurveTo(-7, 14, -5, 12, -4, 9);      // Curve back
    ctx.bezierCurveTo(-3, 6, -3, 3, -3, 0);        // Connect to center
    ctx.closePath();
    ctx.fill();
    
    // LEFT PEEL inner curve (concave depth)
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.beginPath();
    ctx.moveTo(-3, 2);
    ctx.quadraticCurveTo(-7, 6, -8, 10);
    ctx.quadraticCurveTo(-5, 10, -3, 6);
    ctx.closePath();
    ctx.fill();
    
    // RIGHT PEEL (bottom right - fanning outward)
    ctx.fillStyle = '#f0d840';
    ctx.beginPath();
    ctx.moveTo(3, 0); // Start at center bottom
    ctx.bezierCurveTo(5, 2, 9, 5, 11, 8);       // Curve outward
    ctx.bezierCurveTo(12, 10, 11, 12, 9, 13);    // Curl at tip
    ctx.bezierCurveTo(7, 14, 5, 12, 4, 9);       // Curve back
    ctx.bezierCurveTo(3, 6, 3, 3, 3, 0);         // Connect to center
    ctx.closePath();
    ctx.fill();
    
    // RIGHT PEEL inner curve (concave depth)
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.beginPath();
    ctx.moveTo(3, 2);
    ctx.quadraticCurveTo(7, 6, 8, 10);
    ctx.quadraticCurveTo(5, 10, 3, 6);
    ctx.closePath();
    ctx.fill();
    
    // BACK LEFT PEEL (bottom back left - fanning outward)
    ctx.fillStyle = '#e8c830';
    ctx.beginPath();
    ctx.moveTo(-1, 1); // Start near center
    ctx.bezierCurveTo(-3, 4, -6, 8, -7, 12);     // Curve out-back
    ctx.bezierCurveTo(-7, 14, -6, 15, -4, 14);   // Curl
    ctx.bezierCurveTo(-2, 13, -1, 10, -1, 7);    // Back to center
    ctx.bezierCurveTo(-1, 5, -1, 3, -1, 1);
    ctx.closePath();
    ctx.fill();
    
    // BACK RIGHT PEEL (bottom back right - fanning outward)
    ctx.fillStyle = '#e8c830';
    ctx.beginPath();
    ctx.moveTo(1, 1); // Start near center
    ctx.bezierCurveTo(3, 4, 6, 8, 7, 12);      // Curve out-back
    ctx.bezierCurveTo(7, 14, 6, 15, 4, 14);    // Curl
    ctx.bezierCurveTo(2, 13, 1, 10, 1, 7);     // Back to center
    ctx.bezierCurveTo(1, 5, 1, 3, 1, 1);
    ctx.closePath();
    ctx.fill();
    
    // ═══ PEEL HIGHLIGHTS (shine on peels) ═══
    ctx.fillStyle = 'rgba(255, 255, 200, 0.5)';
    
    // Left peel shine
    ctx.beginPath();
    ctx.ellipse(-7, 7, 2, 3, -0.4, 0, Math.PI * 2);
    ctx.fill();
    
    // Right peel shine
    ctx.beginPath();
    ctx.ellipse(7, 7, 2, 3, 0.4, 0, Math.PI * 2);
    ctx.fill();
    
    // ═══ BROWN SPOTS (aged/rotten) ═══
    ctx.fillStyle = '#8a6a2a';
    
    // Body spots
    ctx.beginPath();
    ctx.ellipse(-3, -8, 1.2, 1.5, 0.2, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.beginPath();
    ctx.ellipse(2, -5, 1, 1.3, -0.3, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.beginPath();
    ctx.arc(0, -12, 0.7, 0, Math.PI * 2);
    ctx.fill();
    
    // Peel spots
    ctx.beginPath();
    ctx.arc(-7, 9, 0.8, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.beginPath();
    ctx.arc(6, 10, 0.9, 0, Math.PI * 2);
    ctx.fill();
    
    // ═══ CENTER OPENING (where peels fan out) ═══
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 2, 4, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // ═══ BODY SHINE (glossy banana) ═══
    ctx.fillStyle = 'rgba(255, 255, 220, 0.6)';
    ctx.beginPath();
    ctx.ellipse(-2, -10, 2, 4, -0.2, 0, Math.PI * 2);
    ctx.fill();
    
    // ═══ PEEL EDGE OUTLINES ═══
    ctx.strokeStyle = '#d4b830';
    ctx.lineWidth = 0.5;
    ctx.globalAlpha = 0.6;
    
    // Outline main peels
    ctx.beginPath();
    ctx.moveTo(-3, 0);
    ctx.bezierCurveTo(-5, 2, -9, 5, -11, 8);
    ctx.bezierCurveTo(-12, 10, -11, 12, -9, 13);
    ctx.stroke();
    
    ctx.beginPath();
    ctx.moveTo(3, 0);
    ctx.bezierCurveTo(5, 2, 9, 5, 11, 8);
    ctx.bezierCurveTo(12, 10, 11, 12, 9, 13);
    ctx.stroke();
    
    ctx.globalAlpha = 1;
    
    ctx.restore(); // End banana peel scale
    
    // ═══════════════════════════════════════════════════════════════════════
    // NINTENDO POLISH: STINK LINES (Odor emanating from rotten banana)
    // ═══════════════════════════════════════════════════════════════════════
    
    const time = Date.now();
    const stinkPhase = book.bobPhase + time * 0.002;
    
    // Green wavy stink lines (3 lines emanating from top)
    ctx.strokeStyle = '#8aaa6a';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.globalAlpha = 0.6 + Math.sin(stinkPhase) * 0.2;
    
    for (let i = 0; i < 3; i++) {
      const offsetX = (i - 1) * 8; // Spread lines left-right
      const linePhase = stinkPhase + i * 0.5;
      
      ctx.beginPath();
      
      // Wavy line going upward from banana
      for (let j = 0; j < 5; j++) {
        const t = j / 4;
        const x = offsetX + Math.sin(linePhase + j * 0.5) * 3;
        const y = -35 - (t * 15); // Rise upward from top of banana
        
        if (j === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      }
      ctx.stroke();
    }
    
    ctx.globalAlpha = 1;
    
  } else {
    // ═══════════════════════════════════════════════════════════════════════
    // REGULAR BOOK - NINTENDO AAA+ POLISH (40×56 - Even Bigger!)
    // Enhanced with depth, shadows, highlights, and premium details
    // ═══════════════════════════════════════════════════════════════════════
    
    const bookW = 40;
    const bookH = 56;
    const bookX = -bookW / 2;
    const bookY = -bookH / 2;
    
    // ═══ DROP SHADOW (depth) ═══
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.fillRect(bookX + 2, bookY + 2, bookW, bookH);
    
    // ═══ BOOK BODY (main color) ═══
    ctx.fillStyle = BOOK_COLORS[book.type];
    ctx.fillRect(bookX, bookY, bookW, bookH);
    
    // ═══ COVER GRADIENT (subtle depth) ═══
    const coverGrad = ctx.createLinearGradient(bookX, bookY, bookX + bookW, bookY);
    coverGrad.addColorStop(0, 'rgba(0, 0, 0, 0.15)');
    coverGrad.addColorStop(0.3, 'rgba(255, 255, 255, 0.1)');
    coverGrad.addColorStop(0.7, 'rgba(0, 0, 0, 0.05)');
    coverGrad.addColorStop(1, 'rgba(0, 0, 0, 0.2)');
    ctx.fillStyle = coverGrad;
    ctx.fillRect(bookX, bookY, bookW, bookH);
    
    // ═══ SPINE (left side - darker) ═══
    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
    ctx.fillRect(bookX - 2, bookY, 2, bookH);
    
    // Spine highlight
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(bookX - 2, bookY, 1, bookH);
    
    // ═══ PAGE EDGES (right side - cream colored) ═══
    ctx.fillStyle = '#f0ebd6';
    ctx.fillRect(bookX + bookW, bookY, 2, bookH);
    
    // Page lines (individual pages visible)
    ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
    for (let i = 0; i < 8; i++) {
      const pageY = bookY + (i * bookH / 8);
      ctx.fillRect(bookX + bookW, pageY, 2, 1);
    }
    
    // ═══ TOP EDGE (pages visible from top) ═══
    ctx.fillStyle = '#f0ebd6';
    ctx.fillRect(bookX, bookY - 2, bookW, 2);
    
    // Top page shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.fillRect(bookX, bookY - 2, bookW, 1);
    
    // ═══ COVER BORDER (embossed edge) ═══
    ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(bookX + 2, bookY + 2, bookW - 4, bookH - 4);
    
    // ═══ CORNER DETAILS (book wear/damage) ═══
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    // Top-left corner
    ctx.fillRect(bookX, bookY, 4, 1);
    ctx.fillRect(bookX, bookY, 1, 4);
    // Bottom-right corner
    ctx.fillRect(bookX + bookW - 4, bookY + bookH - 1, 4, 1);
    ctx.fillRect(bookX + bookW - 1, bookY + bookH - 4, 1, 4);
    
    // ═══ COVER SHINE (glossy highlight) ═══
    const shineGrad = ctx.createLinearGradient(bookX, bookY, bookX, bookY + 20);
    shineGrad.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
    shineGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.fillStyle = shineGrad;
    ctx.fillRect(bookX + 4, bookY + 2, bookW - 8, 18);
    
    // ═══════════════════════════════════════════════════════════════════════
    // PIXELATED COVER ART (Perfectly centered)
    // ═══════════════════════════════════════════════════════════════════════
    drawBookCoverArt(book.type, 0, 0);
  }
  
  ctx.restore();
}

function renderPowerup(p) {
  if (!p || !p.type) return; // Safety check
  
  const powerup = POWERUP_TYPES[p.type];
  if (!powerup) return; // Safety check
  
  const x = p.x;
  const y = p.y + Math.sin(p.bobPhase) * 6; // Increased bob amplitude
  
  // ═══════════════════════════════════════════════════════════════════════
  // BIGGER POWERUPS - 2x scale for visibility!
  // ═══════════════════════════════════════════════════════════════════════
  
  // Pulsing glow (larger)
  const pulse = Math.sin(p.pulsePhase) * 0.3 + 0.7;
  ctx.globalAlpha = 0.5 * pulse;
  ctx.fillStyle = powerup.color;
  ctx.beginPath();
  ctx.arc(x, y, 40, 0, Math.PI * 2); // Increased from 20 to 40
  ctx.fill();
  ctx.globalAlpha = 1;
  
  // Secondary glow ring (extra visibility)
  ctx.globalAlpha = 0.3 * pulse;
  ctx.fillStyle = powerup.color;
  ctx.beginPath();
  ctx.arc(x, y, 50, 0, Math.PI * 2); // Extra outer glow
  ctx.fill();
  ctx.globalAlpha = 1;
  
  // Icon background (larger)
  ctx.fillStyle = 'rgba(42, 42, 74, 0.9)';
  ctx.beginPath();
  ctx.arc(x, y, 28, 0, Math.PI * 2); // Increased from 14 to 28
  ctx.fill();
  
  // Border (thicker and larger)
  ctx.strokeStyle = powerup.color;
  ctx.lineWidth = 4; // Increased from 2 to 4
  ctx.beginPath();
  ctx.arc(x, y, 28, 0, Math.PI * 2); // Increased from 14 to 28
  ctx.stroke();
  
  // Inner highlight ring (polish)
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, 26, Math.PI * 1.2, Math.PI * 1.8);
  ctx.stroke();
  
  // Icon (larger)
  ctx.font = '32px "Press Start 2P"'; // Increased from 16 to 32
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = powerup.color;
  ctx.fillText(powerup.icon, x, y);
  ctx.textBaseline = 'alphabetic';
  
  // Sparkle particles around powerup (extra polish)
  if (Math.random() < 0.1) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 35 + Math.random() * 10;
    PARTICLE_TYPES.SPARKLE(
      x + Math.cos(angle) * dist,
      y + Math.sin(angle) * dist,
      powerup.color,
      600
    );
  }
}

function renderPlayer() {
  const px = player.x;
  const py = player.y;
  
  // Render dash trail first (behind player)
  if (player.dashTrail.length > 0) {
    for (let i = 0; i < player.dashTrail.length; i++) {
      const trail = player.dashTrail[i];
      const alpha = trail.alpha * (i / player.dashTrail.length);
      ctx.globalAlpha = alpha * 0.4;
      
      // Simplified player silhouette for trail
      ctx.fillStyle = '#d62a2a'; // Red luchador color
      ctx.fillRect(trail.x - 7, trail.y - 10, 14, 20);
      
      ctx.globalAlpha = 1;
    }
  }
  
  // Invincibility glow
  if (player.invincible) {
    const pulse = Math.sin(Date.now() * 0.02) * 0.5 + 0.5;
    ctx.globalAlpha = 0.6 * pulse;
    ctx.fillStyle = POWERUP_TYPES.REPEL.color;
    ctx.beginPath();
    ctx.arc(px, py, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  
  // Idle breathing animation
  const breathe = Math.sin(player.idleTimer * 0.003) * 1.5;
  const baseY = py + breathe;
  
  // ═══════════════════════════════════════════════════════════════════════
  // LUCHADOR LIBRARIAN - NINTENDO AAA+ CHARACTER DESIGN
  // Professional wrestler meets sophisticated librarian aesthetic
  // ═══════════════════════════════════════════════════════════════════════
  const PLAYER_SCALE = 2.6;
  
  // Cape sway animation (follows breathing + movement)
  const capeSway = Math.sin(player.idleTimer * 0.004 + Date.now() * 0.001) * 1.5;
  const capeMovement = player.walkFrame === 1 ? 1 : player.walkFrame === 3 ? -1 : 0;
  
  // Shadow (scaled)
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(px, baseY + 15 * PLAYER_SCALE, 14 * PLAYER_SCALE, 5 * PLAYER_SCALE, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Apply scale transformation
  ctx.save();
  ctx.translate(px, baseY);
  ctx.scale(PLAYER_SCALE, PLAYER_SCALE);
  ctx.translate(-px, -baseY);
  
  // ═══ CAPE (renders behind body) ═══
  if (player.dir !== 0) { // Don't render cape in front view
    const capeX = px + (player.dir === 1 ? -8 : player.dir === 3 ? 8 : 0);
    const capeY = baseY - 8;
    const capeWidth = 16;
    const capeHeight = 20;
    
    // Cape shadow (depth)
    ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
    ctx.fillRect(capeX - capeWidth/2 + 1 + capeSway, capeY + 1, capeWidth, capeHeight);
    
    // Cape main (deep red)
    ctx.fillStyle = '#c41e1e';
    ctx.fillRect(capeX - capeWidth/2 + capeSway, capeY, capeWidth, capeHeight);
    
    // Cape highlights (shine/fabric folds)
    ctx.fillStyle = '#e84a4a';
    ctx.fillRect(capeX - capeWidth/2 + 2 + capeSway, capeY + 2, 4, capeHeight - 4);
    ctx.fillRect(capeX - capeWidth/2 + capeWidth - 6 + capeSway, capeY + 2, 4, capeHeight - 4);
    
    // Cape border (gold trim - luxury detail)
    ctx.strokeStyle = '#c8a84a';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(capeX - capeWidth/2 + capeSway, capeY, capeWidth, capeHeight);
    
    // Cape attachment points (gold clasps)
    ctx.fillStyle = '#f0d870';
    ctx.fillRect(px - 8, baseY - 8, 3, 3);
    ctx.fillRect(px + 5, baseY - 8, 3, 3);
    
    // Clasp shine
    ctx.fillStyle = '#fff8dc';
    ctx.fillRect(px - 8, baseY - 8, 1, 1);
    ctx.fillRect(px + 5, baseY - 8, 1, 1);
  }
  
  // Walking animation - leg positions
  const walkCycle = [
    { left: 0, right: 0 },
    { left: -2, right: 2 },
    { left: 0, right: 0 },
    { left: 2, right: -2 }
  ];
  const legPos = walkCycle[player.walkFrame];
  
  // ═══ LEGS & WRESTLING BOOTS ═══
  ctx.fillStyle = '#d62a2a'; // Red tights
  
  if (player.dir === 0 || player.dir === 2) { // Front/back view
    // Left leg (tights)
    ctx.fillRect(px - 6, baseY + 4 + legPos.left, 5, 9);
    // Right leg (tights)
    ctx.fillRect(px + 1, baseY + 4 + legPos.right, 5, 9);
    
    // Knee pads (protective gear)
    ctx.fillStyle = '#c8a84a'; // Gold
    ctx.fillRect(px - 6, baseY + 7 + legPos.left, 5, 2);
    ctx.fillRect(px + 1, baseY + 7 + legPos.right, 5, 2);
    
    // Knee pad highlights
    ctx.fillStyle = '#f0d870';
    ctx.fillRect(px - 6, baseY + 7 + legPos.left, 5, 1);
    ctx.fillRect(px + 1, baseY + 7 + legPos.right, 5, 1);
    
    // Wrestling boots (high-top)
    ctx.fillStyle = '#2a2a2a'; // Black leather
    ctx.fillRect(px - 7, baseY + 11 + legPos.left, 6, 5);
    ctx.fillRect(px + 1, baseY + 11 + legPos.right, 6, 5);
    
    // Boot highlights (shine)
    ctx.fillStyle = '#4a4a4a';
    ctx.fillRect(px - 7, baseY + 11 + legPos.left, 1, 5);
    ctx.fillRect(px + 1, baseY + 11 + legPos.right, 1, 5);
    
    // Gold boot trim
    ctx.fillStyle = '#c8a84a';
    ctx.fillRect(px - 7, baseY + 11 + legPos.left, 6, 1);
    ctx.fillRect(px + 1, baseY + 11 + legPos.right, 6, 1);
    
    // Boot laces (detail)
    ctx.strokeStyle = '#c8a84a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px - 4, baseY + 12 + legPos.left);
    ctx.lineTo(px - 4, baseY + 15 + legPos.left);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px + 4, baseY + 12 + legPos.right);
    ctx.lineTo(px + 4, baseY + 15 + legPos.right);
    ctx.stroke();
  } else { // Side view
    const offset = player.walkFrame === 1 || player.walkFrame === 3 ? 1 : 0;
    
    // Leg (tights)
    ctx.fillRect(px - 3, baseY + 4 + offset, 6, 9);
    
    // Knee pad
    ctx.fillStyle = '#c8a84a';
    ctx.fillRect(px - 3, baseY + 7 + offset, 6, 2);
    ctx.fillStyle = '#f0d870';
    ctx.fillRect(px - 3, baseY + 7 + offset, 6, 1);
    
    // Boot
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(px - 3, baseY + 11 + offset, 6, 5);
    ctx.fillStyle = '#4a4a4a';
    ctx.fillRect(px - 3, baseY + 11 + offset, 1, 5);
    ctx.fillStyle = '#c8a84a';
    ctx.fillRect(px - 3, baseY + 11 + offset, 6, 1);
  }
  
  // ═══ BODY - WRESTLING SINGLET & LIBRARY VEST ═══
  const bodyY = baseY - 3;
  
  // Wrestling singlet base (red with gold accents)
  ctx.fillStyle = '#d62a2a';
  ctx.fillRect(px - 8, bodyY, 16, 10);
  
  // Singlet center stripe (white for contrast)
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(px - 2, bodyY + 1, 4, 8);
  
  // Gold side accents (athletic design)
  ctx.fillStyle = '#c8a84a';
  ctx.fillRect(px - 8, bodyY + 3, 2, 5);
  ctx.fillRect(px + 6, bodyY + 3, 2, 5);
  
  // Gold accent highlights (shine)
  ctx.fillStyle = '#f0d870';
  ctx.fillRect(px - 8, bodyY + 3, 1, 5);
  ctx.fillRect(px + 7, bodyY + 3, 1, 5);
  
  // Library vest (professional touch)
  ctx.fillStyle = '#3a2a1a'; // Dark brown leather
  // Left side
  ctx.fillRect(px - 9, bodyY, 4, 10);
  // Right side
  ctx.fillRect(px + 5, bodyY, 4, 10);
  
  // Vest shading (depth)
  ctx.fillStyle = '#2a1a0a';
  ctx.fillRect(px - 9, bodyY, 1, 10);
  ctx.fillRect(px + 8, bodyY, 1, 10);
  
  // Gold vest buttons (luxury detail)
  ctx.fillStyle = '#c8a84a';
  ctx.fillRect(px - 8, bodyY + 2, 2, 2);
  ctx.fillRect(px - 8, bodyY + 6, 2, 2);
  ctx.fillRect(px + 6, bodyY + 2, 2, 2);
  ctx.fillRect(px + 6, bodyY + 6, 2, 2);
  
  // Button highlights
  ctx.fillStyle = '#f0d870';
  ctx.fillRect(px - 8, bodyY + 2, 1, 1);
  ctx.fillRect(px - 8, bodyY + 6, 1, 1);
  ctx.fillRect(px + 6, bodyY + 2, 1, 1);
  ctx.fillRect(px + 6, bodyY + 6, 1, 1);
  
  // Championship belt (optional - if carrying < 3 books)
  if (player.carrying.length < 3) {
    ctx.fillStyle = '#1a1a0a';
    ctx.fillRect(px - 8, bodyY + 9, 16, 2);
    
    // Gold belt buckle
    ctx.fillStyle = '#c8a84a';
    ctx.fillRect(px - 2, bodyY + 8, 4, 4);
    
    // Buckle detail
    ctx.fillStyle = '#f0d870';
    ctx.fillRect(px - 2, bodyY + 8, 4, 1);
    ctx.fillRect(px - 2, bodyY + 8, 1, 4);
    
    // Belt rivets
    ctx.fillStyle = '#8a7a6a';
    ctx.fillRect(px - 7, bodyY + 9, 1, 1);
    ctx.fillRect(px + 6, bodyY + 9, 1, 1);
  }
  
  // ═══ ARMS (human skin tone) ═══
  ctx.fillStyle = '#e8b88a'; // Natural skin
  const armSwing = player.walkFrame === 1 ? -2 : player.walkFrame === 3 ? 2 : 0;
  
  const isCarrying = player.carrying.length > 0;
  
  if (player.dir === 0 || player.dir === 2) { // Front/back view
    if (isCarrying) {
      // Arms holding books in front
      ctx.fillRect(px - 11, bodyY + 3, 3, 8);
      ctx.fillRect(px + 8, bodyY + 3, 3, 8);
      
      // Hands (darker)
      ctx.fillStyle = '#d8a87a';
      ctx.fillRect(px - 11, bodyY + 10, 3, 3);
      ctx.fillRect(px + 8, bodyY + 10, 3, 3);
    } else {
      // Arms at sides, animated
      ctx.fillRect(px - 11, bodyY + 2 - armSwing, 3, 8);
      ctx.fillRect(px + 8, bodyY + 2 + armSwing, 3, 8);
      
      // Hands
      ctx.fillStyle = '#d8a87a';
      ctx.fillRect(px - 11, bodyY + 9 - armSwing, 3, 3);
      ctx.fillRect(px + 8, bodyY + 9 + armSwing, 3, 3);
    }
    
    // Vest sleeves (partial coverage)
    ctx.fillStyle = '#3a2a1a';
    ctx.fillRect(px - 11, bodyY, 3, 4);
    ctx.fillRect(px + 8, bodyY, 3, 4);
    
    // Wrist tape (wrestling detail)
    if (!isCarrying) {
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(px - 11, bodyY + 8 - armSwing, 3, 1);
      ctx.fillRect(px + 8, bodyY + 8 + armSwing, 3, 1);
    }
  } else { // Side view
    const ax = player.dir === 1 ? px + 7 : px - 10;
    
    if (isCarrying) {
      ctx.fillRect(ax, bodyY + 3, 3, 8);
      ctx.fillStyle = '#d8a87a';
      ctx.fillRect(ax, bodyY + 10, 3, 3);
    } else {
      ctx.fillRect(ax, bodyY + 2 + armSwing, 3, 8);
      ctx.fillStyle = '#d8a87a';
      ctx.fillRect(ax, bodyY + 9 + armSwing, 3, 3);
      
      // Wrist tape
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(ax, bodyY + 8 + armSwing, 3, 1);
    }
    
    // Vest sleeve
    ctx.fillStyle = '#3a2a1a';
    ctx.fillRect(ax, bodyY, 3, 4);
  }
  
  // ═══ HEAD & LUCHADOR MASK ═══
  const headBob = player.walkFrame === 0 || player.walkFrame === 2 ? 0 : -1;
  const headY = bodyY - 9 + headBob;
  
  // Neck (skin showing)
  ctx.fillStyle = '#e8b88a';
  ctx.fillRect(px - 3, bodyY - 2, 6, 3);
  
  // Bow tie (librarian sophistication)
  ctx.fillStyle = '#1a1a4a'; // Dark blue
  ctx.fillRect(px - 4, bodyY - 1, 8, 2);
  ctx.fillRect(px - 2, bodyY - 2, 4, 4);
  
  // Bow tie center
  ctx.fillStyle = '#4a4a8a';
  ctx.fillRect(px - 1, bodyY - 1, 2, 2);
  
  // Bow tie highlight
  ctx.fillStyle = '#6a6aaa';
  ctx.fillRect(px - 1, bodyY - 1, 1, 1);
  
  // Head base (skin - chin visible below mask)
  ctx.fillStyle = '#e8b88a';
  ctx.fillRect(px - 7, headY + 6, 14, 4);
  
  // Chin shading
  ctx.fillStyle = '#d8a87a';
  ctx.fillRect(px - 1, headY + 8, 2, 2);
  
  // ═══ LUCHADOR MASK (CHAMPIONSHIP QUALITY) ═══
  // Main mask (brilliant red)
  ctx.fillStyle = '#d62a2a';
  ctx.fillRect(px - 7, headY, 14, 7);
  
  // Mask top stripe (white - classic luchador design)
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(px - 7, headY, 14, 2);
  
  // Mask center stripe (gold - championship style)
  ctx.fillStyle = '#c8a84a';
  ctx.fillRect(px - 2, headY, 4, 7);
  
  // Gold stripe highlight
  ctx.fillStyle = '#f0d870';
  ctx.fillRect(px - 2, headY, 4, 1);
  ctx.fillRect(px - 2, headY, 1, 7);
  
  // Championship star emblem
  ctx.fillStyle = '#f0e840';
  ctx.fillRect(px - 1, headY + 3, 2, 2); // Center
  ctx.fillRect(px - 2, headY + 4, 4, 1); // Horizontal
  ctx.fillRect(px, headY + 2, 1, 1); // Top point
  
  // Star highlight
  ctx.fillStyle = '#fff8dc';
  ctx.fillRect(px - 1, headY + 3, 1, 1);
  
  // Mask nose bridge (definition)
  ctx.fillStyle = '#b81c1c';
  ctx.fillRect(px - 1, headY + 4, 2, 3);
  
  // Eye holes (almond-shaped, expressive)
  const shouldBlink = Math.floor(player.idleTimer / 2000) % 5 === 0 && 
                      (player.idleTimer % 2000) < 100;
  
  if (!shouldBlink && player.dir !== 2) {
    // Eye hole outlines
    ctx.fillStyle = '#1a1a1a';
    
    if (player.dir === 0 || player.dir === 3) { // Left eye
      // Almond shape
      ctx.fillRect(px - 5, headY + 3, 1, 3);
      ctx.fillRect(px - 4, headY + 2, 2, 5);
      ctx.fillRect(px - 2, headY + 3, 1, 3);
      
      // Eye white
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(px - 4, headY + 3, 2, 3);
      
      // Pupil
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(px - 4, headY + 4, 1, 2);
      
      // Eye shine
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(px - 4, headY + 4, 1, 1);
    }
    
    if (player.dir === 0 || player.dir === 1) { // Right eye
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(px + 1, headY + 3, 1, 3);
      ctx.fillRect(px + 2, headY + 2, 2, 5);
      ctx.fillRect(px + 4, headY + 3, 1, 3);
      
      // Eye white
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(px + 2, headY + 3, 2, 3);
      
      // Pupil
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(px + 3, headY + 4, 1, 2);
      
      // Eye shine
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(px + 3, headY + 4, 1, 1);
    }
  } else if (shouldBlink && player.dir !== 2) {
    // Blink - horizontal lines
    ctx.fillStyle = '#1a1a1a';
    if (player.dir === 0 || player.dir === 3) {
      ctx.fillRect(px - 5, headY + 4, 3, 1);
    }
    if (player.dir === 0 || player.dir === 1) {
      ctx.fillRect(px + 2, headY + 4, 3, 1);
    }
  }
  
  // Mask stitching detail (craftsmanship)
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(px - 7, headY + 2);
  ctx.lineTo(px + 7, headY + 2);
  ctx.stroke();
  
  // Mask side detail lines
  ctx.beginPath();
  ctx.moveTo(px - 6, headY + 4);
  ctx.lineTo(px - 6, headY + 6);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(px + 6, headY + 4);
  ctx.lineTo(px + 6, headY + 6);
  ctx.stroke();
  
  // ═══ CARRYING BOOKS (in arms) ===
  if (player.carrying.length > 0) {
    const numBooks = player.carrying.length;
    const stackWidth = Math.min(numBooks * 5, 12);
    const stackX = px - stackWidth / 2;
    const stackY = bodyY + 8;
    
    // Draw books stacked in arms
    for (let i = 0; i < numBooks; i++) {
      const book = player.carrying[i];
      const bookOffset = i * 2;
      const bookBob = Math.sin(Date.now() * 0.005 + i * 0.5) * 0.5;
      
      // Book
      ctx.fillStyle = BOOK_COLORS[book.type];
      ctx.fillRect(stackX + bookOffset, stackY - i * 3 + bookBob, 8, 3);
      
      // Book spine
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(stackX + bookOffset, stackY - i * 3 + bookBob, 1, 3);
      
      // Book pages (side view)
      ctx.fillStyle = '#f0f0e8';
      ctx.fillRect(stackX + bookOffset + 7, stackY - i * 3 + bookBob, 1, 3);
    }
    
    // Struggle indicator when carrying many
    if (numBooks >= 4) {
      const sweat = Math.sin(Date.now() * 0.02);
      if (sweat > 0.8) {
        ctx.fillStyle = '#6ab8ff';
        ctx.fillRect(px + 5, headY + 2, 2, 2);
      }
    }
  }
  // Power-up visual effects
  if (activePowerup && activePowerup.type) {
    renderPowerupEffects(px, py);
  }
  
  // Dash speed lines effect
  if (player.dashing) {
    const speedLineCount = 5;
    for (let i = 0; i < speedLineCount; i++) {
      const lineAlpha = 0.6 - (i * 0.1);
      ctx.globalAlpha = lineAlpha;
      ctx.strokeStyle = '#4a8cff';
      ctx.lineWidth = 2;
      
      let startX, startY, endX, endY;
      if (player.dir === 0) { // Down
        startX = px + rnd(-10, 10);
        startY = py - 20 - i * 8;
        endX = startX;
        endY = startY - 12;
      } else if (player.dir === 1) { // Right
        startX = px - 20 - i * 8;
        startY = py + rnd(-10, 10);
        endX = startX - 12;
        endY = startY;
      } else if (player.dir === 2) { // Up
        startX = px + rnd(-10, 10);
        startY = py + 20 + i * 8;
        endX = startX;
        endY = startY + 12;
      } else { // Left
        startX = px + 20 + i * 8;
        startY = py + rnd(-10, 10);
        endX = startX + 12;
        endY = startY;
      }
      
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(endX, endY);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
  
  // Book throw charge indicator
  if (player.throwingBook && player.throwCharge > 0) {
    const chargeSize = 15 + player.throwCharge * 15;
    ctx.strokeStyle = '#ff6aaa';
    ctx.lineWidth = 3;
    ctx.globalAlpha = 0.5 + player.throwCharge * 0.3;
    ctx.beginPath();
    ctx.arc(px, py - 35, chargeSize, 0, Math.PI * 2 * player.throwCharge);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  
  // Charge attack indicator
  if (player.chargingAttack && player.chargeProgress > 0) {
    const rings = 3;
    for (let i = 0; i < rings; i++) {
      const ringSize = 30 + i * 15 + player.chargeProgress * 20;
      const pulse = Math.sin(Date.now() * 0.01 + i) * 0.2 + 0.6;
      ctx.strokeStyle = '#f0e840';
      ctx.lineWidth = 2;
      ctx.globalAlpha = pulse * player.chargeProgress;
      ctx.beginPath();
      ctx.arc(px, py, ringSize, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    
    // Charge percentage text
    if (player.chargeProgress >= 0.5) {
      ctx.fillStyle = player.chargeProgress >= 1 ? '#f0e840' : '#ffffff';
      ctx.font = '8px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.fillText(`${Math.floor(player.chargeProgress * 100)}%`, px, py - 50);
    }
  }
  
  // Parry window indicator
  if (parryWindow > 0) {
    const pulse = Math.sin(Date.now() * 0.05) * 0.3 + 0.7;
    ctx.strokeStyle = '#f0e840';
    ctx.lineWidth = 3;
    ctx.globalAlpha = pulse;
    ctx.beginPath();
    ctx.arc(px, py, 25, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  
  // Restore player scale transformation
  ctx.restore();
}

// ── Render Power-up Visual Effects ────────────────────────────────────────
function renderPowerupEffects(px, py) {
  const powerup = POWERUP_TYPES[activePowerup.type];
  if (!powerup) return;
  
  const time = Date.now();
  
  switch(activePowerup.type) {
    case 'SPEED':
      // Speed lines radiating outward
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2 + time * 0.01;
        const dist = 25 + Math.sin(time * 0.005 + i) * 5;
        const lineLength = 12;
        
        const x1 = px + Math.cos(angle) * dist;
        const y1 = py + Math.sin(angle) * dist;
        const x2 = px + Math.cos(angle) * (dist + lineLength);
        const y2 = py + Math.sin(angle) * (dist + lineLength);
        
        ctx.strokeStyle = powerup.color;
        ctx.globalAlpha = 0.6;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      
      // Speed icon floating above
      ctx.fillStyle = powerup.color;
      ctx.font = '12px "Press Start 2P"';
      ctx.textAlign = 'center';
      const speedBob = Math.sin(time * 0.008) * 3;
      ctx.fillText('⚡', px, py - 35 + speedBob);
      break;
      
    case 'MULTICARRY':
      // Orbiting book icons
      const bookCount = 3;
      for (let i = 0; i < bookCount; i++) {
        const angle = (i / bookCount) * Math.PI * 2 + time * 0.003;
        const orbitRadius = 30;
        const bx = px + Math.cos(angle) * orbitRadius;
        const by = py + Math.sin(angle) * orbitRadius;
        
        ctx.fillStyle = powerup.color;
        ctx.globalAlpha = 0.7;
        ctx.fillRect(bx - 3, by - 4, 6, 8);
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(bx - 3, by - 4, 1, 8);
      }
      ctx.globalAlpha = 1;
      
      // Icon above
      ctx.fillStyle = powerup.color;
      ctx.font = '12px "Press Start 2P"';
      ctx.textAlign = 'center';
      const carryBob = Math.sin(time * 0.008) * 3;
      ctx.fillText('📚', px, py - 35 + carryBob);
      break;
      
    case 'REPEL':
      // Pulsing shield bubble
      const shieldPulse = Math.sin(time * 0.01) * 0.2 + 0.8;
      const shieldRadius = 35 * shieldPulse;
      
      // Outer glow
      ctx.globalAlpha = 0.2 * shieldPulse;
      ctx.fillStyle = powerup.color;
      ctx.beginPath();
      ctx.arc(px, py, shieldRadius, 0, Math.PI * 2);
      ctx.fill();
      
      // Shield ring
      ctx.globalAlpha = 0.5;
      ctx.strokeStyle = powerup.color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(px, py, shieldRadius - 5, 0, Math.PI * 2);
      ctx.stroke();
      
      // Hexagon pattern
      ctx.globalAlpha = 0.3;
      for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2 + time * 0.002;
        const hx = px + Math.cos(angle) * (shieldRadius - 10);
        const hy = py + Math.sin(angle) * (shieldRadius - 10);
        
        ctx.beginPath();
        for (let j = 0; j < 6; j++) {
          const hexAngle = (j / 6) * Math.PI * 2;
          const hexX = hx + Math.cos(hexAngle) * 5;
          const hexY = hy + Math.sin(hexAngle) * 5;
          if (j === 0) ctx.moveTo(hexX, hexY);
          else ctx.lineTo(hexX, hexY);
        }
        ctx.closePath();
        ctx.stroke();
      }
      
      ctx.globalAlpha = 1;
      
      // Icon above
      ctx.fillStyle = powerup.color;
      ctx.font = '12px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.fillText('🛡️', px, py - 45);
      break;
      
    case 'TIMEFREEZE':
      // Frozen time effect - clock particles
      const clockCount = 12;
      for (let i = 0; i < clockCount; i++) {
        const angle = (i / clockCount) * Math.PI * 2;
        const dist = 25;
        const cx = px + Math.cos(angle) * dist;
        const cy = py + Math.sin(angle) * dist;
        
        // Clock face
        ctx.fillStyle = powerup.color;
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.arc(cx, cy, 4, 0, Math.PI * 2);
        ctx.fill();
        
        // Clock hands
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx, cy - 3);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      
      // Freeze waves
      const freezeWave1 = (time * 0.005) % 1;
      const freezeWave2 = ((time * 0.005) + 0.5) % 1;
      
      ctx.strokeStyle = powerup.color;
      ctx.globalAlpha = 1 - freezeWave1;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(px, py, freezeWave1 * 40, 0, Math.PI * 2);
      ctx.stroke();
      
      ctx.globalAlpha = 1 - freezeWave2;
      ctx.beginPath();
      ctx.arc(px, py, freezeWave2 * 40, 0, Math.PI * 2);
      ctx.stroke();
      
      ctx.globalAlpha = 1;
      
      // Icon above
      ctx.fillStyle = powerup.color;
      ctx.font = '12px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.fillText('⏸️', px, py - 35);
      break;
      
    case 'AUTOSORT':
      // Targeting arrows pointing to nearest shelf
      const arrowCount = 4;
      for (let i = 0; i < arrowCount; i++) {
        const rotation = (time * 0.005 + i * (Math.PI * 2 / arrowCount)) % (Math.PI * 2);
        const arrowDist = 28 + Math.sin(time * 0.01 + i) * 3;
        const arrowX = px + Math.cos(rotation) * arrowDist;
        const arrowY = py + Math.sin(rotation) * arrowDist;
        
        ctx.save();
        ctx.translate(arrowX, arrowY);
        ctx.rotate(rotation);
        
        ctx.fillStyle = powerup.color;
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.moveTo(6, 0);
        ctx.lineTo(-3, -4);
        ctx.lineTo(-3, 4);
        ctx.closePath();
        ctx.fill();
        
        ctx.restore();
      }
      ctx.globalAlpha = 1;
      
      // Icon above
      ctx.fillStyle = powerup.color;
      ctx.font = '12px "Press Start 2P"';
      ctx.textAlign = 'center';
      const targetBob = Math.sin(time * 0.008) * 3;
      ctx.fillText('🎯', px, py - 35 + targetBob);
      break;
      
    case 'DOUBLEPOINTS':
      // Golden sparkles orbiting
      const sparkleCount = 8;
      for (let i = 0; i < sparkleCount; i++) {
        const angle = (i / sparkleCount) * Math.PI * 2 + time * 0.004;
        const dist = 25 + Math.sin(time * 0.006 + i) * 5;
        const sx = px + Math.cos(angle) * dist;
        const sy = py + Math.sin(angle) * dist;
        
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(angle);
        
        // 4-pointed star
        ctx.fillStyle = powerup.color;
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        for (let j = 0; j < 4; j++) {
          const starAngle = (j / 4) * Math.PI * 2;
          const r = j % 2 === 0 ? 4 : 2;
          const starX = Math.cos(starAngle) * r;
          const starY = Math.sin(starAngle) * r;
          if (j === 0) ctx.moveTo(starX, starY);
          else ctx.lineTo(starX, starY);
        }
        ctx.closePath();
        ctx.fill();
        
        ctx.restore();
      }
      ctx.globalAlpha = 1;
      
      // Dollar signs
      ctx.fillStyle = powerup.color;
      ctx.font = 'bold 10px "Press Start 2P"';
      ctx.textAlign = 'center';
      const coin1Y = py - 35 + Math.sin(time * 0.01) * 3;
      const coin2Y = py - 35 + Math.sin(time * 0.01 + Math.PI) * 3;
      ctx.fillText('$', px - 8, coin1Y);
      ctx.fillText('$', px + 8, coin2Y);
      
      // Icon
      ctx.font = '12px "Press Start 2P"';
      ctx.fillText('💰', px, py - 50);
      break;
  }
  
  ctx.globalAlpha = 1;
}

function renderGhost(g) {
  if (!g || !g.typeData) return;

  const gx  = g.x;
  const gy  = g.y + Math.sin(g.phase) * 3;   // gentle bob
  const size = g.isMiniGhost ? g.miniGhostSize : g.typeData.size;
  const t   = Date.now();
  const ph  = g.phase;

  // ─── Ghost silhouette path: dome top + 3-scallop bottom ──────────────────
  function ghostShape(cx, cy, s) {
    const top = cy - s * 0.15;
    ctx.beginPath();
    ctx.arc(cx, top, s, Math.PI, 0);              // dome (left → over top → right)
    ctx.lineTo(cx + s, top + s * 1.05);           // right side
    ctx.arc(cx + s*2/3, top + s*1.05, s/3, 0, Math.PI); // scallop 1
    ctx.arc(cx,         top + s*1.05, s/3, 0, Math.PI); // scallop 2
    ctx.arc(cx - s*2/3, top + s*1.05, s/3, 0, Math.PI); // scallop 3
    ctx.closePath(); // left side back to start
  }

  // ─── Alpha: spawn fade + damage flash ────────────────────────────────────
  let baseAlpha = 1;
  if (g.spawnAnimation > 0) baseAlpha = 1 - g.spawnAnimation;
  if (g.damageFlash  > 0)   baseAlpha = Math.sin(g.damageFlash * 0.05) > 0 ? 0.3 : 1;

  ctx.save();
  ctx.globalAlpha = baseAlpha;

  // ─── MIMIC / PLAGIARIST — render as book when disguised ──────────────────
  if ((g.type === 'MIMIC' || g.type === 'PLAGIARIST') && g.disguised) {
    ctx.translate(gx, gy);
    const bkCol = BOOK_COLORS[g.disguiseType] || '#aaaaaa';
    ctx.fillStyle = bkCol;
    ctx.fillRect(-8, -12, 16, 24);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';         ctx.fillRect(-9, -12,  2, 24);
    ctx.fillStyle = '#f0ebd6';                   ctx.fillRect( 8, -12,  2, 24);
    ctx.fillStyle = 'rgba(255,255,255,0.22)';    ctx.fillRect(-7, -11, 14,  6);
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.font = '5px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText((BOOK_LABELS[g.disguiseType] || g.disguiseType || '').slice(0,4), 0, 2);
    ctx.restore();
    return;
  }

  // ─── Per-type colour palettes ──────────────────────────────────────────────
  const PALETTE = {
    NORMAL:     { body:'#dde8f8', glow:'#aaccff', eyes:'#3a1a6e' },
    FAST:       { body:'#b8d8ff', glow:'#33aaff', eyes:'#0033bb' },
    TANK:       { body:'#7a8898', glow:'#334455', eyes:'#ff4422' },
    TELEPORTER: { body:'#c4b4fc', glow:'#7744ff', eyes:'#bb00ff' },
    BOSS:       { body:'#6a5090', glow:'#ff1133', eyes:'#ff2222' },
    SWARM:      { body:'#c0b8ee', glow:'#7777cc', eyes:'#331177' },
    RANGED:     { body:'#e8c0ff', glow:'#cc44ff', eyes:'#880099' },
    BOMBER:     { body:'#ffba78', glow:'#ff6622', eyes:'#880800' },
    MIMIC:      { body:'#cc88ff', glow:'#aa44aa', eyes:'#550099' },
    POSSESSOR:  { body:'#b070d0', glow:'#7722aa', eyes:'#cc22ff' },
    SHIELD:     { body:'#9898e0', glow:'#4455cc', eyes:'#112288' },
    CHAIN:      { body:'#cc9cff', glow:'#9966ff', eyes:'#330077' },
    SHUSHER:    { body:'#eedfd0', glow:'#c8b888', eyes:'#442211' },
    OVERDUE:    { body:'#e87828', glow:'#cc4400', eyes:'#330000' },
    PLAGIARIST: { body:'#c4d8b4', glow:'#88bb55', eyes:'#1a3a00' },
  };

  const pal  = PALETTE[g.type] || PALETTE.NORMAL;
  const col  = pal.body;
  const gcol = pal.glow;

  // ─── Outer glow halo ──────────────────────────────────────────────────────
  const glowR = size + 10 + Math.sin(ph) * 2;
  const glowG = ctx.createRadialGradient(gx, gy, size*0.3, gx, gy, glowR);
  glowG.addColorStop(0, gcol + '44');
  glowG.addColorStop(1, gcol + '00');
  ctx.fillStyle = glowG;
  ctx.beginPath(); ctx.arc(gx, gy, glowR, 0, Math.PI*2); ctx.fill();

  // ─── Attack telegraph ──────────────────────────────────────────────────────
  if (g.attackTelegraph > 0 && g.attackTelegraph < 1) {
    ctx.strokeStyle = '#ff2222'; ctx.lineWidth = 3;
    ctx.globalAlpha = baseAlpha * g.attackTelegraph;
    ctx.beginPath();
    ctx.arc(gx, gy, size+10, 0, Math.PI*2*g.attackTelegraph); ctx.stroke();
    ctx.globalAlpha = baseAlpha;
  }

  // ─── FAST: direction-aligned motion trails ───────────────────────────────
  if (g.type === 'FAST') {
    const ang = Math.atan2(player.y - gy, player.x - gx);
    for (let i = 3; i >= 1; i--) {
      ctx.globalAlpha = baseAlpha * (0.14 - i*0.04);
      ctx.fillStyle = col;
      ghostShape(gx - Math.cos(ang)*i*9, gy - Math.sin(ang)*i*9, size*(1 - i*0.08));
      ctx.fill();
    }
    ctx.globalAlpha = baseAlpha;
  }

  // ─── SHUSHER: silence aura ring ───────────────────────────────────────────
  if (g.type === 'SHUSHER') {
    const sp = Math.sin(t*0.004)*0.25+0.75;
    ctx.strokeStyle = '#d4c8a8'; ctx.lineWidth = 2;
    ctx.globalAlpha = 0.28*sp*baseAlpha;
    ctx.beginPath(); ctx.arc(gx, gy, g.typeData.silenceRadius, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#d4c8a8'; ctx.globalAlpha = 0.06*sp*baseAlpha;
    ctx.beginPath(); ctx.arc(gx, gy, g.typeData.silenceRadius, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = baseAlpha;
  }

  // ─── RANGED: pre-shot targeting line ─────────────────────────────────────
  if (g.type === 'RANGED' && g.shootCooldown <= 500) {
    const ang = Math.atan2(player.y - gy, player.x - gx);
    const lineLen = dist(gx, gy, player.x, player.y);
    const pulse2  = Math.sin(t*0.02)*0.3+0.5;
    ctx.strokeStyle = gcol; ctx.lineWidth = 2;
    ctx.globalAlpha = pulse2*0.38*baseAlpha;
    ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(gx,gy);
    ctx.lineTo(gx+Math.cos(ang)*lineLen, gy+Math.sin(ang)*lineLen); ctx.stroke();
    ctx.setLineDash([]); ctx.globalAlpha = baseAlpha;
  }

  // ─── CHAIN: gradient link to partner ─────────────────────────────────────
  if (g.type === 'CHAIN' && g.chainPartner && g.chainPartner.health > 0) {
    const cg = ctx.createLinearGradient(gx, gy, g.chainPartner.x, g.chainPartner.y);
    cg.addColorStop(0,'#dd99ff'); cg.addColorStop(1,'#9966ff');
    ctx.strokeStyle = cg; ctx.lineWidth = 2.5;
    ctx.globalAlpha = 0.6*baseAlpha;
    ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.moveTo(gx,gy);
    ctx.lineTo(g.chainPartner.x, g.chainPartner.y); ctx.stroke();
    ctx.setLineDash([]);
    const pp2 = (t*0.001) % 1;
    ctx.fillStyle = '#dd99ff'; ctx.globalAlpha = 0.9*baseAlpha;
    ctx.beginPath();
    ctx.arc(gx+(g.chainPartner.x-gx)*pp2, gy+(g.chainPartner.y-gy)*pp2, 4, 0, Math.PI*2);
    ctx.fill(); ctx.globalAlpha = baseAlpha;
  }

  // ─── POSSESSOR: orbit particle halo ──────────────────────────────────────
  if (g.type === 'POSSESSOR' && g.possessing) {
    for (let i = 0; i < 6; i++) {
      const ang = (i/6)*Math.PI*2 + t*0.001;
      ctx.fillStyle = '#aa44aa'; ctx.globalAlpha = 0.35*baseAlpha;
      ctx.beginPath();
      ctx.arc(gx+Math.cos(ang)*(size+8), gy+Math.sin(ang)*(size+8), 2.5, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.strokeStyle = '#8822aa'; ctx.lineWidth = 2;
    ctx.globalAlpha = 0.45*baseAlpha;
    ctx.beginPath(); ctx.arc(gx,gy,size+10,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha = baseAlpha;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // GHOST BODY — gradient-filled silhouette
  // ═══════════════════════════════════════════════════════════════════════════
  ctx.globalAlpha = 0.92*baseAlpha;
  const bg = ctx.createRadialGradient(gx, gy - size*0.5, size*0.05, gx, gy+size*0.2, size*1.3);
  bg.addColorStop(0,  '#ffffff');
  bg.addColorStop(0.3, col);
  bg.addColorStop(1,  gcol + 'bb');
  ctx.fillStyle = bg;
  ghostShape(gx, gy, size);
  ctx.fill();

  // Inner rim highlight (top dome shine)
  ctx.globalAlpha = 0.14*baseAlpha;
  const shine = ctx.createRadialGradient(gx - size*0.25, gy - size*0.5, 0, gx, gy - size*0.15, size*0.7);
  shine.addColorStop(0, 'rgba(255,255,255,0.9)');
  shine.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = shine;
  ghostShape(gx, gy, size); ctx.fill();
  ctx.globalAlpha = baseAlpha;

  // ─── Type-specific BODY overlays ──────────────────────────────────────────
  switch (g.type) {

    case 'TANK': {
      // Concentric armour rings + rivets
      ctx.lineCap = 'round';
      for (let ri = 0; ri < 2; ri++) {
        ctx.strokeStyle = `rgba(80,100,115,${0.5 - ri*0.12})`;
        ctx.lineWidth = 2.5;
        ctx.globalAlpha = baseAlpha;
        ctx.beginPath();
        ctx.arc(gx, gy - size*0.15, size - 2 - ri*4, Math.PI*0.72, Math.PI*2.28);
        ctx.stroke();
      }
      ctx.lineCap = 'butt';
      ctx.fillStyle = '#556677';
      for (let bi = 0; bi < 4; bi++) {
        const ba = (bi/4)*Math.PI + Math.PI*0.5;
        ctx.globalAlpha = 0.65*baseAlpha;
        ctx.beginPath();
        ctx.arc(gx + Math.cos(ba)*(size-4), gy - size*0.15 + Math.sin(ba)*(size-4), 2.2, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = baseAlpha;
      break;
    }

    case 'TELEPORTER': {
      // Chromatic aberration glitch + orbit pixels
      const ga = Math.sin(t*0.015)*3.5;
      if (Math.abs(ga) > 0.8) {
        ctx.globalAlpha = 0.18*baseAlpha;
        ctx.fillStyle = '#ff00ff';
        ghostShape(gx + ga, gy, size*0.95); ctx.fill();
        ctx.fillStyle = '#00ffff';
        ghostShape(gx - ga, gy, size*0.95); ctx.fill();
      }
      for (let i = 0; i < 8; i++) {
        const oa = (i/8)*Math.PI*2 + ph;
        ctx.fillStyle = gcol;
        ctx.globalAlpha = (0.4 + Math.sin(ph+i)*0.3)*baseAlpha;
        ctx.fillRect(gx+Math.cos(oa)*(size+8)-2, gy+Math.sin(oa)*(size+8)-2, 4, 4);
      }
      ctx.globalAlpha = baseAlpha;
      break;
    }

    case 'BOMBER': {
      if (g.fuseFlash) {
        const fr = Math.min(18, g.fuseFlash*0.015);
        const flash = Math.sin(t*fr) > 0;
        if (flash) {
          ctx.globalAlpha = 0.45*baseAlpha; ctx.fillStyle = '#ff3300';
          ghostShape(gx, gy, size+5); ctx.fill();
        }
        // Fuse wire
        ctx.strokeStyle = '#886622'; ctx.lineWidth = 2.5;
        ctx.globalAlpha = 0.9*baseAlpha;
        ctx.beginPath();
        ctx.moveTo(gx, gy - size*0.9);
        ctx.quadraticCurveTo(gx+7, gy-size-5, gx+5, gy-size-11);
        ctx.stroke();
        // Spark
        ctx.fillStyle = flash ? '#ffff00' : '#ff8800';
        ctx.globalAlpha  = flash ? 1 : 0.7;
        ctx.beginPath(); ctx.arc(gx+5, gy-size-11, flash?4.5:2.5, 0, Math.PI*2); ctx.fill();
        if (flash) {
          ctx.strokeStyle = '#ff4422'; ctx.lineWidth = 1.5;
          ctx.globalAlpha = 0.28*baseAlpha;
          ctx.beginPath(); ctx.arc(gx,gy,size+18,0,Math.PI*2); ctx.stroke();
        }
      }
      ctx.globalAlpha = baseAlpha;
      break;
    }

    case 'SHIELD': {
      if (g.shieldActive) {
        ctx.lineCap = 'round';
        const sg = ctx.createLinearGradient(
          gx + Math.cos(g.shieldRotation)*size, gy + Math.sin(g.shieldRotation)*size,
          gx - Math.cos(g.shieldRotation)*size, gy - Math.sin(g.shieldRotation)*size
        );
        sg.addColorStop(0,'#ffffff'); sg.addColorStop(0.5,'#aaaaff'); sg.addColorStop(1,'#3344ee');
        ctx.strokeStyle = sg; ctx.lineWidth = 5.5;
