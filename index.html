      window.comboState.frenzyMode = true;
      
      // "GOD MODE!!!" announcement
      addFeedback(W/2, H/2 - 140, 'GOD MODE!!!', '#ffffff', 32);
      
      // Massive screen shake
      screenShake = 2.0;
      flashAlpha = 0.3;
      
      // Rainbow explosion from center
      for (let i = 0; i < 100; i++) {
        const angle = (i / 100) * Math.PI * 2;
        const dist = 50 + Math.random() * 100;
        const rainbowColors = ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#0088ff', '#8800ff'];
        PARTICLE_TYPES.SPARKLE(
          W/2 + Math.cos(angle) * dist,
          H/2 + Math.sin(angle) * dist,
          rainbowColors[i % 6],
          2000
        );
      }
    }
    
    // Continuous frenzy effects
    window.libraryFrenzy = true;
    window.comboState.rainbowPhase = (window.comboState.rainbowPhase || 0) + 0.1;
    
    // Screen pulse with each file in frenzy mode
    flashAlpha = 0.1;
    
    // Random firework on each file
    const fx = rnd(W * 0.2, W * 0.8);
    const fy = rnd(H * 0.2, H * 0.6);
    const rainbowColor = ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#0088ff', '#8800ff'][rint(0, 5)];
    PARTICLE_TYPES.FIREWORK(fx, fy, rainbowColor);
  }
  
  // Exit frenzy mode if combo drops
  if (combo < 20 && window.comboState.frenzyMode) {
    window.comboState.frenzyMode = false;
    window.libraryFrenzy = false;
  }
  
  // Show bonus message if earned
  if (bonusMessage) {
    addFeedback(location.x, location.y - 60, bonusMessage, bonusColor, 14);
  }
  
  // Achievement notifications
  if (booksFiledThisGame === 10) {
    showAchievementNotification('Getting Started!', 'Filed 10 books');
  } else if (booksFiledThisGame === 50) {
    showAchievementNotification('Bookworm!', 'Filed 50 books');
  } else if (booksFiledThisGame === 100) {
    showAchievementNotification('Speed Reader!', 'Filed 100 books in one game');
  }
  
  // Remove book
  books.splice(books.indexOf(book), 1);
  
  // Add book to shelf's visual storage (if not trash)
  if (!isTrash && location.storedBooks) {
    const slotIndex = location.filedCount % location.capacity;
    location.storedBooks.push({
      type: book.type,
      color: BOOK_COLORS[book.type],
      slotIndex: slotIndex,
      spawnTime: Date.now(),
      popIn: 1.0 // Pop-in animation (1 → 0)
    });
    location.filedCount++;
    location.lastFiledTime = Date.now();
    
    // Check for completion
    if (location.filedCount >= location.capacity && !location.isComplete) {
      location.isComplete = true;
      location.completionCelebration = 2000; // 2 second celebration
      
      // MASSIVE COMPLETION CELEBRATION (Nintendo style!)
      screenShake = 1.5;
      flashAlpha = 0.25;
      
      // Firework explosion
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        const dist = 60 + Math.random() * 20;
        PARTICLE_TYPES.FIREWORK(
          location.x + Math.cos(angle) * dist,
          location.y + Math.sin(angle) * dist,
          SHELF_GLOW[location.type]
        );
      }
      
      // Confetti burst
      for (let i = 0; i < 30; i++) {
        PARTICLE_TYPES.SPARKLE(
          location.x + rnd(-40, 40),
          location.y + rnd(-40, 40),
          ['#ff6aaa', '#4a8cff', '#f0e840', '#2aaa5c'][rint(0, 3)],
          1000
        );
      }
      
      // Triple shockwave
      PARTICLE_TYPES.SHOCKWAVE(location.x, location.y, SHELF_GLOW[location.type], 80);
      setTimeout(() => PARTICLE_TYPES.SHOCKWAVE(location.x, location.y, SHELF_GLOW[location.type], 60), 100);
      setTimeout(() => PARTICLE_TYPES.SHOCKWAVE(location.x, location.y, SHELF_GLOW[location.type], 40), 200);
      
      // Achievement feedback
      addFeedback(location.x, location.y - 80, 'SHELF COMPLETE!', '#f0e840', 16);
      addFeedback(location.x, location.y - 100, '★ PERFECT ★', '#ffffff', 12);
      
      // Bonus points
      const bonusPoints = 1000;
      score += bonusPoints;
      addFeedback(location.x, location.y + 40, `+${bonusPoints} BONUS!`, '#2aaa5c', 14);
    }
  }
  
  // Visual feedback
  location.acceptPulse = 1;
  specialBurst(location.x, location.y, 'FILE');
  
  // Combo milestone celebrations
  if (combo === 5) {
    specialBurst(location.x, location.y - 20, 'COMBO');
    addFeedback(location.x, location.y - 70, '5X COMBO!', '#ff6aaa', 14);
    screenShake = 0.5;
  } else if (combo === 10) {
    specialBurst(location.x, location.y - 20, 'COMBO');
    PARTICLE_TYPES.FIREWORK(location.x - 50, location.y - 40, '#4a8cff');
    PARTICLE_TYPES.FIREWORK(location.x + 50, location.y - 40, '#f0e840');
    addFeedback(location.x, location.y - 70, '10X COMBO!!', '#f0e840', 16);
    screenShake = 0.8;
    flashAlpha = 0.15; // Golden flash
  } else if (combo === 15) {
    specialBurst(location.x, location.y - 20, 'COMBO');
    // Triple fireworks
    for (let i = 0; i < 3; i++) {
      PARTICLE_TYPES.FIREWORK(location.x + (i - 1) * 60, location.y - 60, ['#ff6aaa', '#4a8cff', '#2aaa5c'][i]);
    }
    addFeedback(location.x, location.y - 70, '15X MEGA COMBO!!!', '#ffffff', 18);
    screenShake = 1.2;
    flashAlpha = 0.2;
    // Screen border flash effect (handled in render)
  } else if (combo >= 3) {
    specialBurst(location.x, location.y - 20, 'COMBO');
  }
  
  addFeedback(location.x, location.y - 30, `+${points}`, '#f0e840');
  if (combo > 1) {
    addFeedback(location.x, location.y - 50, `${combo}x COMBO!`, '#ff6aaa', 12);
  }
  
  // Spawn replacement
  spawnBook();
  
  // Chance for powerup
  if (Math.random() < 0.15 && powerups.length < 2) {
    spawnPowerup();
  }
}

function autoSortBooks() {
  // Find nearest correct shelf for each book
  for (let i = player.carrying.length - 1; i >= 0; i--) {
    const book = player.carrying[i];
    if (!book || !book.type) continue; // Safety check
    
    let nearestShelf = null;
    let nearestDist = Infinity;
    
    if (book.type === 'TRASH') {
      nearestShelf = trashCan;
      nearestDist = dist(player.x, player.y, trashCan.x, trashCan.y);
    } else {
      for (const shelf of shelves) {
        if (!shelf || !shelf.type) continue; // Safety check
        
        if (shelf.type === book.type) {
          const d = dist(player.x, player.y, shelf.x, shelf.y);
          if (d < nearestDist) {
            nearestDist = d;
            nearestShelf = shelf;
          }
        }
      }
    }
    
    if (nearestShelf && nearestDist < 60) {
      fileBook(book, nearestShelf, book.type === 'TRASH');
      player.carrying.splice(i, 1);
    }
  }
}

function activatePowerup(type) {
  const powerup = POWERUP_TYPES[type];
  
  // Deactivate previous
  if (activePowerup) deactivatePowerup();
  
  activePowerup = {
    type,
    remaining: powerup.duration
  };
  
  // Apply effect
  if (type === 'SPEED') player.speedMultiplier = 2.0; // Increased from 1.6x - SUPER SPEED!
  else if (type === 'MULTICARRY') player.carryBonus = 3;
  else if (type === 'REPEL') {
    player.invincible = true;
    player.repel = true;
  }
  else if (type === 'TIMEFREEZE') timeFrozen = true;
  else if (type === 'AUTOSORT') player.autoSort = true;
  else if (type === 'DOUBLEPOINTS') scoreMultiplier = 2;
  else if (type === 'HEALTH') {
    // Instant health restore!
    const healAmount = powerup.healAmount || 40;
    const oldHealth = player.health;
    player.health = Math.min(player.maxHealth, player.health + healAmount);
    const actualHealed = player.health - oldHealth;
    
    // Show healing feedback
    addFeedback(player.x, player.y - 40, `+${actualHealed} HP`, '#ff4444', 14);
    
    // Healing particles (green + hearts)
    for (let i = 0; i < 30; i++) {
      const angle = (i / 30) * Math.PI * 2;
      emitParticle({
        x: player.x,
        y: player.y,
        vx: Math.cos(angle) * 60,
        vy: Math.sin(angle) * 60 - 20, // Rise upward
        life: 1000,
        maxLife: 1000,
        color: i % 2 === 0 ? '#44ff44' : '#ff4444',
        size: 4,
        type: i % 3 === 0 ? 'heart' : 'circle',
        alpha: 0.9
      });
    }
    
    // Flash effect (green = healing)
    flashAlpha = 0.2;
    ctx.fillStyle = 'rgba(68, 255, 68, 0.2)';
    
    // No duration for HEALTH (instant effect)
    activePowerup = null;
    return; // Exit early, don't set up duration
  }
  
  addFeedback(player.x, player.y - 40, powerup.label, powerup.color, 10);
  // Power-up activation particles
  for (let i = 0; i < 20; i++) {
    PARTICLE_TYPES.SPARKLE(player.x, player.y, powerup.color, 800);
  }
  PARTICLE_TYPES.SHOCKWAVE(player.x, player.y, powerup.color, 40);
}

function deactivatePowerup() {
  if (!activePowerup) return;
  
  const type = activePowerup.type;
  
  if (type === 'SPEED') player.speedMultiplier = 1;
  else if (type === 'MULTICARRY') player.carryBonus = 0;
  else if (type === 'REPEL') {
    player.invincible = false;
    player.repel = false;
  }
  else if (type === 'TIMEFREEZE') timeFrozen = false;
  else if (type === 'AUTOSORT') player.autoSort = false;
  else if (type === 'DOUBLEPOINTS') scoreMultiplier = 1;
  
  activePowerup = null;
}

function endGame(cause) {
  state = 'gameover';
}

// ═══════════════════════════════════════════════════════════════════════════
// ENVIRONMENT RENDERING
// ═══════════════════════════════════════════════════════════════════════════

function renderEnvironment() {
  // ═══════════════════════════════════════════════════════════════════════
  // NINTENDO AAA+ LIBRARY FLOOR - ULTIMATE POLISH
  // Living, breathing hardwood with animated light, dust, shadows, depth
  // ═══════════════════════════════════════════════════════════════════════
  
  const tileSize = 64;
  const floorY = 28; // Top of floor area
  const floorH = H - 53; // Floor height
  const currentTime = Date.now() * 0.001; // Time in seconds
  
  // === BASE: Rich Hardwood Foundation with Dynamic Depth ===
  const woodGradient = ctx.createLinearGradient(0, floorY, 0, H);
  woodGradient.addColorStop(0, '#d8c8ac'); // Warmer, lighter (distance)
  woodGradient.addColorStop(0.3, '#c8b89c'); // Warm mid-tone
  woodGradient.addColorStop(0.7, '#b8a88c'); // Cooler mid
  woodGradient.addColorStop(1, '#a8987c'); // Richer foreground
  ctx.fillStyle = woodGradient;
  ctx.fillRect(0, floorY, W, floorH);
  
  // === LAYER 1: Enhanced Wood Grain with Variation ===
  ctx.globalAlpha = 0.1; // Slightly more visible
  for (let x = 0; x < W; x += 3) {
    const grainVariation = Math.sin(x * 0.1) * 2 + Math.sin(x * 0.05) * 1;
    const grainIntensity = 0.5 + Math.sin(x * 0.02) * 0.5; // Varying thickness
    ctx.strokeStyle = '#8a7a6a';
    ctx.lineWidth = grainIntensity;
    ctx.beginPath();
    ctx.moveTo(x + grainVariation, floorY);
    ctx.lineTo(x + grainVariation, H);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  
  // === LAYER 2: Marble Diamond Inlays with Glow ===
  const inlaySize = 32;
  const inlaySpacing = 128;
  const inlayGlow = Math.sin(currentTime * 0.5) * 0.03 + 0.97; // Subtle breathing
  
  for (let x = inlaySpacing / 2; x < W; x += inlaySpacing) {
    for (let y = floorY + inlaySpacing / 2; y < H; y += inlaySpacing) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(Math.PI / 4);
      
      // Marble diamond with subtle glow
      ctx.fillStyle = `rgba(244, 237, 224, ${inlayGlow})`;
      ctx.fillRect(-inlaySize / 2, -inlaySize / 2, inlaySize, inlaySize);
      
      // Enhanced marble veining (more organic)
      ctx.globalAlpha = 0.18;
      ctx.strokeStyle = '#c8b8a0';
      ctx.lineWidth = 1.2;
      for (let i = 0; i < 4; i++) { // More veins
        ctx.beginPath();
        const offsetY = -inlaySize / 2 + i * 9;
        const curve1 = Math.sin(currentTime * 0.3 + i) * 3;
        const curve2 = Math.sin(currentTime * 0.3 + i + 1) * 3;
        ctx.moveTo(-inlaySize / 2, offsetY);
        ctx.quadraticCurveTo(curve1, offsetY + 6, inlaySize / 2, offsetY);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      
      // Inner diamond accent with shimmer
      const shimmer = Math.sin(currentTime * 0.8 + x * 0.01) * 0.1 + 0.3;
      ctx.strokeStyle = '#b4a488';
      ctx.lineWidth = 1;
      ctx.globalAlpha = shimmer;
      ctx.strokeRect(-inlaySize / 2 + 2, -inlaySize / 2 + 2, inlaySize - 4, inlaySize - 4);
      ctx.globalAlpha = 1;
      
      // Tiny center detail (jewel effect)
      ctx.fillStyle = `rgba(200, 180, 150, ${shimmer * 0.6})`;
      ctx.beginPath();
      ctx.arc(0, 0, 2, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.restore();
    }
  }
  
  // === LAYER 3: Hardwood Plank Lines with Depth ===
  ctx.globalAlpha = 0.25; // More defined
  
  // Horizontal planks with shadow effect
  for (let y = floorY; y < H; y += tileSize) {
    // Shadow line (darker)
    ctx.strokeStyle = '#988878';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, y + 1);
    ctx.lineTo(W, y + 1);
    ctx.stroke();
    
    // Highlight line (lighter)
    ctx.strokeStyle = '#b8a898';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  
  // Vertical planks with realistic stagger
  ctx.globalAlpha = 0.2;
  for (let x = 0; x < W; x += tileSize * 2) {
    for (let y = floorY; y < H; y += tileSize * 2) {
      ctx.strokeStyle = '#a89878';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x, y + tileSize);
      ctx.stroke();
    }
  }
  for (let x = tileSize; x < W; x += tileSize * 2) {
    for (let y = floorY + tileSize; y < H; y += tileSize * 2) {
      ctx.strokeStyle = '#a89878';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x, y + tileSize);
      ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
  
  // === LAYER 4: Animated Polished Shine (light sweeps) ===
  const shineGradient = ctx.createLinearGradient(0, floorY, 0, H);
  shineGradient.addColorStop(0, 'rgba(255, 255, 255, 0.12)'); // Brighter top
  shineGradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.06)');
  shineGradient.addColorStop(1, 'rgba(255, 255, 255, 0.03)');
  ctx.fillStyle = shineGradient;
  ctx.fillRect(0, floorY, W, floorH);
  
  // Traveling light sweep (like sun moving)
  const sweepX = (currentTime * 30) % (W + 200) - 100;
  const sweepGradient = ctx.createLinearGradient(sweepX - 80, 0, sweepX + 80, 0);
  sweepGradient.addColorStop(0, 'rgba(255, 255, 255, 0)');
  sweepGradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.08)');
  sweepGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
  ctx.fillStyle = sweepGradient;
  ctx.fillRect(0, floorY, W, floorH);
  
  // === LAYER 5: Enhanced Wood Knots with Depth ===
  const knots = [
    {x: W * 0.15, y: floorY + floorH * 0.25, size: 1.0},
    {x: W * 0.35, y: floorY + floorH * 0.5, size: 0.8},
    {x: W * 0.55, y: floorY + floorH * 0.35, size: 1.2},
    {x: W * 0.75, y: floorY + floorH * 0.65, size: 0.9},
    {x: W * 0.88, y: floorY + floorH * 0.45, size: 1.1}
  ];
  
  for (const knot of knots) {
    ctx.globalAlpha = 0.08;
    
    // Outer knot shadow
    ctx.fillStyle = '#6a5a4a';
    ctx.beginPath();
    ctx.ellipse(knot.x, knot.y, 10 * knot.size, 7 * knot.size, Math.PI / 4, 0, Math.PI * 2);
    ctx.fill();
    
    // Main knot
    ctx.fillStyle = '#8a7a6a';
    ctx.beginPath();
    ctx.ellipse(knot.x, knot.y, 8 * knot.size, 6 * knot.size, Math.PI / 4, 0, Math.PI * 2);
    ctx.fill();
    
    // Inner knot ring with detail
    ctx.globalAlpha = 0.12;
    ctx.strokeStyle = '#6a5a4a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(knot.x, knot.y, 5 * knot.size, 3 * knot.size, Math.PI / 4, 0, Math.PI * 2);
    ctx.stroke();
    
    // Knot center highlight
    ctx.fillStyle = '#5a4a3a';
    ctx.beginPath();
    ctx.arc(knot.x, knot.y, 2 * knot.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // === LAYER 6: Floating Dust Motes (atmospheric life) ===
  const dustCount = 25;
  ctx.fillStyle = 'rgba(255, 250, 230, 0.4)';
  
  for (let i = 0; i < dustCount; i++) {
    const dustX = ((currentTime * 8 + i * 30) % (W + 100)) - 50;
    const dustY = floorY + 50 + Math.sin(currentTime * 0.5 + i * 0.8) * 40 + (i / dustCount) * floorH;
    const dustSize = 1 + Math.sin(currentTime + i) * 0.5;
    const dustAlpha = 0.3 + Math.sin(currentTime * 2 + i) * 0.2;
    
    ctx.globalAlpha = dustAlpha;
    ctx.beginPath();
    ctx.arc(dustX, dustY, dustSize, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // === LAYER 7: Day/Night Ambient Lighting (enhanced) ===
  const dayColor = 'rgba(255, 250, 220, ';
  const nightColor = 'rgba(40, 50, 80, ';
  const dayNightCycle = Math.sin(timeOfDay * Math.PI * 2);
  const isDay = dayNightCycle > 0;
  const intensity = Math.abs(dayNightCycle) * 0.15;
  ctx.fillStyle = (isDay ? dayColor : nightColor) + intensity + ')';
  ctx.fillRect(0, floorY, W, floorH);
  
  // === LAYER 8: Dynamic Shadows from Objects ===
  // Soft shadow gradient near player/bottom
  const shadowGradient = ctx.createRadialGradient(player.x, player.y + 20, 0, player.x, player.y + 20, 80);
  shadowGradient.addColorStop(0, 'rgba(0, 0, 0, 0.08)');
  shadowGradient.addColorStop(0.6, 'rgba(0, 0, 0, 0.03)');
  shadowGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = shadowGradient;
  ctx.fillRect(0, floorY, W, floorH);
  
  // === LAYER 9: Subtle Vignette (refined) ===
  const vignetteGradient = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, W * 0.7);
  vignetteGradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
  vignetteGradient.addColorStop(0.7, 'rgba(0, 0, 0, 0.02)');
  vignetteGradient.addColorStop(1, 'rgba(0, 0, 0, 0.1)');
  ctx.fillStyle = vignetteGradient;
  ctx.fillRect(0, floorY, W, floorH);
  
  // === LAYER 10: Light Caustics (shimmering patterns) ===
  if (isDay) {
    ctx.globalAlpha = 0.04 + Math.sin(currentTime * 0.3) * 0.02;
    for (let i = 0; i < 8; i++) {
      const causticX = W * 0.2 + i * W * 0.12 + Math.sin(currentTime * 0.4 + i) * 30;
      const causticY = floorY + floorH * 0.3 + Math.cos(currentTime * 0.5 + i) * 40;
      const causticSize = 30 + Math.sin(currentTime * 0.6 + i) * 10;
      
      const causticGradient = ctx.createRadialGradient(causticX, causticY, 0, causticX, causticY, causticSize);
      causticGradient.addColorStop(0, 'rgba(255, 250, 200, 0.3)');
      causticGradient.addColorStop(0.5, 'rgba(255, 250, 200, 0.1)');
      causticGradient.addColorStop(1, 'rgba(255, 250, 200, 0)');
      ctx.fillStyle = causticGradient;
      ctx.beginPath();
      ctx.arc(causticX, causticY, causticSize, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// BACK ACCENT WALL - NINTENDO AAA+ QUALITY
// Deep navy wall extending BELOW windows to create back wall appearance
// Windows appear mounted on this wall, creating depth perception
// ═══════════════════════════════════════════════════════════════════════════
function renderAccentWall() {
  const currentTime = Date.now() * 0.001;
  
  // Calculate wall area - starts ABOVE windows and extends DOWN behind play area
  const wallTop = 0;
  const wallBottom = 130; // Extends well below windows
  const wallHeight = wallBottom - wallTop;
  
  // === BASE: Deep Navy/Charcoal Back Wall ===
  // Creates appearance of recessed back wall
  const wallGradient = ctx.createLinearGradient(0, wallTop, 0, wallBottom);
  wallGradient.addColorStop(0, '#1a2a3a'); // Dark navy top
  wallGradient.addColorStop(0.3, '#2a3a4a'); // Blue-gray
  wallGradient.addColorStop(0.6, '#1a2a3a'); // Navy middle
  wallGradient.addColorStop(1, '#0a1a2a'); // Very dark bottom (receding)
  ctx.fillStyle = wallGradient;
  ctx.fillRect(0, wallTop, W, wallHeight);
  
  // === LAYER 1: Subtle Geometric Pattern (modern texture) ===
  ctx.globalAlpha = 0.05;
  const patternSize = 45;
  for (let x = -20; x < W + 20; x += patternSize) {
    for (let y = wallTop; y < wallBottom; y += patternSize) {
      ctx.strokeStyle = '#3a4a5a';
      ctx.lineWidth = 1;
      
      // Hexagonal pattern
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
        const px = x + patternSize / 2 + Math.cos(angle) * 14;
        const py = y + patternSize / 2 + Math.sin(angle) * 14;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
  
  // === LAYER 2: Vertical Texture Lines (wallpaper grain) ===
  ctx.globalAlpha = 0.03;
  for (let x = 0; x < W; x += 3) {
    const variation = Math.sin(x * 0.1) * 1.5;
    ctx.strokeStyle = '#2a3a4a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + variation, wallTop);
    ctx.lineTo(x + variation, wallBottom);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  
  // === LAYER 3: Crown Molding at TOP ===
  const crownY = wallTop;
  
  // Shadow line
  ctx.fillStyle = '#000010';
  ctx.fillRect(0, crownY, W, 2);
  
  // Molding gradient (silver/gray)
  const crownGradient = ctx.createLinearGradient(0, crownY + 2, 0, crownY + 10);
  crownGradient.addColorStop(0, '#7a7a8a');
  crownGradient.addColorStop(0.5, '#6a6a7a');
  crownGradient.addColorStop(1, '#5a5a6a');
  ctx.fillStyle = crownGradient;
  ctx.fillRect(0, crownY + 2, W, 8);
  
  // Highlight on molding
  ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
  ctx.fillRect(0, crownY + 2, W, 1);
  
  // === LAYER 4: Baseboard/Chair Rail at BOTTOM ===
  // This is the key - creates the "bottom edge" of the back wall
  const baseboardY = wallBottom - 15;
  
  // Shadow above baseboard (wall receding)
  const shadowGradient = ctx.createLinearGradient(0, baseboardY - 10, 0, baseboardY);
  shadowGradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
  shadowGradient.addColorStop(1, 'rgba(0, 0, 0, 0.4)');
  ctx.fillStyle = shadowGradient;
  ctx.fillRect(0, baseboardY - 10, W, 10);
  
  // Baseboard/wainscoting cap
  const baseboardGradient = ctx.createLinearGradient(0, baseboardY, 0, baseboardY + 12);
  baseboardGradient.addColorStop(0, '#8a8a9a');
  baseboardGradient.addColorStop(0.3, '#7a7a8a');
  baseboardGradient.addColorStop(1, '#6a6a7a');
  ctx.fillStyle = baseboardGradient;
  ctx.fillRect(0, baseboardY, W, 12);
  
  // Highlight on baseboard
  ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
  ctx.fillRect(0, baseboardY, W, 1);
  
  // Groove line
  ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
  ctx.fillRect(0, baseboardY + 6, W, 1);
  
  // === LAYER 5: Window Light Spill (warm on cool) ===
  for (const win of windows) {
    const dayNightCycle = Math.sin(timeOfDay * Math.PI * 2);
    const isDay = dayNightCycle > 0;
    
    if (isDay) {
      // Warm sunlight creates beautiful contrast on cool wall
      const lightGlow = ctx.createRadialGradient(
        win.x + win.width / 2, 
        win.y + win.height / 2, 
        0,
        win.x + win.width / 2, 
        win.y + win.height / 2, 
        150
      );
      lightGlow.addColorStop(0, 'rgba(255, 240, 200, 0.18)');
      lightGlow.addColorStop(0.4, 'rgba(255, 240, 200, 0.10)');
      lightGlow.addColorStop(0.7, 'rgba(255, 240, 200, 0.05)');
      lightGlow.addColorStop(1, 'rgba(255, 240, 200, 0)');
      ctx.fillStyle = lightGlow;
      ctx.beginPath();
      ctx.arc(win.x + win.width / 2, win.y + win.height / 2, 150, 0, Math.PI * 2);
      ctx.fill();
      
      // Light also spills DOWN the wall below windows
      const downSpill = ctx.createLinearGradient(
        win.x + win.width / 2,
        win.y + win.height,
        win.x + win.width / 2,
        wallBottom
      );
      downSpill.addColorStop(0, 'rgba(255, 240, 200, 0.08)');
      downSpill.addColorStop(0.5, 'rgba(255, 240, 200, 0.04)');
      downSpill.addColorStop(1, 'rgba(255, 240, 200, 0)');
      ctx.fillStyle = downSpill;
      ctx.fillRect(win.x - 40, win.y + win.height, 160, wallBottom - (win.y + win.height));
    } else {
      // Cool moonlight
      const moonGlow = ctx.createRadialGradient(
        win.x + win.width / 2, 
        win.y + win.height / 2, 
        0,
        win.x + win.width / 2, 
        win.y + win.height / 2, 
        130
      );
      moonGlow.addColorStop(0, 'rgba(200, 220, 255, 0.10)');
      moonGlow.addColorStop(0.5, 'rgba(200, 220, 255, 0.05)');
      moonGlow.addColorStop(1, 'rgba(200, 220, 255, 0)');
      ctx.fillStyle = moonGlow;
      ctx.beginPath();
      ctx.arc(win.x + win.width / 2, win.y + win.height / 2, 130, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  
  // === LAYER 6: Decorative Wall Sconces (below/beside windows) ===
  const sconceY = wallBottom - 45; // Position lower, on the visible wall area
  const sconces = [
    {x: 40},
    {x: W - 40}
  ];
  
  for (const sconce of sconces) {
    ctx.globalAlpha = 0.8;
    
    // Sconce backplate (brass)
    ctx.fillStyle = '#c8a84a';
    ctx.beginPath();
    ctx.ellipse(sconce.x, sconceY, 8, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Dark center
    ctx.fillStyle = '#8a7a5a';
    ctx.beginPath();
    ctx.ellipse(sconce.x, sconceY, 6, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Decorative ring
    ctx.strokeStyle = '#f0d870';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(sconce.x, sconceY, 4.5, 6.5, 0, 0, Math.PI * 2);
    ctx.stroke();
    
    // Warm glow on dark wall
    const sconceGlow = Math.sin(currentTime * 0.5 + sconce.x * 0.01) * 0.1 + 0.9;
    ctx.globalAlpha = 0.5 * sconceGlow;
    
    const sconceLight = ctx.createRadialGradient(sconce.x, sconceY, 0, sconce.x, sconceY, 35);
    sconceLight.addColorStop(0, 'rgba(255, 230, 180, 0.8)');
    sconceLight.addColorStop(0.5, 'rgba(255, 230, 180, 0.4)');
    sconceLight.addColorStop(1, 'rgba(255, 230, 180, 0)');
    ctx.fillStyle = sconceLight;
    ctx.beginPath();
    ctx.arc(sconce.x, sconceY, 35, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // === LAYER 7: Subtle Vignette (edges fade to enhance depth) ===
  const vignetteGradient = ctx.createRadialGradient(W / 2, wallTop + wallHeight / 2, 0, W / 2, wallTop + wallHeight / 2, W * 0.6);
  vignetteGradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
  vignetteGradient.addColorStop(0.7, 'rgba(0, 0, 0, 0.03)');
  vignetteGradient.addColorStop(1, 'rgba(0, 0, 0, 0.15)');
  ctx.fillStyle = vignetteGradient;
  ctx.fillRect(0, wallTop, W, wallHeight);
}

function renderWindows() {
  for (const win of windows) {
    // Window frame
    ctx.fillStyle = '#8b7355';
    ctx.fillRect(win.x - 2, win.y - 2, win.width + 4, win.height + 4);
    
    // Sky color based on time of day
    const skyGradient = ctx.createLinearGradient(win.x, win.y, win.x, win.y + win.height);
    const dayNightCycle = Math.sin(timeOfDay * Math.PI * 2);
    
    if (dayNightCycle > 0) {
      // Day
      skyGradient.addColorStop(0, '#87CEEB');
      skyGradient.addColorStop(1, '#B0E0E6');
    } else {
      // Night
      skyGradient.addColorStop(0, '#191970');
      skyGradient.addColorStop(1, '#000080');
    }
    
    ctx.fillStyle = skyGradient;
    ctx.fillRect(win.x, win.y, win.width, win.height);
    
    // Window panes
    ctx.strokeStyle = '#6b5844';
    ctx.lineWidth = 2;
    ctx.strokeRect(win.x, win.y, win.width, win.height);
    ctx.beginPath();
    ctx.moveTo(win.x + win.width / 2, win.y);
    ctx.lineTo(win.x + win.width / 2, win.y + win.height);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(win.x, win.y + win.height / 2);
    ctx.lineTo(win.x + win.width, win.y + win.height / 2);
    ctx.stroke();
    
    // Sun or moon
    const celestialX = win.x + win.width / 2 + Math.sin(timeOfDay * Math.PI * 2) * 20;
    const celestialY = win.y + win.height / 2 - Math.abs(Math.sin(timeOfDay * Math.PI * 2)) * 10;
    
    if (dayNightCycle > 0) {
      // Sun
      ctx.fillStyle = '#FFD700';
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.arc(celestialX, celestialY, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      // Moon
      ctx.fillStyle = '#F0F0F0';
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      ctx.arc(celestialX, celestialY, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

function renderLamps() {
  for (const lamp of lamps) {
    // Lamp post
    ctx.fillStyle = '#6b5844';
    ctx.fillRect(lamp.x - 3, lamp.y, 6, 30);
    
    // Lamp shade
    ctx.fillStyle = '#c8a84a';
    ctx.beginPath();
    ctx.moveTo(lamp.x - 12, lamp.y);
    ctx.lineTo(lamp.x + 12, lamp.y);
    ctx.lineTo(lamp.x + 8, lamp.y - 15);
    ctx.lineTo(lamp.x - 8, lamp.y - 15);
    ctx.closePath();
    ctx.fill();
    
    // Light glow (flickers)
    const flicker = Math.sin(lamp.flickerPhase) * 0.1 + 0.9;
    const glowSize = 60 * flicker;
    
    const gradient = ctx.createRadialGradient(lamp.x, lamp.y, 0, lamp.x, lamp.y, glowSize);
    gradient.addColorStop(0, 'rgba(255, 240, 200, 0.3)');
    gradient.addColorStop(0.5, 'rgba(255, 240, 200, 0.1)');
    gradient.addColorStop(1, 'rgba(255, 240, 200, 0)');
    
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(lamp.x, lamp.y, glowSize, 0, Math.PI * 2);
    ctx.fill();
    
    // Light bulb
    ctx.fillStyle = '#FFF8DC';
    ctx.globalAlpha = flicker;
    ctx.beginPath();
    ctx.arc(lamp.x, lamp.y - 5, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function renderPlants() {
  for (const plant of plants) {
    const sway = Math.sin(plant.sway) * 2;
    
    // Pot
    ctx.fillStyle = '#8b4513';
    ctx.fillRect(plant.x - 10, plant.y + 10, 20, 15);
    ctx.fillStyle = '#6b3410';
    ctx.fillRect(plant.x - 8, plant.y + 12, 16, 11);
    
    // Leaves
    ctx.fillStyle = '#2d5016';
    for (let i = 0; i < 5; i++) {
      const angle = (i / 5) * Math.PI * 2;
      const leafX = plant.x + Math.cos(angle) * (8 + i * 2) + sway;
      const leafY = plant.y + Math.sin(angle) * (8 + i * 2);
      
      ctx.beginPath();
      ctx.ellipse(leafX, leafY, 6, 10, angle, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Center stem
    ctx.fillStyle = '#3d6020';
    ctx.fillRect(plant.x - 2 + sway / 2, plant.y - 5, 4, 15);
  }
}

function renderAmbientParticles() {
  ctx.globalAlpha = 0.3;
  for (const p of ambientParticles) {
    const twinkle = Math.sin(p.phase) * 0.3 + 0.7;
    ctx.globalAlpha = 0.3 * twinkle;
    ctx.fillStyle = '#f0ebd6';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════════════════

function render() {
  try {
    // Clear
    ctx.fillStyle = '#e8dfcf';
    ctx.fillRect(0, 0, W, H);
    
    // Apply camera transform and effects for gameplay
    if (state === 'play' || state === 'paused' || state === 'gameover') {
      ctx.save();
      
      // Apply zoom from center
      ctx.translate(W / 2, H / 2);
      ctx.scale(cameraZoom, cameraZoom);
      ctx.translate(-W / 2, -H / 2);
      
      // Apply only camera shake (no follow)
      ctx.translate(cameraShakeX, cameraShakeY);
    }
    
    if (state === 'menu') renderMenu();
    else if (state === 'difficulty') renderDifficultySelect();
    else if (state === 'play') {
      renderGame();
      ctx.restore(); // Restore before UI
      applyScreenEffects();
      if (isMobile()) renderTouchControls();
    }
    else if (state === 'paused') {
      renderGame();
      ctx.restore(); // Restore before overlay
      applyScreenEffects();
      if (isMobile()) renderTouchControls();
      renderPauseOverlay();
    }
    else if (state === 'gameover') {
      renderGame();
      ctx.restore(); // Restore before overlay
      applyScreenEffects();
      renderGameOver();
    }
  } catch (error) {
    console.error('Error in render loop:', error);
    console.error('Error stack:', error.stack);
    // Try to recover by clearing the canvas
    ctx.fillStyle = '#0a0a14';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff2222';
    ctx.font = '12px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText('Error occurred - Press ESC', W/2, H/2);
  }
}

// ── Apply Screen Effects ───────────────────────────────────────────────────
function applyScreenEffects() {
  // Chromatic aberration (RGB split on heavy hits)
  if (chromaticAberration > 0.5) {
    const imageData = ctx.getImageData(0, 0, W, H);
    const data = imageData.data;
    const offset = Math.floor(chromaticAberration);
    
    // Create a copy for manipulation
    const dataCopy = new Uint8ClampedArray(data);
    
    // Red/Blue channel shift
    for (let i = 0; i < data.length; i += 4) {
      const shiftIndex = i + offset * 4;
      const backIndex = i - offset * 4;
      
      // Shift red channel right
      if (shiftIndex < data.length) {
        data[i] = dataCopy[shiftIndex];
      }
      
      // Shift blue channel left
      if (backIndex >= 0) {
        data[i + 2] = dataCopy[backIndex + 2];
      }
    }
    
    ctx.putImageData(imageData, 0, 0);
  }
  
  // Motion blur overlay when dashing
  if (motionBlurAlpha > 0) {
    ctx.globalAlpha = motionBlurAlpha * 0.4;
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
  
  // Vignette effect (darkened edges at low health)
  if (vignetteIntensity > 0) {
    const gradient = ctx.createRadialGradient(
      W / 2, H / 2, W * 0.2,
      W / 2, H / 2, Math.max(W, H) * 0.7
    );
    gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
    gradient.addColorStop(0.5, `rgba(10, 0, 0, ${vignetteIntensity * 0.3})`);
    gradient.addColorStop(1, `rgba(20, 0, 0, ${vignetteIntensity})`);
    
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);
    
    // Additional red tint at very low health
    if (vignetteIntensity > 0.5) {
      ctx.fillStyle = `rgba(80, 0, 0, ${(vignetteIntensity - 0.5) * 0.2})`;
      ctx.fillRect(0, 0, W, H);
    }
  }
  
  // ─── Phase 3: Directional hit vignette ─────────────────────────────────
  // Bleeds red in from the direction the damage came from
  if (hitVignette > 0) {
    const hv = hitVignette;
    // Source point of the bleed — opposite side of screen from the hit angle
    const bleedX = W / 2 + Math.cos(hitVignetteAngle) * W * 0.7;
    const bleedY = H / 2 + Math.sin(hitVignetteAngle) * H * 0.7;
    
    const hvGrad = ctx.createRadialGradient(bleedX, bleedY, 0, bleedX, bleedY, Math.max(W, H) * 1.1);
    hvGrad.addColorStop(0,   `rgba(200, 0, 0, ${hv * 0.75})`);
    hvGrad.addColorStop(0.35, `rgba(160, 0, 0, ${hv * 0.45})`);
    hvGrad.addColorStop(0.65, `rgba(80, 0, 0, ${hv * 0.18})`);
    hvGrad.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = hvGrad;
    ctx.fillRect(0, 0, W, H);
  }
}

// LUCHA LIBRE TITLE SCREEN — Full overhaul
// ═══════════════════════════════════════════════════════════════════════════

// Streamer particles for the title screen (separate from gameplay particles)
let luchaStreamers = [];
function initLuchaStreamers() {
  luchaStreamers = [];
  const colors = ['#d62a2a','#ffffff','#2a8c2a','#f0e840','#c8a84a','#aa4aff','#4a8cff'];
  for (let i = 0; i < 55; i++) {
    luchaStreamers.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vy: 55 + Math.random() * 80,
      vx: (Math.random() - 0.5) * 22,
      w: 4 + Math.random() * 5,
      h: 10 + Math.random() * 14,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.12,
      color: colors[Math.floor(Math.random() * colors.length)],
      phase: Math.random() * Math.PI * 2
    });
  }
}

function updateLuchaStreamers(dt) {
  const sec = dt / 1000;
  for (const s of luchaStreamers) {
    s.y  += s.vy  * sec;
    s.x  += s.vx  * sec + Math.sin(s.phase) * 18 * sec;
    s.rot += s.rotV;
    s.phase += sec * 2.5;
    if (s.y > H + 20) { s.y = -20; s.x = Math.random() * W; }
    if (s.x < -20) s.x = W + 20;
    if (s.x > W + 20) s.x = -20;
  }
}

// ── AUTHENTIC LUCHADOR MASK ──────────────────────────────────────────────────
// Redesigned for heroic lucha libre accuracy:
//   • Almond/diamond eye CUTOUTS (angular, tilted — not round circles)
//   • Aggressive angular brow ridges that create the classic intense expression
//   • Geometric color-zone panels (V-crown, forehead band, lateral panels)
//   • Small chin opening — NO teeth
//   • Center seam stitching for leather-mask authenticity
//   • Metallic forehead highlight
// cx,cy = centre; sz = half-height; opts = color overrides
function drawDetailedMask(cx, cy, sz, opts = {}) {
  const c = {
    main:    opts.main    || '#c8181a',
    stripe:  opts.stripe  || '#f0e840',
    dark:    opts.dark    || '#6a0808',
    eye:     opts.eye     || '#0a0a12',
    eyeGlow: opts.eyeGlow || '#ff6a00',
    trim:    opts.trim    || '#ffffff',
    accent:  opts.accent  || '#2a8c2a',
  };
  const s = sz / 100;

  ctx.save();
  ctx.translate(cx, cy);

  // ─────────────────────────────────────────────────────────────────────────
  // 1. DROP SHADOW
  // ─────────────────────────────────────────────────────────────────────────
  ctx.shadowColor = 'rgba(0,0,0,0.75)';
  ctx.shadowBlur  = 32 * s;

  // ─────────────────────────────────────────────────────────────────────────
  // 2. MASK SILHOUETTE — teardrop helmet shape
  //    Wide at the crown, full cheekbones, tapers to a pointed chin.
  //    Drawn as a bezier path so it reads as a 3-D leather helmet, not a flat oval.
  // ─────────────────────────────────────────────────────────────────────────
  ctx.fillStyle = c.main;
  ctx.beginPath();
  // Top center
  ctx.moveTo(0, -100*s);
  // Crown → right temple (wide curve)
  ctx.bezierCurveTo(40*s, -100*s,  72*s, -70*s,  72*s, -30*s);
  // Right cheekbone → right jaw
  ctx.bezierCurveTo(72*s,  10*s,   60*s,  55*s,  28*s,  80*s);
  // Right jaw → chin point
  ctx.bezierCurveTo(18*s,  90*s,    8*s,  96*s,   0,    100*s);
  // Chin → left jaw (mirror)
  ctx.bezierCurveTo(-8*s,  96*s,  -18*s,  90*s, -28*s,  80*s);
  // Left jaw → left cheekbone
  ctx.bezierCurveTo(-60*s, 55*s,  -72*s,  10*s, -72*s, -30*s);
  // Left temple → top center
  ctx.bezierCurveTo(-72*s, -70*s, -40*s, -100*s,  0,  -100*s);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  // ─────────────────────────────────────────────────────────────────────────
  // 3. FOREHEAD PANEL — horizontal band across the upper third
  //    Clipped to the mask silhouette using the same bezier path.
  // ─────────────────────────────────────────────────────────────────────────
  ctx.save();
  // Re-clip to mask shape so panel doesn't bleed outside
  ctx.beginPath();
  ctx.moveTo(0, -100*s);
  ctx.bezierCurveTo(40*s, -100*s,  72*s, -70*s,  72*s, -30*s);
  ctx.bezierCurveTo(72*s,  10*s,   60*s,  55*s,  28*s,  80*s);
  ctx.bezierCurveTo(18*s,  90*s,    8*s,  96*s,   0,    100*s);
  ctx.bezierCurveTo(-8*s,  96*s,  -18*s,  90*s, -28*s,  80*s);
  ctx.bezierCurveTo(-60*s, 55*s,  -72*s,  10*s, -72*s, -30*s);
  ctx.bezierCurveTo(-72*s, -70*s, -40*s, -100*s,  0,  -100*s);
  ctx.closePath();
  ctx.clip();

  // Forehead band (trim color) — sits across top 35%
  ctx.fillStyle = c.trim;
  ctx.fillRect(-75*s, -100*s, 150*s, 52*s);

  // Accent bar at lower edge of forehead band (stripe color)
  ctx.fillStyle = c.stripe;
  ctx.fillRect(-75*s, -50*s, 150*s, 8*s);

  ctx.restore(); // release clip

  // ─────────────────────────────────────────────────────────────────────────
  // 4. CENTRAL CROWN-TO-CHIN V-STRIPE
  //    The classic lucha "lightning bolt" that runs from crown tip to nose.
  // ─────────────────────────────────────────────────────────────────────────
  ctx.fillStyle = c.stripe;
  ctx.beginPath();
  ctx.moveTo(0, -100*s);          // crown tip
  ctx.lineTo(22*s,  -52*s);       // right shoulder of V
  ctx.lineTo(12*s,  -52*s);
  ctx.lineTo(0,     -28*s);       // V point (nose bridge top)
  ctx.lineTo(-12*s, -52*s);
  ctx.lineTo(-22*s, -52*s);
  ctx.closePath();
  ctx.fill();

  // Narrow accent colour bar inside the V
  ctx.fillStyle = c.accent;
  ctx.beginPath();
  ctx.moveTo(0, -100*s);
  ctx.lineTo(8*s, -58*s);
  ctx.lineTo(0,   -38*s);
  ctx.lineTo(-8*s,-58*s);
  ctx.closePath();
  ctx.fill();

  // ─────────────────────────────────────────────────────────────────────────
  // 5. EYE OPENINGS — almond / diamond cutouts
  //    Inner corner is lower and closer to centre (angry tilt).
  //    Outer corner rises and points outward.
  //    These are pure black openings — authentic masks show the wrestler's
  //    real eyes through the hole; no painted irises, no clown glow rings.
  // ─────────────────────────────────────────────────────────────────────────
  for (const side of [-1, 1]) {
    const ex = side * 30*s;  // horizontal centre of eye zone

    // Almond path: 4 bezier points
    //   inner tip  →  top peak  →  outer tip  →  bottom valley  → close
    const iX = side * 12*s,  iY = -16*s;   // inner tip  (near nose)
    const oX = side * 52*s,  oY = -24*s;   // outer tip  (temple)
    const tX = side * 34*s,  tY = -40*s;   // top arch peak
    const bX = side * 30*s,  bY =  -6*s;   // bottom arch valley

    // Outer angular brow ridge — painted in dark shade above the eye cutout.
    // This is the element that makes the mask look fierce, not clown-like.
    ctx.fillStyle = c.dark;
    ctx.beginPath();
    // Brow runs from inner-above to outer-above with a sharp peak at 2/3
    const biX = side * 8*s,  biY = -46*s;  // inner brow root
    const boX = side * 56*s, boY = -38*s;  // outer brow end
    const bpX = side * 38*s, bpY = -56*s;  // peak of the brow arch
    ctx.moveTo(biX, biY);
    ctx.quadraticCurveTo(bpX, bpY, boX, boY);
    ctx.lineTo(oX, oY);   // bridge to outer eye corner
    ctx.lineTo(tX, tY);   // run along top of eye
    ctx.lineTo(iX, iY);   // to inner eye corner
    ctx.closePath();
    ctx.fill();

    // The eye opening itself (clipping mask shape NOT needed — the mask
    // body colour already fills behind; we just stamp the dark hole).
    ctx.fillStyle = c.eye;
    ctx.beginPath();
    ctx.moveTo(iX, iY);
    ctx.quadraticCurveTo(tX, tY - 4*s, oX, oY);    // top arc
    ctx.quadraticCurveTo(bX, bY + 4*s, iX, iY);    // bottom arc
    ctx.closePath();
    ctx.fill();

    // Thin stripe-colour edge trace around the eye opening (depth / definition)
    ctx.strokeStyle = c.stripe;
    ctx.lineWidth = 1.8*s;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.moveTo(iX, iY);
    ctx.quadraticCurveTo(tX, tY - 4*s, oX, oY);
    ctx.quadraticCurveTo(bX, bY + 4*s, iX, iY);
    ctx.closePath();
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Inner-corner accent dot (a classic detail on real masks)
    ctx.fillStyle = c.stripe;
    ctx.beginPath();
    ctx.arc(iX, iY, 3*s, 0, Math.PI*2);
    ctx.fill();
  }

  // ─────────────────────────────────────────────────────────────────────────
  // 6. NOSE BRIDGE PANEL
  //    A narrow tapered strip from between the eyes down to upper lip.
  //    Gives the mask its three-dimensional face structure.
  // ─────────────────────────────────────────────────────────────────────────
  ctx.fillStyle = c.dark;
  ctx.beginPath();
  ctx.moveTo(-6*s, -26*s);
  ctx.lineTo( 6*s, -26*s);
  ctx.lineTo( 9*s,  22*s);
  ctx.lineTo(-9*s,  22*s);
  ctx.closePath();
  ctx.fill();

  // ─────────────────────────────────────────────────────────────────────────
  // 7. CHEEK PANELS — lateral colour blocks between eyes and jaw
  //    These are the main colour zones that give lucha masks their
  //    graphic boldness. Drawn as triangular-ish regions.
  // ─────────────────────────────────────────────────────────────────────────
  for (const side of [-1, 1]) {
    ctx.fillStyle = c.accent;
    ctx.globalAlpha = 0.30;
    ctx.beginPath();
    ctx.moveTo(side * 10*s,   22*s);   // bottom of nose bridge
    ctx.lineTo(side * 72*s,   0*s);    // cheekbone
    ctx.lineTo(side * 55*s,   65*s);   // jaw corner
    ctx.lineTo(side * 15*s,   68*s);   // chin edge
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // ─────────────────────────────────────────────────────────────────────────
  // 8. CHIN OPENING — small semicircle cutout at base, NO teeth
  //    Real lucha masks only expose the mouth/chin area; the opening is dark.
  // ─────────────────────────────────────────────────────────────────────────
  ctx.fillStyle = c.eye;
  ctx.beginPath();
  ctx.ellipse(0, 82*s, 22*s, 14*s, 0, 0, Math.PI);
  ctx.fill();

  // Thin border around chin opening
  ctx.strokeStyle = c.dark;
  ctx.lineWidth = 2*s;
  ctx.beginPath();
  ctx.ellipse(0, 82*s, 22*s, 14*s, 0, 0, Math.PI);
  ctx.stroke();

  // ─────────────────────────────────────────────────────────────────────────
  // 9. METALLIC FOREHEAD HIGHLIGHT
  //    A subtle vertical gradient sheen that sells the leather/spandex material.
  // ─────────────────────────────────────────────────────────────────────────
  const sheen = ctx.createLinearGradient(0, -100*s, 0, -48*s);
  sheen.addColorStop(0,   'rgba(255,255,255,0.28)');
  sheen.addColorStop(0.5, 'rgba(255,255,255,0.10)');
  sheen.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.fillStyle = sheen;
  ctx.beginPath();
  ctx.moveTo(0, -100*s);
  ctx.bezierCurveTo(40*s,-100*s, 72*s,-70*s, 72*s,-30*s);
  ctx.lineTo(72*s, -48*s);
  ctx.bezierCurveTo(72*s, -70*s, 40*s,-100*s, 0, -100*s);
  ctx.moveTo(0, -100*s);
  ctx.bezierCurveTo(-40*s,-100*s,-72*s,-70*s,-72*s,-30*s);
  ctx.lineTo(-72*s,-48*s);
  ctx.bezierCurveTo(-72*s,-70*s,-40*s,-100*s, 0,-100*s);
  ctx.fill();

  // Simple centre-strip highlight
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(-5*s, -100*s, 10*s, 50*s);

  // ─────────────────────────────────────────────────────────────────────────
  // 10. OUTER BORDER — dark seam line around the whole mask
  // ─────────────────────────────────────────────────────────────────────────
  ctx.strokeStyle = c.dark;
  ctx.lineWidth = 4*s;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(0, -100*s);
  ctx.bezierCurveTo(40*s,-100*s, 72*s,-70*s, 72*s,-30*s);
  ctx.bezierCurveTo(72*s, 10*s,  60*s, 55*s, 28*s, 80*s);
  ctx.bezierCurveTo(18*s, 90*s,   8*s, 96*s,  0, 100*s);
  ctx.bezierCurveTo(-8*s, 96*s, -18*s, 90*s,-28*s, 80*s);
  ctx.bezierCurveTo(-60*s,55*s, -72*s, 10*s,-72*s,-30*s);
  ctx.bezierCurveTo(-72*s,-70*s,-40*s,-100*s,  0,-100*s);
  ctx.closePath();
  ctx.stroke();

  // ─────────────────────────────────────────────────────────────────────────
  // 11. CENTRE SEAM — vertical stitching line (authenticity detail)
  // ─────────────────────────────────────────────────────────────────────────
  ctx.strokeStyle = c.dark;
  ctx.lineWidth = 1.5*s;
  ctx.setLineDash([4*s, 3*s]);
  ctx.beginPath();
  ctx.moveTo(0, -100*s);
  ctx.lineTo(0, 80*s);
  ctx.stroke();
  ctx.setLineDash([]);

  // ─────────────────────────────────────────────────────────────────────────
  // 12. CROWN ORNAMENT — 5-point star at the very top
  // ─────────────────────────────────────────────────────────────────────────
  ctx.fillStyle = c.stripe;
  ctx.strokeStyle = c.dark;
  ctx.lineWidth = 1.5*s;
  ctx.save();
  ctx.translate(0, -100*s);
  const starR = 11*s, starInner = 4.5*s;
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = (i * Math.PI / 5) - Math.PI / 2;
    const r = i % 2 === 0 ? starR : starInner;
    if (i === 0) ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r);
    else         ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.restore();

  ctx.restore();
}

// ── ARENA BACKGROUND ────────────────────────────────────────────────────────
function drawArenaBackground(time) {
  // Deep night sky base
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#050508');
  sky.addColorStop(0.6, '#0e0a18');
  sky.addColorStop(1, '#18080a');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // ── Spotlight beams from top corners ──────────────────────────────────
  const spotTargetX = W / 2;
  const spotTargetY = H * 0.35;
  const spots = [
    { ox: W*0.08, oy: 0, color: 'rgba(255,240,180,' },
    { ox: W*0.92, oy: 0, color: 'rgba(255,220,150,' },
  ];
  for (const sp of spots) {
    const angle = Math.atan2(spotTargetY - sp.oy, spotTargetX - sp.ox);
    const len   = Math.hypot(spotTargetX - sp.ox, spotTargetY - sp.oy) * 1.4;
    ctx.save();
    ctx.translate(sp.ox, sp.oy);
    ctx.rotate(angle);
    const beam = ctx.createLinearGradient(0, 0, len, 0);
    beam.addColorStop(0,   sp.color + '0.18)');
    beam.addColorStop(0.5, sp.color + '0.10)');
    beam.addColorStop(1,   sp.color + '0)');
    ctx.fillStyle = beam;
    ctx.beginPath();
    ctx.moveTo(0, -60);
    ctx.lineTo(len, -120);
    ctx.lineTo(len,  120);
    ctx.lineTo(0,  60);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // ── Ring floor (bottom 30% — diamond canvas) ──────────────────────────
  const ringY = H * 0.72;
  const ringH = H * 0.28;

  // Canvas base
  const canvas2 = ctx.createLinearGradient(0, ringY, 0, H);
  canvas2.addColorStop(0, '#2a1a0a');
  canvas2.addColorStop(1, '#180e05');
  ctx.fillStyle = canvas2;
  ctx.fillRect(0, ringY, W, ringH);

  // Diamond tiling
  const dSize = 44;
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#c8a84a';
  ctx.lineWidth = 1;
  for (let row = 0; row * dSize < ringH + dSize; row++) {
    for (let col = -1; col * dSize < W + dSize; col++) {
      const ox = (row % 2) * (dSize / 2);
      const dx = col * dSize + ox;
      const dy = ringY + row * dSize * 0.6;
      ctx.beginPath();
      ctx.moveTo(dx,          dy - dSize*0.3);
      ctx.lineTo(dx + dSize/2, dy);
      ctx.lineTo(dx,          dy + dSize*0.3);
      ctx.lineTo(dx - dSize/2, dy);
      ctx.closePath();
      ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;

  // ── Ring ropes (3 horizontal) ─────────────────────────────────────────
  const ropeColors = ['#f0e840', '#c8a84a', '#f0e840'];
  const ropeGaps = [0.04, 0.09, 0.14];
  for (let r = 0; r < 3; r++) {
    const ry = ringY - ropeGaps[r] * H;
    // Rope shadow
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 6;
    ctx.beginPath(); ctx.moveTo(0, ry+2); ctx.lineTo(W, ry+2); ctx.stroke();
    // Rope
    const ropeGrad = ctx.createLinearGradient(0, ry-3, 0, ry+4);
    ropeGrad.addColorStop(0, '#ffffff');
    ropeGrad.addColorStop(0.4, ropeColors[r]);
    ropeGrad.addColorStop(1, '#7a6a20');
    ctx.strokeStyle = ropeGrad;
    ctx.lineWidth = r === 1 ? 7 : 5;
    ctx.beginPath(); ctx.moveTo(0, ry); ctx.lineTo(W, ry); ctx.stroke();
    // Turnbuckle pads
    for (const tx of [0, W]) {
      ctx.fillStyle = '#3a2a0a';
      ctx.fillRect(tx === 0 ? 0 : W-22, ry-18, 22, 36);
      ctx.fillStyle = ropeColors[r];
      ctx.fillRect(tx === 0 ? 4 : W-18, ry-14, 14, 28);
    }
  }

  // ── Ring apron edge ───────────────────────────────────────────────────
  ctx.fillStyle = '#6a1a1a';
  ctx.fillRect(0, ringY - 2, W, 14);
  // Apron fringe
  const fringeW = 18;
  for (let f = 0; f < W / fringeW; f++) {
    ctx.fillStyle = f % 2 === 0 ? '#8a2a2a' : '#c8a84a';
    ctx.beginPath();
    ctx.moveTo(f * fringeW, ringY + 12);
    ctx.lineTo(f * fringeW + fringeW/2, ringY + 26);
    ctx.lineTo(f * fringeW + fringeW, ringY + 12);
    ctx.closePath();
    ctx.fill();
  }

  // ── Crowd silhouettes ─────────────────────────────────────────────────
  const crowdY = ringY - H * 0.18;
  const headW = 22, headH = 28, gap = 16;
  const totalHeads = Math.floor(W / (headW + gap)) + 1;
  for (let h = 0; h < totalHeads; h++) {
    const hx = h * (headW + gap) - 8;
    const hy = crowdY + Math.sin(h * 1.7 + time * 0.5) * 6;
    // Body
    ctx.fillStyle = `hsl(${(h * 47) % 360}, 35%, 14%)`;
    ctx.fillRect(hx - headW/2, hy, headW, headH);
    // Head
    ctx.beginPath();
    ctx.ellipse(hx, hy - 5, headW/2 - 2, headH/3, 0, 0, Math.PI*2);
    ctx.fill();
    // Waving arm (every 3rd person)
    if (h % 3 === 0) {
      ctx.strokeStyle = `hsl(${(h * 47) % 360}, 35%, 18%)`;
      ctx.lineWidth = 5;
      ctx.beginPath();
      const wave = Math.sin(time*3 + h) * 0.5;
      ctx.moveTo(hx + headW/2, hy + 8);
      ctx.lineTo(hx + headW/2 + 14, hy - 10 + wave * 8);
      ctx.stroke();
    }
  }
  // Second row (darker, behind)
  ctx.globalAlpha = 0.5;
  for (let h = 0; h < totalHeads; h++) {
    const hx = h * (headW + gap) + (headW+gap)/2 - 8;
    const hy = crowdY - 24 + Math.sin(h * 2.1 + time * 0.4) * 4;
    ctx.fillStyle = `hsl(${(h * 63) % 360}, 20%, 10%)`;
    ctx.fillRect(hx - headW/2 + 2, hy, headW - 4, headH - 4);
    ctx.beginPath();
    ctx.ellipse(hx, hy - 4, headW/2 - 3, headH/3 - 1, 0, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // ── Ambient confetti (background) ────────────────────────────────────
  for (let i = 0; i < 30; i++) {
    const cx2 = ((i * W * 0.033 + time * 12) % W);
    const cy2 = ((i * H * 0.04 + time * 8) % H);
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = ['#d62a2a','#f0e840','#2a8c2a','#ffffff'][i%4];
    ctx.fillRect(cx2 - 2, cy2 - 3, 4, 6);
  }
  ctx.globalAlpha = 1;
}

// ── STAR-BURST RADIAL behind center mask ──────────────────────────────────
function drawStarBurst(cx, cy, r, time) {
  const rays = 16;
  for (let i = 0; i < rays; i++) {
    const angle = (i / rays) * Math.PI * 2 + time * 0.18;
    const bright = (i % 2 === 0) ? '#f0e840' : '#c8a84a';
    ctx.globalAlpha = 0.18 + Math.sin(time * 1.4 + i) * 0.06;
    ctx.fillStyle = bright;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(
      cx + Math.cos(angle - 0.1) * r,
      cy + Math.sin(angle - 0.1) * r
    );
    ctx.lineTo(
      cx + Math.cos(angle + 0.1) * r,
      cy + Math.sin(angle + 0.1) * r
    );
    ctx.closePath();
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── OUTLINED TEXT helper ───────────────────────────────────────────────────
function strokeText2(txt, x, y, fill, stroke, lw) {
  ctx.strokeStyle = stroke;
  ctx.lineWidth   = lw;
  ctx.lineJoin    = 'round';
  ctx.strokeText(txt, x, y);
  ctx.fillStyle = fill;
  ctx.fillText(txt, x, y);
}

function renderMenu() {
  const t  = Date.now() * 0.001;  // seconds
  const ta = Date.now() * 0.0005; // half-speed alias

  // ── Sync streamers with menu ──────────────────────────────────────────
  if (luchaStreamers.length === 0) initLuchaStreamers();
  updateLuchaStreamers(16); // ~60fps approximation for menu

  // ── Arena background ─────────────────────────────────────────────────
  drawArenaBackground(ta);

  // ── Streamers ─────────────────────────────────────────────────────────
  for (const s of luchaStreamers) {
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rot);
    ctx.globalAlpha = 0.78;
    ctx.fillStyle = s.color;
    ctx.fillRect(-s.w/2, -s.h/2, s.w, s.h);
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // ── Star-burst behind hero mask ────────────────────────────────────────
  const maskCX = W / 2;
  const maskCY = H * 0.3;
  drawStarBurst(maskCX, maskCY, Math.min(W, H) * 0.46, t);

  // ── Flanking mini masks ────────────────────────────────────────────────
  const flankSz = Math.min(60, W * 0.06);
  ctx.globalAlpha = 0.55;
  drawDetailedMask(W * 0.12, H * 0.28, flankSz, {
    main:'#2e5cc0', stripe:'#f0e840', dark:'#1a3a80',
    eyeGlow:'#4a8cff', accent:'#ffffff', trim:'#ffffff'
  });
  drawDetailedMask(W * 0.88, H * 0.28, flankSz, {
    main:'#2a8c2a', stripe:'#f0e840', dark:'#1a5c1a',
    eyeGlow:'#2aff5a', accent:'#ffffff', trim:'#ffffff'
  });
  ctx.globalAlpha = 1;

  // ── Hero center mask ───────────────────────────────────────────────────
  const heroSz = Math.min(105, H * 0.19);
  drawDetailedMask(maskCX, maskCY, heroSz, {
    main:'#c8181a', stripe:'#f0e840', dark:'#7a0a0a',
    eyeGlow:'#ff8a00', accent:'#2a8c2a', trim:'#ffffff'
  });

  // ── CHAMPIONSHIP BELT BAR (behind title text) ──────────────────────────
  const titleBaseY = H * 0.52;
  const beltH = Math.min(90, H * 0.14);
  const beltGrad = ctx.createLinearGradient(0, titleBaseY - beltH/2, 0, titleBaseY + beltH/2);
  beltGrad.addColorStop(0, '#3a2800');
  beltGrad.addColorStop(0.2, '#c8a84a');
  beltGrad.addColorStop(0.5, '#f0e840');
  beltGrad.addColorStop(0.8, '#c8a84a');
  beltGrad.addColorStop(1, '#3a2800');
  ctx.fillStyle = beltGrad;
  ctx.fillRect(0, titleBaseY - beltH/2, W, beltH);
  // Belt rivets
  const rivetGap = 40;
  for (let rx = rivetGap/2; rx < W; rx += rivetGap) {
    ctx.fillStyle = '#8a6a00';
    ctx.beginPath();
    ctx.arc(rx, titleBaseY, 4, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#f0e840';
    ctx.beginPath();
    ctx.arc(rx, titleBaseY, 2.5, 0, Math.PI*2);
    ctx.fill();
  }
  // Belt top/bottom edge lines
  ctx.strokeStyle = '#7a5a00';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, titleBaseY - beltH/2); ctx.lineTo(W, titleBaseY - beltH/2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, titleBaseY + beltH/2); ctx.lineTo(W, titleBaseY + beltH/2); ctx.stroke();

  // ── TITLE TEXT (wrestling poster stack) ────────────────────────────────
  const titleAnim = menuItemAnimations[0] || { y: 0, alpha: 1 };
  ctx.globalAlpha = Math.min(1, titleAnim.alpha * menuTransitionAlpha);

  // "THE" — small, above
  const theSize = Math.min(18, W * 0.022);
  ctx.font = `bold ${theSize}px "Press Start 2P"`;
  ctx.textAlign = 'center';
  strokeText2('THE', W/2, titleBaseY - beltH/2 + 2 + titleAnim.y,
    '#ffffff', '#3a2800', 6);

  // "LUCHABRARIAN" — full word, centered on belt, auto-scaled to fit width
  const maxTitleW = W * 0.88;
  ctx.font = `bold 64px "Press Start 2P"`;          // probe size
  const measured = ctx.measureText('LUCHABRARIAN').width;
  const luchaSize = Math.min(52, W * 0.065, 64 * (maxTitleW / measured));
  ctx.font = `bold ${luchaSize}px "Press Start 2P"`;
  const luchaPulse = 1 + Math.sin(t * 2.2) * 0.02;
  ctx.save();
  ctx.translate(W/2, titleBaseY + 4 + titleAnim.y);
  ctx.scale(luchaPulse, luchaPulse);
  // Drop shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillText('LUCHABRARIAN', 4, 4);
  // Triple-layer outline: dark red → gold → red fill
  ctx.lineJoin = 'round';
  ctx.lineWidth = 14;  ctx.strokeStyle = '#5a0000'; ctx.strokeText('LUCHABRARIAN', 0, 0);
  ctx.lineWidth = 8;   ctx.strokeStyle = '#c8a84a'; ctx.strokeText('LUCHABRARIAN', 0, 0);
  ctx.fillStyle = '#ff2222'; ctx.fillText('LUCHABRARIAN', 0, 0);
  // Gold shine strip across top third of letters
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(-W/2, -luchaSize * 0.7, W, luchaSize * 0.28);
  ctx.globalAlpha = 1;
  ctx.restore();

  // Subtitle
  const subSize = Math.min(11, W * 0.014);
  ctx.font = `${subSize}px "Press Start 2P"`;
  ctx.globalAlpha = 0.8;
  strokeText2('¡EL GUARDIÁN DE LA BIBLIOTECA!',
    W/2, titleBaseY + beltH/2 + subSize * 1.9 + titleAnim.y,
    '#d4c8a8', '#1a1a0a', 4);
  ctx.globalAlpha = Math.min(1, titleAnim.alpha * menuTransitionAlpha);

  // ── MENU BUTTONS (belt-plate style) ────────────────────────────────────
  const options   = ['⚔  START GAME', '∞  ENDLESS MODE'];
  const btnColors = [['#c8181a','#ff4444'], ['#2a4a8c','#4a8cff']];
  const startY = titleBaseY + beltH/2 + subSize * 3.2 + 28;
  const btnW = Math.min(380, W * 0.48), btnH = Math.min(52, H * 0.07);
  const btnGap = Math.min(18, H * 0.025);

  for (let i = 0; i < options.length; i++) {
    const anim = menuItemAnimations[i + 1] || { y: 0, alpha: 1 };
    ctx.globalAlpha = Math.min(1, anim.alpha * menuTransitionAlpha);
    const by = startY + i * (btnH + btnGap) + anim.y;
    const bx = W/2 - btnW/2;
    const sel = i === menuSelection;
    const [baseC, glowC] = btnColors[i];
    const pulse = Math.sin(t * 3.5 + i) * 0.12 + 0.88;

    // Outer glow when selected
    if (sel) {
      ctx.shadowColor = glowC;
      ctx.shadowBlur  = 22 * pulse;
    }

    // Belt-plate background
    const bg = ctx.createLinearGradient(bx, by, bx, by + btnH);
    bg.addColorStop(0,   sel ? '#3a2800' : '#1a1a2a');
    bg.addColorStop(0.3, sel ? baseC     : '#2a2a3a');
    bg.addColorStop(0.7, sel ? baseC     : '#2a2a3a');
    bg.addColorStop(1,   sel ? '#1a0800' : '#111122');
    ctx.fillStyle = bg;
    // Slight trapezoid (wider top) for wrestling-poster feel
    ctx.beginPath();
    ctx.moveTo(bx - (sel ? 10 : 0), by);
    ctx.lineTo(bx + btnW + (sel ? 10 : 0), by);
    ctx.lineTo(bx + btnW, by + btnH);
    ctx.lineTo(bx, by + btnH);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // Border
    ctx.strokeStyle = sel ? '#f0e840' : '#4a4a6a';
    ctx.lineWidth   = sel ? 3 : 2;
    ctx.beginPath();
    ctx.moveTo(bx - (sel ? 10 : 0), by);
    ctx.lineTo(bx + btnW + (sel ? 10 : 0), by);
    ctx.lineTo(bx + btnW, by + btnH);
    ctx.lineTo(bx, by + btnH);
    ctx.closePath();
    ctx.stroke();

    // Corner star ornaments (selected)
    if (sel) {
      const starPts = [[bx-8, by], [bx+btnW+8, by],
                       [bx, by+btnH], [bx+btnW, by+btnH]];
      ctx.fillStyle = '#f0e840';
      for (const [px, py] of starPts) {
        ctx.save();
        ctx.translate(px, py);
        ctx.beginPath();
        for (let k = 0; k < 4; k++) {
          const ang = k * Math.PI / 2 - Math.PI/4;
          const ang2 = ang + Math.PI/4;
          if (k === 0) ctx.moveTo(Math.cos(ang)*8, Math.sin(ang)*8);
          else ctx.lineTo(Math.cos(ang)*8, Math.sin(ang)*8);
          ctx.lineTo(Math.cos(ang2)*3.5, Math.sin(ang2)*3.5);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    // Button text
    const btnFontSize = Math.min(17, W * 0.021);
    ctx.font = `bold ${btnFontSize}px "Press Start 2P"`;
    ctx.textAlign = 'center';
    if (sel) {
      strokeText2(options[i], W/2, by + btnH * 0.64, '#f0e840', '#5a3a00', 6);
    } else {
      strokeText2(options[i], W/2, by + btnH * 0.64, '#8a8a9a', '#0a0a1a', 4);
    }

    // Bouncing arrow pointers (selected)
    if (sel) {
      const ab = Math.sin(t * 5) * 5;
      ctx.fillStyle = '#f0e840';
      ctx.font = `bold ${btnFontSize}px "Press Start 2P"`;
      ctx.fillText('▶', bx - 32 + ab, by + btnH * 0.64);
      ctx.fillText('◀', bx + btnW + 32 - ab, by + btnH * 0.64);
    }
  }

  ctx.globalAlpha = 1;

  // ── CROWD CHANT ticker ─────────────────────────────────────────────────
  const chantAlpha = Math.sin(t * 1.8) * 0.3 + 0.55;
  ctx.globalAlpha = chantAlpha;
  const chantSize = Math.min(10, W * 0.013);
  ctx.font = `bold ${chantSize}px "Press Start 2P"`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#f0e840';
  ctx.fillText('¡LUCHA!   ¡LUCHA!   ¡LUCHA!   ¡LUCHA!   ¡LUCHA!   ¡LUCHA!', W/2, H - 18);
  ctx.globalAlpha = 1;

  // Navigate hint
  ctx.globalAlpha = 0.55;
  ctx.font = `${Math.min(10, W * 0.013)}px "Press Start 2P"`;
  ctx.fillStyle = '#8a8a9a';
  ctx.textAlign = 'center';
  ctx.fillText('W/S or ↑↓: Move   |   ENTER / SPACE: Select', W/2, H - 38);
  ctx.globalAlpha = 1;
}
