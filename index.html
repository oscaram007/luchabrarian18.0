        ctx.globalAlpha = 0.88*baseAlpha;
        ctx.beginPath();
        ctx.arc(gx,gy,size+6, g.shieldRotation-g.typeData.shieldArc/2, g.shieldRotation+g.typeData.shieldArc/2);
        ctx.stroke();
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2;
        ctx.globalAlpha = 0.38*baseAlpha;
        ctx.beginPath();
        ctx.arc(gx,gy,size+7, g.shieldRotation-g.typeData.shieldArc/4, g.shieldRotation+g.typeData.shieldArc/4);
        ctx.stroke();
        ctx.lineCap = 'butt'; ctx.globalAlpha = baseAlpha;
      }
      break;
    }

    case 'BOSS': {
      // Pulsing aura rings
      for (let ai = 0; ai < 3; ai++) {
        const ap = (Math.sin(t*0.002 + ai*Math.PI*0.67)+1)/2;
        ctx.strokeStyle = '#ff1133'; ctx.lineWidth = 1.5;
        ctx.globalAlpha = 0.2*ap*baseAlpha;
        ctx.beginPath(); ctx.arc(gx,gy, size+6+ai*9, 0, Math.PI*2); ctx.stroke();
      }
      // Crown
      ctx.fillStyle = '#f0e840'; ctx.globalAlpha = baseAlpha;
      const topY = gy - size*0.15 - size + 2;
      for (let ci = 0; ci < 5; ci++) {
        const cpx = gx - size*0.8 + ci*(size*1.6/4);
        const h   = (ci%2===0) ? 10 : 6;
        ctx.fillRect(cpx - 2.5, topY - h, 5, h + 3);
      }
      ctx.fillStyle = '#c8a020';
      ctx.fillRect(gx - size*0.85, topY - 1.5, size*1.7, 4);
      // Health bar
      if (g.health < g.maxHealth) {
        const bw = size*2.5, bh = 5, bx = gx-bw/2, by2 = gy-size-15;
        ctx.fillStyle = '#1a1a2a'; ctx.globalAlpha = 0.9*baseAlpha;
        ctx.fillRect(bx, by2, bw, bh);
        const hp = g.health / g.maxHealth;
        ctx.fillStyle = hp > 0.5 ? '#2aaa5c' : hp > 0.25 ? '#f0e840' : '#ff2222';
        ctx.fillRect(bx, by2, bw*hp, bh);
        ctx.strokeStyle = '#444455'; ctx.lineWidth = 1;
        ctx.strokeRect(bx, by2, bw, bh);
      }
      ctx.globalAlpha = baseAlpha;
      break;
    }

    case 'SWARM': {
      // Echo silhouettes for colony feel
      for (let si = 0; si < 3; si++) {
        ctx.globalAlpha = 0.16*baseAlpha;
        ctx.fillStyle = col;
        ghostShape(gx + (si-1)*5, gy + (si-1)*5, size-2); ctx.fill();
      }
      ctx.globalAlpha = baseAlpha;
      break;
    }

    case 'OVERDUE': {
      ctx.save();
      ctx.translate(gx, gy); ctx.rotate(-0.3);
      const ss = Math.max(4, Math.floor(size*0.5));
      ctx.font = `bold ${ss}px "Press Start 2P"`;
      ctx.fillStyle = '#7a1a00'; ctx.strokeStyle = '#ffccaa'; ctx.lineWidth = 2;
      ctx.textAlign = 'center'; ctx.globalAlpha = 0.95*baseAlpha;
      ctx.strokeText('OVERDUE',0,2); ctx.fillText('OVERDUE',0,2);
      ctx.restore();
      if (g.attachedShelf) {
        const op = Math.sin(t*0.008)*0.4+0.6;
        ctx.strokeStyle = '#c86420'; ctx.lineWidth = 3;
        ctx.globalAlpha = op*baseAlpha;
        ctx.beginPath(); ctx.arc(gx,gy,size+7,0,Math.PI*2); ctx.stroke();
      }
      ctx.globalAlpha = baseAlpha;
      break;
    }

    case 'SHUSHER': {
      // Spectacles with temple arms
      const ls = size*0.28;
      ctx.strokeStyle = '#4a3a2a'; ctx.lineWidth = 1.8;
      ctx.globalAlpha = 0.85*baseAlpha;
      ctx.beginPath(); ctx.arc(gx-size*0.3, gy-size*0.12, ls, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(gx+size*0.3, gy-size*0.12, ls, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(gx-size*0.02, gy-size*0.12);
      ctx.lineTo(gx+size*0.02, gy-size*0.12); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(gx-size*0.3-ls, gy-size*0.12); ctx.lineTo(gx-size*0.6, gy); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(gx+size*0.3+ls, gy-size*0.12); ctx.lineTo(gx+size*0.6, gy); ctx.stroke();
      // Floating SHHH
      const shb = Math.sin(t*0.005)*2;
      ctx.font = `bold ${Math.floor(size*0.8)}px "Press Start 2P"`;
      ctx.fillStyle = '#4a3a2a'; ctx.textAlign = 'center';
      ctx.globalAlpha = 0.88*baseAlpha;
      ctx.fillText('SHHH', gx, gy - size - 4 + shb);
      ctx.globalAlpha = baseAlpha;
      break;
    }

    case 'RANGED': {
      // Central targeting reticle with crosshairs
      const rr = size*0.42;
      ctx.strokeStyle = gcol; ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.6*baseAlpha;
      ctx.beginPath(); ctx.arc(gx, gy-size*0.1, rr, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(gx-rr-4, gy-size*0.1); ctx.lineTo(gx-rr+5, gy-size*0.1);
      ctx.moveTo(gx+rr-5, gy-size*0.1); ctx.lineTo(gx+rr+4, gy-size*0.1);
      ctx.moveTo(gx, gy-size*0.1-rr-4); ctx.lineTo(gx, gy-size*0.1-rr+5);
      ctx.moveTo(gx, gy-size*0.1+rr-5); ctx.lineTo(gx, gy-size*0.1+rr+4);
      ctx.stroke();
      if (g.shootCooldown <= 0) {
        const cr = size+5+Math.sin(t*0.01)*3;
        ctx.strokeStyle = gcol; ctx.lineWidth = 2.5;
        ctx.globalAlpha = 0.75*baseAlpha;
        ctx.beginPath(); ctx.arc(gx,gy,cr,0,Math.PI*2); ctx.stroke();
      }
      ctx.globalAlpha = baseAlpha;
      break;
    }

    case 'MIMIC': {
      ctx.strokeStyle = '#aa44aa'; ctx.lineWidth = 2.5;
      ctx.globalAlpha = 0.7*baseAlpha;
      ghostShape(gx, gy, size+3); ctx.stroke();
      ctx.globalAlpha = baseAlpha;
      break;
    }

    case 'PLAGIARIST': {
      ctx.strokeStyle = '#88cc66'; ctx.lineWidth = 2;
      ctx.globalAlpha = 0.7*baseAlpha;
      ghostShape(gx, gy, size+4); ctx.stroke();
      ctx.globalAlpha = baseAlpha;
      break;
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // EYES — per-type expressive designs
  // ═══════════════════════════════════════════════════════════════════════════
  const eyeY   = gy - size*0.2;
  const eyeSpd = size*0.28;
  const blink  = Math.floor(ph/(Math.PI*2)) % 8 === 0 && (ph % (Math.PI*2)) < 0.2;

  ctx.globalAlpha = baseAlpha;

  switch (g.type) {

    case 'BOSS': {
      // Glowing red almond eyes + angry inner brows
      ctx.fillStyle = '#ff2222';
      const bew = blink?5:8, beh = blink?1:5;
      ctx.fillRect(gx-eyeSpd-bew/2, eyeY-beh/2, bew, beh);
      ctx.fillRect(gx+eyeSpd-bew/2, eyeY-beh/2, bew, beh);
      ctx.strokeStyle = '#ff4422'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(gx-eyeSpd-5, eyeY-6); ctx.lineTo(gx-eyeSpd+4, eyeY-3);
      ctx.moveTo(gx+eyeSpd+5, eyeY-6); ctx.lineTo(gx+eyeSpd-4, eyeY-3);
      ctx.stroke();
      break;
    }

    case 'TANK': {
      // Narrow aggressive slits + angled brows
      ctx.fillStyle = '#ff4422';
      const th = blink?1:2;
      ctx.fillRect(gx-eyeSpd-5, eyeY-th/2, 10, th);
      ctx.fillRect(gx+eyeSpd-5, eyeY-th/2, 10, th);
      ctx.strokeStyle = '#ff4422'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(gx-eyeSpd-5, eyeY-4); ctx.lineTo(gx-eyeSpd+4, eyeY-2);
      ctx.moveTo(gx+eyeSpd+5, eyeY-4); ctx.lineTo(gx+eyeSpd-4, eyeY-2);
      ctx.stroke();
      break;
    }

    case 'TELEPORTER': {
      // Glowing orb eyes with shifting pupils
      const go = Math.sin(t*0.02)*2;
      ctx.fillStyle = gcol;
      ctx.beginPath();
      ctx.arc(gx-eyeSpd, eyeY, blink?1:4, 0, Math.PI*2);
      ctx.arc(gx+eyeSpd, eyeY, blink?1:4, 0, Math.PI*2);
      ctx.fill();
      if (!blink) {
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(gx-eyeSpd+go, eyeY, 2, 0, Math.PI*2);
        ctx.arc(gx+eyeSpd-go, eyeY, 2, 0, Math.PI*2);
        ctx.fill();
      }
      break;
    }

    case 'BOMBER': {
      // Wide panicked eyes with sweat bead
      ctx.fillStyle = '#cc1100';
      ctx.beginPath();
      ctx.arc(gx-eyeSpd, eyeY, blink?1:4.5, 0, Math.PI*2);
      ctx.arc(gx+eyeSpd, eyeY, blink?1:4.5, 0, Math.PI*2);
      ctx.fill();
      if (!blink) {
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(gx-eyeSpd+1, eyeY-1, 1.8, 0, Math.PI*2);
        ctx.arc(gx+eyeSpd+1, eyeY-1, 1.8, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.fillStyle = '#88ccff'; ctx.globalAlpha = 0.75*baseAlpha;
      ctx.beginPath(); ctx.arc(gx+eyeSpd+5, eyeY-4, 2, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = baseAlpha;
      break;
    }

    case 'POSSESSOR': {
      // Hypnotic spinning arcs
      for (let pi = 0; pi < 3; pi++) {
        ctx.strokeStyle = pi%2===0 ? '#cc22ff' : '#ffffff';
        ctx.lineWidth = 1;
        ctx.globalAlpha = (0.8 - pi*0.22)*baseAlpha;
        ctx.beginPath();
        ctx.arc(gx-eyeSpd, eyeY, 4-pi, t*0.003, t*0.003+Math.PI*1.5); ctx.stroke();
        ctx.beginPath();
        ctx.arc(gx+eyeSpd, eyeY, 4-pi, t*0.003, t*0.003+Math.PI*1.5); ctx.stroke();
      }
      ctx.globalAlpha = baseAlpha;
      break;
    }

    case 'FAST': {
      // Horizontal dash-shaped determined eyes
      ctx.fillStyle = '#0033bb';
      const fw = 8;
      ctx.fillRect(gx-eyeSpd-fw/2, eyeY-1, fw, blink?1:3);
      ctx.fillRect(gx+eyeSpd-fw/2, eyeY-1, fw, blink?1:3);
      break;
    }

    case 'SHUSHER': {
      // Pupils visible through spectacle lenses
      ctx.fillStyle = '#4a3a2a';
      ctx.beginPath();
      ctx.arc(gx-size*0.3, gy-size*0.12, 1.5, 0, Math.PI*2);
      ctx.arc(gx+size*0.3, gy-size*0.12, 1.5, 0, Math.PI*2);
      ctx.fill();
      break;
    }

    case 'RANGED': {
      // Single cyclopean targeting eye
      ctx.fillStyle = gcol; ctx.globalAlpha = 0.95*baseAlpha;
      ctx.beginPath(); ctx.arc(gx, gy-size*0.1, size*0.18, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(gx+size*0.07, gy-size*0.17, size*0.07, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = baseAlpha;
      break;
    }

    case 'OVERDUE': {
      // Stern bureaucratic rectangular eyes
      const ow = 6, oh = blink?1:4;
      ctx.fillStyle = '#330000';
      ctx.fillRect(gx-eyeSpd-ow/2, eyeY-oh/2, ow, oh);
      ctx.fillRect(gx+eyeSpd-ow/2, eyeY-oh/2, ow, oh);
      ctx.strokeStyle = '#330000'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(gx-eyeSpd-4, eyeY-5); ctx.lineTo(gx-eyeSpd+4, eyeY-4);
      ctx.moveTo(gx+eyeSpd-4, eyeY-5); ctx.lineTo(gx+eyeSpd+4, eyeY-4);
      ctx.stroke();
      break;
    }

    case 'CHAIN': {
      // Side-glancing eyes toward partner
      ctx.fillStyle = '#330077';
      ctx.beginPath();
      ctx.arc(gx-eyeSpd, eyeY, blink?1:3, 0, Math.PI*2);
      ctx.arc(gx+eyeSpd, eyeY, blink?1:3, 0, Math.PI*2);
      ctx.fill();
      if (!blink && g.chainPartner) {
        const ld = g.chainPartner.x > gx ? 1 : -1;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(gx-eyeSpd+ld*1.2, eyeY, 1.2, 0, Math.PI*2);
        ctx.arc(gx+eyeSpd+ld*1.2, eyeY, 1.2, 0, Math.PI*2);
        ctx.fill();
      }
      break;
    }

    case 'MIMIC': {
      // Shocked wide eyes on reveal
      ctx.fillStyle = '#550099';
      ctx.beginPath();
      ctx.arc(gx-eyeSpd, eyeY, blink?1:5, 0, Math.PI*2);
      ctx.arc(gx+eyeSpd, eyeY, blink?1:5, 0, Math.PI*2);
      ctx.fill();
      if (!blink) {
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(gx-eyeSpd+1.5, eyeY-1.5, 2, 0, Math.PI*2);
        ctx.arc(gx+eyeSpd+1.5, eyeY-1.5, 2, 0, Math.PI*2);
        ctx.fill();
      }
      break;
    }

    case 'SWARM': {
      // Compound multi-dot eyes
      ctx.fillStyle = '#331177';
      const sr = blink?0.5:2.5;
      ctx.beginPath();
      ctx.arc(gx-eyeSpd-2.5, eyeY, sr, 0, Math.PI*2);
      ctx.arc(gx-eyeSpd+2.5, eyeY, sr, 0, Math.PI*2);
      ctx.arc(gx+eyeSpd-2.5, eyeY, sr, 0, Math.PI*2);
      ctx.arc(gx+eyeSpd+2.5, eyeY, sr, 0, Math.PI*2);
      ctx.fill();
      break;
    }

    default: {
      // NORMAL, SHIELD, PLAGIARIST — friendly round eyes with highlight
      ctx.fillStyle = pal.eyes;
      ctx.beginPath();
      ctx.arc(gx-eyeSpd, eyeY, blink?0.8:3, 0, Math.PI*2);
      ctx.arc(gx+eyeSpd, eyeY, blink?0.8:3, 0, Math.PI*2);
      ctx.fill();
      if (!blink) {
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.beginPath();
        ctx.arc(gx-eyeSpd+1, eyeY-1, 1, 0, Math.PI*2);
        ctx.arc(gx+eyeSpd+1, eyeY-1, 1, 0, Math.PI*2);
        ctx.fill();
      }
      break;
    }
  }

  // ─── Wispy ethereal trailing wisps beneath the body ─────────────────────
  ctx.fillStyle = col;
  for (let wi = 0; wi < 2; wi++) {
    const wob  = Math.sin(ph + wi*Math.PI)*3;
    const wbd  = gy + size*0.88 + size*0.15;
    const wSz  = 2.5 + Math.sin(ph+wi)*1;
    ctx.globalAlpha = 0.18*baseAlpha;
    ctx.beginPath();
    ctx.arc(gx + (wi*2-1)*size*0.35 + wob, wbd + Math.abs(Math.sin(ph+wi))*4, wSz, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function renderParticle(p) {
  // Safety check
  if (!p) return;
  
  const alpha = p.fadeIn && p.life > p.maxLife * 0.8 
    ? (p.maxLife - p.life) / (p.maxLife * 0.2)
    : p.life / p.maxLife;
  
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rotation || 0);
  
  // Default to 'square' if no type specified
  const particleType = p.type || 'square';
  
  switch(particleType) {
    case 'star':
      // 5-pointed star
      ctx.fillStyle = p.color;
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
        const r = i % 2 === 0 ? p.size : p.size * 0.4;
        const px = Math.cos(angle) * r;
        const py = Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      
      // Glow effect
      if (p.trail) {
        ctx.globalAlpha = alpha * 0.3;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(0, 0, p.size * 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
      
    case 'page':
      // Book page with flutter
      const flutter = p.flutter ? Math.sin(p.flutter) * 0.3 : 0;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.moveTo(-p.size/2, -p.size);
      ctx.lineTo(p.size/2 + flutter * p.size, -p.size);
      ctx.lineTo(p.size/2 - flutter * p.size, p.size);
      ctx.lineTo(-p.size/2, p.size);
      ctx.closePath();
      ctx.fill();
      
      // Lines on page
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
      ctx.lineWidth = 0.5;
      for (let i = -p.size/2; i < p.size; i += p.size/3) {
        ctx.beginPath();
        ctx.moveTo(-p.size/2, i);
        ctx.lineTo(p.size/2, i);
        ctx.stroke();
      }
      break;
      
    case 'circle':
      // Soft circle
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(0, 0, p.size, 0, Math.PI * 2);
      ctx.fill();
      break;
      
    case 'ring':
      // Expanding ring
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, p.size, 0, Math.PI * 2);
      ctx.stroke();
      
      // Inner glow
      ctx.globalAlpha = alpha * 0.2;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(0, 0, p.size, 0, Math.PI * 2);
      ctx.fill();
      break;
      
    case 'glow':
      // Soft glowing orb
      const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, p.size * 2);
      gradient.addColorStop(0, p.color);
      gradient.addColorStop(0.5, p.color.replace(')', ', 0.5)').replace('rgb', 'rgba'));
      gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(-p.size * 2, -p.size * 2, p.size * 4, p.size * 4);
      break;
      
    // ═══════════════════════════════════════════════════════════════════
    // SHELF-SPECIFIC PARTICLE TYPES (Nintendo Magic!)
    // ═══════════════════════════════════════════════════════════════════
    
    case 'heart':
      // Floating heart (Romance shelf)
      ctx.fillStyle = p.color;
      ctx.globalAlpha = (p.alpha || 1) * alpha;
      ctx.beginPath();
      // Left half of heart
      ctx.arc(-p.size/4, -p.size/4, p.size/2, 0, Math.PI, true);
      // Right half of heart
      ctx.arc(p.size/4, -p.size/4, p.size/2, 0, Math.PI, true);
      // Bottom point
      ctx.lineTo(0, p.size/2);
      ctx.closePath();
      ctx.fill();
      
      // Heart outline
      ctx.strokeStyle = '#ff4a7a';
      ctx.lineWidth = 1;
      ctx.globalAlpha = (p.alpha || 1) * alpha * 0.5;
      ctx.stroke();
      break;
      
    case 'code':
      // Matrix-style code symbols (Tablets shelf)
      ctx.fillStyle = p.color;
      ctx.globalAlpha = (p.alpha || 1) * alpha;
      ctx.font = `${p.size}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.char || '⊕', 0, 0);
      
      // Glow effect
      ctx.globalAlpha = (p.alpha || 1) * alpha * 0.3;
      ctx.font = `${p.size + 2}px monospace`;
      ctx.fillText(p.char || '⊕', 0, 0);
      break;
      
    case 'petal':
      // Cherry blossom petal (Manga shelf)
      ctx.fillStyle = p.color;
      ctx.globalAlpha = (p.alpha || 1) * alpha;
      
      // Petal shape (ellipse)
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size * 0.6, p.size, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Inner detail
      ctx.strokeStyle = '#ffcce0';
      ctx.lineWidth = 0.5;
      ctx.globalAlpha = (p.alpha || 1) * alpha * 0.5;
      ctx.beginPath();
      ctx.moveTo(0, -p.size);
      ctx.lineTo(0, p.size);
      ctx.stroke();
      break;
      
    case 'bubble':
      // Science beaker bubble
      ctx.globalAlpha = (p.alpha || 1) * alpha * 0.6;
      
      // Bubble outline
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, 0, p.size, 0, Math.PI * 2);
      ctx.stroke();
      
      // Highlight glint
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = (p.alpha || 1) * alpha * 0.8;
      ctx.beginPath();
      ctx.arc(-p.size/3, -p.size/3, p.size/3, 0, Math.PI * 2);
      ctx.fill();
      break;
      
    case 'wisp':
      // Ominous purple wisp (Forbidden shelf)
      ctx.globalAlpha = (p.alpha || 1) * alpha;
      
      // Wisp glow gradient
      const wispGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, p.size * 1.5);
      wispGradient.addColorStop(0, p.color);
      wispGradient.addColorStop(0.5, 'rgba(170, 68, 170, 0.3)');
      wispGradient.addColorStop(1, 'rgba(170, 68, 170, 0)');
      ctx.fillStyle = wispGradient;
      ctx.fillRect(-p.size * 1.5, -p.size * 1.5, p.size * 3, p.size * 3);
      
      // Wisp core
      ctx.globalAlpha = (p.alpha || 1) * alpha * 0.8;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size * 0.8, p.size, p.rotation || 0, 0, Math.PI * 2);
      ctx.fill();
      break;
      
    case 'square':
    default:
      // Default square
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      break;
  }
  
  ctx.restore();
}

function renderHUD() {
  const hh = 44; // UPGRADED: Taller HUD (was 32)
  
  // HUD Background with enhanced gradient
  const hudGradient = ctx.createLinearGradient(0, 0, 0, hh);
  hudGradient.addColorStop(0, 'rgba(26, 26, 46, 0.98)');
  hudGradient.addColorStop(0.5, 'rgba(23, 23, 41, 0.98)');
  hudGradient.addColorStop(1, 'rgba(20, 20, 36, 0.98)');
  ctx.fillStyle = hudGradient;
  ctx.fillRect(0, 0, W, hh);
  
  // Enhanced HUD border with glow
  ctx.strokeStyle = 'rgba(200, 168, 74, 0.4)';
  ctx.lineWidth = 2; // Thicker
  ctx.strokeRect(0, hh - 2, W, 2);
  
  // Subtle top accent line
  ctx.strokeStyle = 'rgba(200, 168, 74, 0.2)';
  ctx.lineWidth = 1;
  ctx.strokeRect(0, 0, W, 1);
  
  // === LEFT SIDE: Score — dominant element with punch animation ===
  // Score pop scale (1.0 normal → 1.5 on gain → back down)
  const scorePop = scorePopTimer > 0
    ? 1 + 0.55 * Math.sin((scorePopTimer / 550) * Math.PI)
    : 1;
  
  ctx.save();
  ctx.translate(12 + 50, 25);   // anchor point for scale
  ctx.scale(scorePop, scorePop);
  
  ctx.fillStyle = '#c8a84a';
  ctx.font = 'bold 11px "Press Start 2P"';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE', -50, -10);
  
  ctx.fillStyle = scorePopTimer > 0 ? '#ffffff' : '#f0e840';
  ctx.font = `bold ${Math.floor(16 * scorePop)}px "Press Start 2P"`;
  ctx.fillText(`${Math.floor(scoreDisplay)}`, -50, 10);
  
  ctx.restore();
  
  // Last-delta floating pop (+NNN) above score
  if (scorePopTimer > 0 && lastScoreDelta > 0) {
    const popAlpha = scorePopTimer / 550;
    const popRise = (1 - popAlpha) * 22;
    ctx.globalAlpha = popAlpha;
    ctx.fillStyle = '#f0e840';
    ctx.font = 'bold 10px "Press Start 2P"';
    ctx.textAlign = 'left';
    ctx.fillText(`+${lastScoreDelta}`, 12, 10 - popRise);
    ctx.globalAlpha = 1;
  }
  
  // === CENTER LEFT: Health Bar with pulse (BIGGER) ===
  const hx = 135; // Adjusted position
  const hp = Math.max(0, player.health);
  const hpPct = hp / player.maxHealth;
  const dangerFlash = hp <= 15 && (Math.sin(Date.now() * 0.018) > 0);
  
  // Heart icon with pulse (BIGGER)
  const heartSize = hp < 30 ? 14 + Math.sin(Date.now() * 0.01) * 1.5 : 14; // Bigger from 11
  ctx.fillStyle = dangerFlash ? '#ff2222' : (hpPct > 0.7 ? '#2aaa5c' : hpPct > 0.4 ? '#f0e840' : '#ff2222');
  ctx.font = `${heartSize}px "Press Start 2P"`;
  ctx.fillText('❤', hx, 26); // Adjusted position
  
  // Health label (BIGGER)
  ctx.fillStyle = dangerFlash ? 'rgba(255, 255, 255, 0.8)' : '#8a8a9a';
  ctx.font = '9px "Press Start 2P"'; // Bigger from 7px
  ctx.fillText('HP', hx + 18, 16); // Adjusted position
  
  // Enhanced health bar with gradient (BIGGER)
  const barX = hx + 18;
  const barY = 20; // Adjusted position
  const barW = 120; // Wider from 100
  const barH = 16; // Taller from 12
  
  // Bar background with subtle inner shadow
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.strokeStyle = '#0a0a1a';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);
  
  // Bar fill with gradient
  const barGradient = ctx.createLinearGradient(barX, barY, barX + barW * hpPct, barY);
  if (hpPct > 0.7) {
    barGradient.addColorStop(0, '#2aaa5c');
    barGradient.addColorStop(1, '#4acc7c');
  } else if (hpPct > 0.4) {
    barGradient.addColorStop(0, '#f0a840');
    barGradient.addColorStop(1, '#f0e840');
  } else {
    barGradient.addColorStop(0, '#ff2222');
    barGradient.addColorStop(1, '#ff6666');
  }
  ctx.fillStyle = barGradient;
  ctx.fillRect(barX + 2, barY + 2, (barW - 4) * hpPct, barH - 4);
  
  // Health bar shine effect
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(barX + 2, barY + 2, (barW - 4) * hpPct, 3); // Taller shine
  ctx.globalAlpha = 1;
  
  // ─── Phase 3: Critical danger pulse ring around health bar ───────────
  if (hpPct < 0.3) {
    const critPulse = Math.sin(Date.now() * 0.016) * 0.5 + 0.5;
    const critExpand = critPulse * 4;
    ctx.strokeStyle = '#ff2222';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.6 * critPulse;
    ctx.strokeRect(barX - critExpand, barY - critExpand, barW + critExpand*2, barH + critExpand*2);
    ctx.globalAlpha = 1;
  }
  
  // HP percentage (BIGGER)
  ctx.fillStyle = dangerFlash ? '#ffffff' : '#ffffff';
  ctx.font = 'bold 10px "Press Start 2P"'; // Bigger from 8px
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.floor(hp)}`, barX + barW / 2, barY + 12); // Adjusted position
  
  // === CENTER: Combo Meter with tier glow ring ===
  if (combo > 0) {
    const meterX = W / 2 - 70; // Adjusted position
    const meterY = 12; // Adjusted position
    const meterSize = 20; // Bigger from 16
    
    // ─── Phase 3: Tier glow ring (outer, pulsing) ─────────────────────
    let currentTierForHUD = -1;
    for (let t = 0; t < COMBO_TIERS.length; t++) {
      if (combo >= COMBO_TIERS[t].threshold) currentTierForHUD = t;
    }
    if (currentTierForHUD >= 0) {
      const tierData = COMBO_TIERS[currentTierForHUD];
      const glowPulse = Math.sin(Date.now() * 0.014) * 0.4 + 0.6;
      ctx.strokeStyle = tierData.glow;
      ctx.lineWidth = 5;
      ctx.globalAlpha = 0.45 * glowPulse;
      ctx.beginPath();
      ctx.arc(meterX, meterY, meterSize + 5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
    
    // Circular combo meter
    ctx.save();
    ctx.translate(meterX, meterY);
    
    // Background circle
    ctx.strokeStyle = '#3a3a5a';
    ctx.lineWidth = 4; // Thicker from 3
    ctx.beginPath();
    ctx.arc(0, 0, meterSize, 0, Math.PI * 2);
    ctx.stroke();
    
    // Fill arc based on combo
    const comboColor = combo >= 15 ? '#f0e840' : combo >= 10 ? '#ff6aaa' : combo >= 5 ? '#aa4aff' : '#4a8cff';
    ctx.strokeStyle = comboColor;
    ctx.lineWidth = 4; // Thicker from 3
    ctx.beginPath();
    ctx.arc(0, 0, meterSize, -Math.PI / 2, -Math.PI / 2 + (comboMeterFill * Math.PI * 2));
    ctx.stroke();
    
    // Combo number in center (BIGGER)
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 12px "Press Start 2P"'; // Bigger from 10px
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${combo}`, 0, 0);
    
    ctx.restore();
    
    // "COMBO" label (BIGGER)
    ctx.fillStyle = comboColor;
    ctx.font = '10px "Press Start 2P"'; // Bigger from 8px
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('COMBO', meterX + 26, 20); // Adjusted position
    
    // Combo multiplier (BIGGER)
    ctx.fillStyle = '#8a8a9a';
    ctx.font = '8px "Press Start 2P"'; // Bigger from 7px
    ctx.fillText(`x${Math.pow(COMBO_MULT, Math.min(combo, 10)).toFixed(1)}`, meterX + 26, 30); // Adjusted position
  }
  
  // === RIGHT SIDE: Timer/Wave with visual flair (BIGGER) ===
  ctx.textAlign = 'right';
  
  if (currentDifficulty.gameTime !== Infinity) {
    const timeColor = timeLeft < 10 ? '#ff2222' : timeLeft < 30 ? '#ff8840' : '#4a8cff';
    const timeWarning = timeLeft < 10;
    
    // Timer icon (BIGGER)
    ctx.fillStyle = timeColor;
    ctx.font = '13px "Press Start 2P"'; // Bigger from 10px
    ctx.fillText('⏱', W - 95, 24); // Adjusted position
    
    // Timer label (BIGGER)
    ctx.fillStyle = '#8a8a9a';
    ctx.font = '9px "Press Start 2P"'; // Bigger from 7px
    ctx.fillText('TIME', W - 12, 16); // Adjusted position
    
    // Timer value with pulse on warning (BIGGER)
    const timerSize = timeWarning ? 15 + Math.sin(Date.now() * 0.02) * 1.5 : 15; // Bigger from 12
    ctx.fillStyle = timeColor;
    ctx.font = `bold ${timerSize}px "Press Start 2P"`;
    ctx.fillText(`${Math.ceil(timeLeft)}s`, W - 12, 34); // Adjusted position
  } else {
    // Endless mode - wave counter (BIGGER)
    ctx.fillStyle = '#aa4aff';
    ctx.font = '13px "Press Start 2P"'; // Bigger from 10px
    ctx.fillText('🌊', W - 95, 24); // Adjusted position
    
    ctx.fillStyle = '#8a8a9a';
    ctx.font = '9px "Press Start 2P"'; // Bigger from 7px
    ctx.fillText('WAVE', W - 12, 16); // Adjusted position
    
    ctx.fillStyle = '#aa4aff';
    ctx.font = 'bold 15px "Press Start 2P"'; // Bigger from 12px
    ctx.fillText(`${wave}`, W - 12, 34); // Adjusted position
  }
  
  // === UNIFIED BOOKS BAR: Filed Counter + Carry Slots (FULLY INTEGRATED) ===
  const unifiedBarX = 12;
  const unifiedBarY = hh + 6;
  const carryLimit = currentDifficulty.carryLimit + player.carryBonus;
  const unifiedBarW = 240; // Wide enough for label, counter, and slots
  const unifiedBarH = 26; // Slightly taller for better proportions
  
  // Unified background
  ctx.fillStyle = 'rgba(42, 42, 74, 0.85)';
  ctx.fillRect(unifiedBarX, unifiedBarY, unifiedBarW, unifiedBarH);
  ctx.strokeStyle = 'rgba(200, 168, 74, 0.5)';
  ctx.lineWidth = 2;
  ctx.strokeRect(unifiedBarX, unifiedBarY, unifiedBarW, unifiedBarH);
  
  // Top label: "BOOKS"
  ctx.fillStyle = '#8a8a9a';
  ctx.font = '7px "Press Start 2P"';
  ctx.textAlign = 'left';
  ctx.fillText('BOOKS', unifiedBarX + 6, unifiedBarY + 9);
  
  // Filed counter (prominent)
  ctx.fillStyle = '#c8a84a';
  ctx.font = 'bold 11px "Press Start 2P"';
  ctx.fillText(`📚${booksFiledThisGame}`, unifiedBarX + 6, unifiedBarY + 21);
  
  // "FILED" sublabel
  ctx.fillStyle = '#6a6a7a';
  ctx.font = '6px "Press Start 2P"';
  ctx.fillText('FILED', unifiedBarX + 36, unifiedBarY + 21);
  
  // Vertical divider line
  ctx.strokeStyle = 'rgba(200, 168, 74, 0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(unifiedBarX + 70, unifiedBarY + 4);
  ctx.lineTo(unifiedBarX + 70, unifiedBarY + unifiedBarH - 4);
  ctx.stroke();
  
  // "CARRYING" label
  ctx.fillStyle = '#8a8a9a';
  ctx.font = '7px "Press Start 2P"';
  ctx.fillText('CARRYING', unifiedBarX + 76, unifiedBarY + 9);
  
  // Carry count indicator
  ctx.fillStyle = '#f0e840';
  ctx.font = 'bold 8px "Press Start 2P"';
  ctx.fillText(`${player.carrying.length}/${carryLimit}`, unifiedBarX + 132, unifiedBarY + 9);
  
  // Book slots (compact row)
  for (let i = 0; i < carryLimit; i++) {
    const slotX = unifiedBarX + 76 + i * 16; // Tighter spacing
    const slotY = unifiedBarY + 12;
    
    if (i < player.carrying.length) {
      // Filled slot
      const book = player.carrying[i];
      if (book) {
        ctx.fillStyle = BOOK_COLORS[book.type] || '#ffffff';
        ctx.fillRect(slotX, slotY, 12, 12);
        // Subtle book shine
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(slotX, slotY, 12, 2);
        ctx.globalAlpha = 1;
      }
    } else {
      // Empty slot
      ctx.fillStyle = '#2a2a3a';
      ctx.fillRect(slotX, slotY, 12, 12);
      ctx.strokeStyle = '#4a4a6a';
      ctx.lineWidth = 1;
      ctx.strokeRect(slotX, slotY, 12, 12);
    }
  }
  
  // === Active Powerup Display ===
  if (activePowerup && activePowerup.type) {
    const p = POWERUP_TYPES[activePowerup.type];
    if (p) {
      const remaining = Math.ceil(activePowerup.remaining / 1000);
      const warning = remaining <= 3;
      
      const boxX = W / 2 - 90;
      const boxY = hh + 5;
      const boxW = 180;
      const boxH = 24;
      
      // Box with powerup color
      ctx.fillStyle = 'rgba(42, 42, 74, 0.95)';
      ctx.fillRect(boxX, boxY, boxW, boxH);
      
      // Animated border
      const pulse = warning ? Math.sin(Date.now() * 0.02) * 0.3 + 0.7 : 1;
      ctx.strokeStyle = p.color;
      ctx.globalAlpha = pulse;
      ctx.lineWidth = 2;
      ctx.strokeRect(boxX, boxY, boxW, boxH);
      ctx.globalAlpha = 1;
      
      // Progress bar
      const progressPct = activePowerup.remaining / p.duration;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.fillRect(boxX + 2, boxY + boxH - 4, boxW - 4, 2);
      ctx.fillStyle = p.color;
      ctx.fillRect(boxX + 2, boxY + boxH - 4, (boxW - 4) * progressPct, 2);
      
      // Powerup info
      ctx.font = '9px "Press Start 2P"';
      ctx.fillStyle = p.color;
      ctx.textAlign = 'center';
      ctx.fillText(`${p.icon} ${p.label}`, W / 2, boxY + 12);
      
      ctx.font = '7px "Press Start 2P"';
      ctx.fillStyle = warning ? '#ff2222' : '#8a8a9a';
      ctx.fillText(`${remaining}s`, W / 2, boxY + 20);
    }
  }
  
  // === Achievement Notifications (Top Right) ===
  for (let i = 0; i < achievementQueue.length; i++) {
    const ach = achievementQueue[i];
    const achX = W - 260;
    const achY = hh + 10 + i * 35;
    const achW = 250;
    const achH = 30;
    
    // Animation - slide in from right
    const slideProgress = Math.min(1, (ach.maxLife - ach.life) / 300);
    const slideX = achX + (1 - slideProgress) * achW;
    
    // Fade out at end
    const fadeProgress = ach.life < 500 ? ach.life / 500 : 1;
    ctx.globalAlpha = fadeProgress;
    
    // Background
    ctx.fillStyle = 'rgba(42, 42, 74, 0.95)';
    ctx.fillRect(slideX, achY, achW, achH);
    
    // Gold border
    ctx.strokeStyle = '#c8a84a';
    ctx.lineWidth = 2;
    ctx.strokeRect(slideX, achY, achW, achH);
    
    // Icon
    ctx.fillStyle = '#f0e840';
    ctx.font = '14px "Press Start 2P"';
    ctx.textAlign = 'left';
    ctx.fillText('🏆', slideX + 8, achY + 20);
    
    // Text
    ctx.fillStyle = '#f0e840';
    ctx.font = 'bold 8px "Press Start 2P"';
    ctx.fillText(ach.title, slideX + 30, achY + 12);
    
    ctx.fillStyle = '#d4d4e4';
    ctx.font = '7px "Press Start 2P"';
    ctx.fillText(ach.description, slideX + 30, achY + 22);
    
    ctx.globalAlpha = 1;
  }
  
  // === Mini-Map (Bottom Right) ===
  if (miniMapVisible) {
    const mapSize = 120;
    const mapX = W - mapSize - 10;
    const mapY = H - mapSize - 35;
    
    // Map background
    ctx.fillStyle = 'rgba(26, 26, 46, 0.9)';
    ctx.fillRect(mapX, mapY, mapSize, mapSize);
    ctx.strokeStyle = 'rgba(200, 168, 74, 0.5)';
    ctx.lineWidth = 2;
    ctx.strokeRect(mapX, mapY, mapSize, mapSize);
    
    // Map title
    ctx.fillStyle = '#8a8a9a';
    ctx.font = '6px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText('MAP', mapX + mapSize / 2, mapY - 4);
    
    // Scale factor
    const scaleX = mapSize / W;
    const scaleY = mapSize / H;
    
    // Shelves on map
    for (const shelf of shelves) {
      if (!shelf) continue;
      const sx = mapX + shelf.x * scaleX;
      const sy = mapY + shelf.y * scaleY;
      ctx.fillStyle = SHELF_GLOW[shelf.type] || '#ffffff';
      ctx.globalAlpha = 0.6;
      ctx.fillRect(sx - 2, sy - 2, 4, 4);
      ctx.globalAlpha = 1;
    }
    
    // Trash can on map
    const tx = mapX + trashCan.x * scaleX;
    const ty = mapY + trashCan.y * scaleY;
    ctx.fillStyle = '#e87a2e';
    ctx.globalAlpha = 0.6;
    ctx.fillRect(tx - 2, ty - 2, 4, 4);
    ctx.globalAlpha = 1;
    
    // Books on map
    for (const book of books) {
      if (!book || book.state !== 'floor') continue;
      const bx = mapX + book.x * scaleX;
      const by = mapY + book.y * scaleY;
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = 0.4;
      ctx.fillRect(bx - 1, by - 1, 2, 2);
      ctx.globalAlpha = 1;
    }
    
    // Ghosts on map
    for (const ghost of ghosts) {
      if (!ghost) continue;
      const gx = mapX + ghost.x * scaleX;
      const gy = mapY + ghost.y * scaleY;
      ctx.fillStyle = '#e8e8f0';
      ctx.globalAlpha = 0.7;
      ctx.fillRect(gx - 2, gy - 2, 4, 4);
      ctx.globalAlpha = 1;
    }
    
    // Player on map (pulsing)
    const pulse = Math.sin(Date.now() * 0.01) * 0.3 + 0.7;
    const px = mapX + player.x * scaleX;
    const py = mapY + player.y * scaleY;
    ctx.fillStyle = '#f0e840';
    ctx.globalAlpha = pulse;
    ctx.beginPath();
    ctx.arc(px, py, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  
  // === Controls hint at bottom (desktop only) ===
  if (!isMobile()) {
    ctx.fillStyle = 'rgba(26, 26, 46, 0.7)';
    ctx.fillRect(0, H - 25, W, 25);
    ctx.font = `${Math.min(8, W * 0.01)}px "Press Start 2P"`;
    ctx.fillStyle = '#6a6a8a';
    ctx.textAlign = 'center';
    ctx.fillText('WASD: Move | SPACE: Dash (Parry!) | Q: Throw Book | E: Charge Attack (3 books) | M: Map | P: Stats', W / 2, H - 10);
  }

  // ─── Phase 2: BOSS WAVE announcement banner ──────────────────────────────
  if (bossWaveAnnounce > 0) {
    const bwFade = Math.min(1, bossWaveAnnounce / 500);
    ctx.globalAlpha = bwFade;

    // Dark full-width banner
    ctx.fillStyle = 'rgba(30, 10, 10, 0.88)';
    ctx.fillRect(0, H / 2 - 50, W, 100);
    ctx.strokeStyle = '#c86420';
    ctx.lineWidth = 3;
    ctx.strokeRect(0, H / 2 - 50, W, 100);

    // Title
    const bwPulse = Math.sin(Date.now() * 0.012) * 0.15 + 0.85;
    ctx.fillStyle = '#f0e840';
    ctx.font = `bold ${Math.floor(32 * bwPulse)}px "Press Start 2P"`;
    ctx.textAlign = 'center';
    ctx.fillText('⚠ BOSS WAVE ⚠', W / 2, H / 2 + 8);

    // Sub-text
    ctx.font = '11px "Press Start 2P"';
    ctx.fillStyle = '#d4c8a8';
    ctx.fillText('A powerful ghost has appeared!', W / 2, H / 2 + 32);

    ctx.globalAlpha = 1;
  }

  // ─── Phase 2: SILENCED overlay (when Shusher is in range) ──────────────
  if (playerSilenced && activePowerup && activePowerup.type) {
    // Draw a grey static-noise overlay on the active powerup bar
    const boxX = W / 2 - 90;
    const boxY = hh + 5;
    const boxW = 180;
    const boxH = 24;

    ctx.fillStyle = 'rgba(180, 160, 120, 0.55)';
    ctx.fillRect(boxX, boxY, boxW, boxH);

    ctx.font = '8px "Press Start 2P"';
    ctx.fillStyle = '#4a3a2a';
    ctx.textAlign = 'center';
    ctx.fillText('SILENCED! 🤫', W / 2, boxY + 14);

    ctx.strokeStyle = '#d4c8a8';
    ctx.lineWidth = 2;
    ctx.strokeRect(boxX, boxY, boxW, boxH);
  }

  // ─── Phase 2: OVERDUE corruption overlay on shelves ────────────────────
  for (const [shelf] of corruptedShelves) {
    const cx = shelf.x, cy = shelf.y;
    const pulse = Math.sin(Date.now() * 0.006) * 0.3 + 0.7;
    ctx.globalAlpha = 0.22 * pulse;
    ctx.fillStyle = '#c86420';
    ctx.fillRect(cx - 57, cy - 36, 114, 72);
    ctx.globalAlpha = 0.85 * pulse;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(-0.15);
    ctx.strokeStyle = '#7a1a00';
    ctx.lineWidth = 3;
    ctx.strokeRect(-36, -12, 72, 24);
    ctx.font = 'bold 11px "Press Start 2P"';
    ctx.fillStyle = '#c86420';
    ctx.textAlign = 'center';
    ctx.strokeText('OVERDUE', 0, 6);
    ctx.fillText('OVERDUE', 0, 6);
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  // ─── Procedural Layout: reveal banner ─────────────────────────────────
  if (layoutRevealTimer > 0) {
    const MAX_T = 3800;
    const t = layoutRevealTimer / MAX_T;
    // Fade in during first 15%, hold, fade out during last 20%
    const alpha = t > 0.85 ? (1 - t) / 0.15
                : t < 0.20 ? t / 0.20
                : 1;
    ctx.globalAlpha = alpha;
    
    const bw = Math.min(W * 0.88, 680), bh = 54;
    const bx = W/2 - bw/2, by = H/2 - bh/2 - 30;
    
    // Panel
    ctx.fillStyle = 'rgba(10,10,20,0.92)';
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = '#c8a84a';
    ctx.lineWidth = 2;
    ctx.strokeRect(bx, by, bw, bh);
    
    // Title line
    ctx.font = 'bold 10px "Press Start 2P"';
    ctx.fillStyle = '#c8a84a';
    ctx.textAlign = 'center';
    ctx.fillText('NEW LAYOUT — LEARN THE MAP!', W/2, by + 16);
    
    // Coloured shelf-type dots with abbreviated labels
    const dotCount = shelves.length;
    const dotSpacing = Math.min(48, (bw - 24) / dotCount);
    const dotsStartX = W/2 - (dotCount - 1) * dotSpacing / 2;
    const dotY = by + 36;
    
    for (let i = 0; i < dotCount; i++) {
      const shelf = shelves[i];
      if (!shelf) continue;
      const dx = dotsStartX + i * dotSpacing;
      const col = SHELF_GLOW[shelf.type] || BOOK_COLORS[shelf.type] || '#ffffff';
      
      // Dot
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.arc(dx, dotY, 5, 0, Math.PI * 2);
      ctx.fill();
      
      // Short label beneath (3 chars max, tiny font)
      ctx.font = '5px "Press Start 2P"';
      ctx.fillStyle = col;
      ctx.textAlign = 'center';
      ctx.fillText(BOOK_LABELS[shelf.type].slice(0, 4).toUpperCase(), dx, dotY + 12);
    }
    
    ctx.globalAlpha = 1;
  }

  // ─── Phase 4: Performance stats overlay (P to toggle) ─────────────────
  if (perfStatsVisible) {
    const sx = 10, sy = 52, sw = 200, sh = 88;
    ctx.fillStyle = 'rgba(10,10,20,0.88)';
    ctx.fillRect(sx, sy, sw, sh);
    ctx.strokeStyle = '#4a8cff';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx, sy, sw, sh);

    const statFont = '8px "Press Start 2P"';
    ctx.font = statFont;
    ctx.textAlign = 'left';
    const rows = [
      ['FPS',       `${_fpsDisplay}`],
      ['Particles', `${particles.length} / ${MAX_PARTICLES}`],
      ['Pool free',  `${particlePool.freeCount}`],
      ['Ghosts',    `${ghosts.length}`],
      ['HashCells', `${spatialHash._cells.size}`],
      ['HitStop',   hitStop > 0 ? `${Math.ceil(hitStop)}ms` : 'off'],
    ];
    rows.forEach(([label, val], i) => {
      ctx.fillStyle = '#6a8aaa';
      ctx.fillText(label, sx + 8, sy + 16 + i * 12);
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'right';
      ctx.fillText(val, sx + sw - 8, sy + 16 + i * 12);
      ctx.textAlign = 'left';
    });
  }
}

// ── Touch Controls Overlay ────────────────────────────────────────────────
// Renders a virtual joystick (left) and three action buttons (right).
// Only drawn when isMobile() returns true — zero cost on desktop.
function renderTouchControls() {
  const R  = TC.joystickR;   // outer ring radius
  const bR = TC.btnR;        // action button radius
  const jx = TC.joystickX;
  const jy = TC.joystickY;

  // ── Joystick ──────────────────────────────────────────────────────────
  // Outer ring
  ctx.globalAlpha = 0.22;
  ctx.fillStyle = '#c8d8ff';
  ctx.beginPath();
  ctx.arc(jx, jy, R, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = 0.45;
  ctx.strokeStyle = '#8ab0ff';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.arc(jx, jy, R, 0, Math.PI * 2);
  ctx.stroke();

  // Thumb nub — offset by current joystick vector (clamped to R * 0.55)
  const clampedR = R * 0.55;
  const nx = touch.joystickActive ? jx + touch.joystickX * clampedR : jx;
  const ny = touch.joystickActive ? jy + touch.joystickY * clampedR : jy;

  ctx.globalAlpha = touch.joystickActive ? 0.75 : 0.45;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(nx, ny, R * 0.38, 0, Math.PI * 2);
  ctx.fill();

  // Crosshair guides inside ring
  ctx.globalAlpha = 0.18;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(jx - R, jy); ctx.lineTo(jx + R, jy);
  ctx.moveTo(jx, jy - R); ctx.lineTo(jx, jy + R);
  ctx.stroke();

  // ── Action Buttons ────────────────────────────────────────────────────
  const buttons = [
    { x: TC.dashX,   y: TC.dashY,   label: 'DASH',   color: '#4a8cff', active: touch.dashId  >= 0 },
    { x: TC.throwX,  y: TC.throwY,  label: 'THROW',  color: '#ff6aaa', active: touch.throwId >= 0 },
    { x: TC.chargeX, y: TC.chargeY, label: 'CHARGE', color: '#f0e840', active: touch.chargeId >= 0 },
  ];

  for (const btn of buttons) {
    const pressed = btn.active;

    // Glow when pressed
    if (pressed) {
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = btn.color;
      ctx.beginPath();
      ctx.arc(btn.x, btn.y, bR * 1.4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Body
    ctx.globalAlpha = pressed ? 0.85 : 0.38;
    ctx.fillStyle = pressed ? btn.color : 'rgba(30,30,60,0.7)';
    ctx.beginPath();
    ctx.arc(btn.x, btn.y, bR, 0, Math.PI * 2);
    ctx.fill();

    // Ring
    ctx.globalAlpha = pressed ? 0.95 : 0.55;
    ctx.strokeStyle = btn.color;
    ctx.lineWidth = pressed ? 3 : 2;
    ctx.beginPath();
    ctx.arc(btn.x, btn.y, bR, 0, Math.PI * 2);
    ctx.stroke();

    // Label
    ctx.globalAlpha = pressed ? 1 : 0.7;
    ctx.fillStyle = pressed ? '#ffffff' : btn.color;
    ctx.font = `bold ${Math.floor(bR * 0.38)}px "Press Start 2P"`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(btn.label, btn.x, btn.y);
    ctx.textBaseline = 'alphabetic';
  }

  ctx.globalAlpha = 1;
}

function renderPauseOverlay() {
  // Darken
  ctx.fillStyle = 'rgba(0, 0, 0, 0.72)';
  ctx.fillRect(0, 0, W, H);
  
  // Panel
  const pw = 280, ph = 160;
  const px = W/2 - pw/2, py = H/2 - ph/2;
  
  ctx.fillStyle = 'rgba(42, 42, 74, 0.95)';
  ctx.fillRect(px, py, pw, ph);
  ctx.strokeStyle = '#c8a84a';
  ctx.lineWidth = 3;
  ctx.strokeRect(px, py, pw, ph);
  
  // Title
  ctx.fillStyle = '#c8a84a';
  ctx.font = 'bold 20px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', W/2, py + 40);
  
  // Stats
  ctx.font = '9px "Press Start 2P"';
  ctx.fillStyle = '#d4d4e4';
  ctx.fillText(`Score: ${score}`, W/2, py + 70);
  ctx.fillText(`Books Filed: ${booksFiledThisGame}`, W/2, py + 90);
  
  // Controls
  const blink = Math.sin(Date.now() * 0.006) > 0;
  ctx.font = '10px "Press Start 2P"';
  ctx.fillStyle = blink ? '#ffffff' : '#8a8a9a';
  ctx.fillText('ESC — Resume', W/2, py + 120);
  
  ctx.fillStyle = blink ? '#ff6a6a' : '#8a8a9a';
  ctx.fillText('ENTER — Quit', W/2, py + 145);
}

function renderGameOver() {
  // Darken
  ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
  ctx.fillRect(0, 0, W, H);
  
  // Title
  ctx.fillStyle = '#c8a84a';
  ctx.font = 'bold 28px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W/2, 120);
  
  // Score
  ctx.font = 'bold 20px "Press Start 2P"';
  ctx.fillStyle = '#f0e840';
  ctx.fillText(`SCORE: ${score}`, W/2, 180);
  
  // Stats
  ctx.font = '10px "Press Start 2P"';
  ctx.fillStyle = '#d4d4e4';
  ctx.fillText(`Books Filed: ${booksFiledThisGame}`, W/2, 230);
  ctx.fillText(`Max Combo: ${combo}x`, W/2, 255);
  
  // Continue
  const blink = Math.sin(Date.now() * 0.006) > 0;
  ctx.font = '10px "Press Start 2P"';
  ctx.fillStyle = blink ? '#ffffff' : '#6a6a8a';
  ctx.fillText('Press any key to continue', W/2, H - 60);
}

// ═══════════════════════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════════════════════

let lastTime = 0;
let _fpsFrames = 0, _fpsAccum = 0, _fpsDisplay = 0;

function gameLoop(time) {
  let dt = Math.min(time - lastTime, 50);
  lastTime = time;
  
  // FPS counter
  _fpsAccum += dt;
  _fpsFrames++;
  if (_fpsAccum >= 500) {
    _fpsDisplay = Math.round(_fpsFrames / (_fpsAccum / 1000));
    _fpsFrames = 0;
    _fpsAccum  = 0;
  }
  
  // Hit-stop: clamp dt to near-zero during freeze frames for impactful moments
  if (hitStop > 0) {
    hitStop = Math.max(0, hitStop - dt);
    dt = Math.min(dt, 3); // ~3 ms effective dt = dramatic slow-mo freeze
  }
  
  update(dt);
  render();
  
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
